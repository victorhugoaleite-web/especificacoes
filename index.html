<meta name="application-name" content="Especifica Realize!"/>
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#111113" media="(prefers-color-scheme: dark)"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#fafafa;--surface3:#f2f2f4;
  --border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.13);
  --text:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
  --accent:#0071e3;--accent-hover:#0077ed;--accent-light:#e8f0fc;
  --green:#34c759;--green-bg:#f0faf3;--green-text:#1a7a3a;
  --red:#ff3b30;--red-bg:#fff1f0;--red-text:#c0392b;
  --orange:#ff9500;--orange-bg:#fff8e7;--orange-text:#9a6200;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 0 0 .5px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.05);
  --sidebar-w:228px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','SF Pro Text',system-ui,sans-serif;
}
body.dark{
  --bg:#111113;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;
  --border:rgba(255,255,255,.09);--border-strong:rgba(255,255,255,.15);
  --text:#f5f5f7;--text-secondary:#aeaeb2;--text-tertiary:#636366;
  --accent:#2f8ff7;--accent-hover:#4a9ff8;--accent-light:rgba(47,143,247,.15);
  --green-bg:rgba(52,199,89,.12);--green-text:#4cd964;
  --red-bg:rgba(255,59,48,.12);--red-text:#ff6b60;
  --orange-bg:rgba(255,149,0,.12);--orange-text:#ffb340;
  --shadow:0 1px 4px rgba(0,0,0,.4),0 0 0 .5px rgba(255,255,255,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6),0 0 0 .5px rgba(255,255,255,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}

/* LAYOUT */
#app{display:flex;min-height:100vh;width:100%;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;position:fixed;top:0;left:0;bottom:0;background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(1.8);border-right:1px solid var(--border);z-index:20;display:flex;flex-direction:column;transition:background .25s;}
body.dark .sidebar{background:rgba(28,28,30,.88);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;width:calc(100vw - var(--sidebar-w));}

/* SIDEBAR */
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.sb-logo-mark{width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.sb-logo-img{filter:none;transition:filter .25s;}
body.dark .sb-logo-img{filter:brightness(0) invert(1);}
.sb-app-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.sb-app-sub{font-size:11px;color:var(--text-tertiary);margin-top:1px;}
.sb-section{padding:8px 10px;}
.sb-label{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:.06em;text-transform:uppercase;padding:4px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s;user-select:none;}
.nav-item:hover{background:rgba(0,0,0,.04);color:var(--text);}
body.dark .nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.on{background:rgba(0,113,227,.09);color:var(--accent);}
body.dark .nav-item.on{background:rgba(47,143,247,.12);}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.65;}
.nav-item.on .nav-icon{opacity:1;}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);}
.sb-footer-row{display:flex;align-items:center;justify-content:space-between;}
.sb-save-time{font-size:10px;color:var(--text-tertiary);}
.dark-toggle{width:28px;height:28px;border-radius:8px;background:rgba(0,0,0,.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
body.dark .dark-toggle{background:rgba(255,255,255,.07);}
.dark-toggle:hover{background:rgba(0,0,0,.1);}
body.dark .dark-toggle:hover{background:rgba(255,255,255,.12);}
.sb-actions{padding:8px 10px;border-top:1px solid var(--border);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.8);backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;transition:background .25s;}
body.dark .topbar{background:rgba(28,28,30,.85);}
.topbar-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px;}
.topbar-meta{display:flex;gap:4px;}
.topbar-stat{font-size:11px;color:var(--text-tertiary);padding:4px 10px;border-radius:14px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:3px;}
.topbar-stat:hover{background:rgba(0,0,0,.05);}
body.dark .topbar-stat:hover{background:rgba(255,255,255,.07);}
.topbar-stat strong{color:var(--text-secondary);font-weight:600;}

/* PAGE */
.page-content{padding:24px;flex:1;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:visible;transition:background .25s;}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-radius:var(--radius) var(--radius) 0 0;background:var(--surface);}
.card-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.2px;}
.card-sub{font-size:11px;color:var(--text-tertiary);margin-top:1px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{filter:brightness(.92);}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid rgba(0,113,227,.25);}
.btn-ghost:hover{background:var(--accent-light);}
.btn-neutral{background:rgba(0,0,0,.06);color:var(--text);border:none;}
body.dark .btn-neutral{background:rgba(255,255,255,.08);}
.btn-neutral:hover{background:rgba(0,0,0,.1);}
body.dark .btn-neutral:hover{background:rgba(255,255,255,.13);}
.btn-danger-solid{background:var(--red);color:#fff;}
.btn-danger-solid:hover{background:#e0342a;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:14px;}
.btn-icon-sm{width:28px;height:28px;border-radius:var(--radius-xs);display:inline-flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .15s;}
.btn-icon-sm.edit{background:rgba(0,0,0,.05);color:var(--text-secondary);}
.btn-icon-sm.edit:hover{background:var(--accent-light);color:var(--accent);}
.btn-icon-sm.del{background:rgba(0,0,0,.04);color:var(--text-tertiary);}
.btn-icon-sm.del:hover{background:var(--red-bg);color:var(--red);}

/* INPUTS */
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s,background .25s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.12);}
input::placeholder,textarea::placeholder{color:var(--text-tertiary);}
select{cursor:pointer;}
input.err,select.err{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(255,59,48,.1)!important;}
.field-err{font-size:11px;color:var(--red-text);margin-top:3px;display:flex;align-items:center;gap:3px;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:0 0 var(--radius) var(--radius);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--surface2);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(0,0,0,.018);}
body.dark tbody tr:hover td{background:rgba(255,255,255,.025);}
.td-primary{font-weight:500;color:var(--text);}
.td-mono{font-family:ui-monospace,'SF Mono',monospace;font-size:12px;color:var(--text-secondary);}

/* BADGES / PILLS */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;transition:opacity .15s;white-space:nowrap;}
.badge:hover{opacity:.72;}
.badge-green{background:var(--green-bg);color:var(--green-text);}
.badge-red{background:var(--red-bg);color:var(--red-text);}
.badge-orange{background:var(--orange-bg);color:var(--orange-text);}
.badge-gray{background:rgba(0,0,0,.06);color:var(--text-secondary);}
body.dark .badge-gray{background:rgba(255,255,255,.08);}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.pill-blue{background:var(--accent-light);color:var(--accent);}
.pill-green{background:var(--green-bg);color:var(--green-text);}
.pill-orange{background:var(--orange-bg);color:var(--orange-text);}
.pill-gray{background:rgba(0,0,0,.06);color:var(--text-secondary);}
body.dark .pill-gray{background:rgba(255,255,255,.08);}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;transition:background .25s;}
.stat-val{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.stat-label{font-size:11px;color:var(--text-tertiary);margin-top:4px;font-weight:500;}
.stat-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;}

/* SPEC CARDS (session list) */
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.spec-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;cursor:pointer;transition:box-shadow .2s,transform .15s;border:1.5px solid transparent;}
.spec-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.spec-card.concluida{border-color:rgba(52,199,89,.3);}
.spec-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.spec-card-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.2px;}
.spec-card-proj{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.spec-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px;}
.spec-card-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}

/* SPEC EDITOR */
.editor-header{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:16px;}
.editor-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.editor-meta-field label{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}
.editor-footer{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 20px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;}
.editor-footer-left{font-size:12px;color:var(--text-tertiary);}
.editor-footer-right{display:flex;gap:10px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);transition:background .25s;}
.filter-bar input,.filter-bar select{padding:6px 10px;font-size:12px;max-width:180px;}
.filter-bar input{max-width:220px;}
.search-wrap{position:relative;display:flex;align-items:center;}
.search-wrap .search-ico{position:absolute;left:9px;color:var(--text-tertiary);pointer-events:none;}

/* ADD ROW */
.add-row td{background:rgba(0,113,227,.025)!important;padding:5px 7px;border-bottom:2px solid rgba(0,113,227,.15)!important;}
body.dark .add-row td{background:rgba(47,143,247,.04)!important;}
.add-row input,.add-row select{padding:5px 8px;font-size:12px;border-radius:var(--radius-xs);}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.ac-dropdown{position:fixed;top:0;left:0;width:320px;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:9999;overflow:hidden;max-height:260px;overflow-y:auto;}
.ac-item{padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.sel{background:rgba(0,113,227,.06);}
body.dark .ac-item:hover,body.dark .ac-item.sel{background:rgba(47,143,247,.1);}
.ac-name{font-size:12.5px;font-weight:500;color:var(--text);}
.ac-sub{font-size:11px;color:var(--text-tertiary);margin-top:1px;}
.ac-new{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;background:var(--green-bg);font-size:12px;font-weight:500;color:var(--green-text);}
.ac-new:hover{filter:brightness(.96);}
.ac-new-ico{width:18px;height:18px;background:var(--green);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;line-height:1;}
mark{background:#fef9c3;border-radius:2px;padding:0 1px;}
body.dark mark{background:#5a4e00;color:#ffd60a;}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.35);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;transition:background .25s;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.3px;}
.modal-close{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.07);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:background .15s;flex-shrink:0;}
body.dark .modal-close{background:rgba(255,255,255,.1);}
.modal-close:hover{background:rgba(0,0,0,.13);}
.modal-body{padding:16px 20px 20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase;}
.form-field.full{grid-column:1/-1;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

/* CONFIRM */
.confirm-modal{max-width:400px;}
.confirm-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.confirm-title{font-size:16px;font-weight:600;text-align:center;color:var(--text);}
.confirm-msg{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:6px;line-height:1.5;}
.confirm-item{font-size:12px;font-weight:600;color:var(--text);background:var(--surface2);border-radius:8px;padding:8px 12px;text-align:center;margin-top:10px;border:1px solid var(--border);}
.confirm-footer{display:flex;gap:8px;margin-top:20px;}
.confirm-footer .btn{flex:1;justify-content:center;}

/* PROGRESS */
.progress-bar{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-top:4px;}
body.dark .progress-bar{background:rgba(255,255,255,.08);}
.progress-fill{height:100%;border-radius:2px;transition:width .4s;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text-tertiary);}
.empty-ico{margin:0 auto 14px;opacity:.2;}
.empty-title{font-size:14px;font-weight:500;color:var(--text-secondary);}
.empty-sub{font-size:12px;margin-top:4px;}

/* ONBOARDING */
.onboarding{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 32px;max-width:580px;margin:0 auto;}
.onboard-step{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.onboard-step:last-of-type{border-bottom:none;}
.onboard-num{width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.onboard-text strong{font-size:13px;font-weight:600;color:var(--text);display:block;}
.onboard-text span{font-size:12px;color:var(--text-tertiary);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(29,29,31,.9);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}
body.dark ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);}
.date-cell{font-size:11px;color:var(--text-tertiary);}

/* ===== SAFE AREA (iPhone notch / Dynamic Island / home bar) ===== */
.sidebar{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.topbar{padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top));}
.main{padding-bottom:env(safe-area-inset-bottom);}
.toast{bottom:calc(24px + env(safe-area-inset-bottom));}
.editor-footer{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
/* Modal bottom sheet + safe area */
.modal{padding-bottom:env(safe-area-inset-bottom);}
@media(max-width:768px){
  .topbar{height:calc(48px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}
  .page-content{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
}

/* ===== PWA INSTALL BANNER ===== */
.pwa-banner{position:fixed;bottom:0;left:0;right:0;z-index:998;background:rgba(29,29,31,.97);backdrop-filter:blur(20px) saturate(1.8);color:#fff;padding:14px 18px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;box-shadow:0 -4px 24px rgba(0,0,0,.3);animation:slideUpBanner .35s cubic-bezier(.4,0,.2,1);}
@keyframes slideUpBanner{from{transform:translateY(100%);}to{transform:translateY(0);}}
.pwa-banner-icon{width:44px;height:44px;border-radius:10px;flex-shrink:0;background:#0071e3;display:flex;align-items:center;justify-content:center;}
.pwa-banner-text{flex:1;min-width:0;}
.pwa-banner-title{font-size:13px;font-weight:600;color:#fff;}
.pwa-banner-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;line-height:1.4;}
.pwa-banner-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);flex-shrink:0;}
.pwa-banner-close:hover{background:rgba(255,255,255,.2);}

/* ===== UTIL ===== */
@media(max-width:480px){.hide-xs{display:none!important;}}

/* ===== HAMBURGER ===== */
.ham-icon{display:flex;flex-direction:column;justify-content:center;gap:4px;width:18px;height:18px;}.ham-icon>span{display:block;height:2px;width:100%;background:currentColor;border-radius:2px;}
.topbar-hamburger{display:none;width:34px;height:34px;border-radius:8px;background:rgba(0,0,0,.06);border:none;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;color:var(--text);transition:background .15s;-webkit-tap-highlight-color:transparent;}
body.dark .topbar-hamburger{background:rgba(255,255,255,.07);}
.topbar-hamburger:hover{background:rgba(0,0,0,.1);}
body.dark .topbar-hamburger:hover{background:rgba(255,255,255,.13);}

/* ===== SIDEBAR OVERLAY ===== */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19;backdrop-filter:blur(2px);animation:fadeIn .2s ease;}

/* ===== DASH GRID ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ===== TABLET (≤1024px) ===== */
@media(max-width:1024px){
  .dash-grid{grid-template-columns:1fr 1fr;}
  .topbar-meta .topbar-stat:nth-child(n+3){display:none;}
}

/* ===== MOBILE (≤768px) ===== */
@media(max-width:768px){
  /* Sidebar vira overlay deslizante */
  .sidebar{transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20;}
  .sidebar.open{transform:translateX(0);}
  /* Main ocupa tela toda */
  .main{margin-left:0!important;width:100vw!important;}
  /* Topbar */
  .topbar{padding:0 14px;height:48px;}
  .topbar-hamburger{display:inline-flex!important;}
  .topbar-meta{display:none!important;}
  .topbar-title{font-size:14px;}
  /* Page */
  .page-content{padding:14px 12px;}
  /* Stat grid: 2 colunas */
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .stat-val{font-size:22px;}
  /* Dashboard */
  .dash-grid{grid-template-columns:1fr;}
  /* Spec cards: 1 coluna */
  .spec-grid{grid-template-columns:1fr!important;}
  /* Editor header */
  .editor-meta{grid-template-columns:1fr 1fr!important;gap:10px;}
  /* Editor footer */
  .editor-footer{flex-direction:column;gap:10px;padding:12px 14px;}
  .editor-footer-left{font-size:11px;}
  .editor-footer-right{width:100%;display:flex;gap:8px;}
  .editor-footer-right .btn{flex:1;justify-content:center;font-size:12px;}
  /* Filter bar */
  .filter-bar{flex-direction:column;align-items:stretch;gap:7px!important;padding:10px 12px;}
  .filter-bar input,.filter-bar select{max-width:100%!important;width:100%;}
  .search-wrap{width:100%;}
  .search-wrap input{max-width:100%!important;}
  /* Card */
  .card{border-radius:var(--radius-sm);}
  .card-header{padding:12px 14px;flex-wrap:wrap;gap:8px;}
  /* Modal: bottom sheet */
  .modal-bg{padding:0;align-items:flex-end;}
  .modal{border-radius:20px 20px 0 0;max-height:94vh;max-width:100%!important;width:100%;}

function render(){
  const active=document.activeElement;
  const isText=active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA');
  const focusId=isText?(active.id||null):null;
  const focusSel=isText?(active.selectionStart??null):null;
  const focusSelEnd=isText?(active.selectionEnd??null):null;
  document.getElementById('app').innerHTML=buildApp();
  bind();
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusSel!==null&&el.setSelectionRange){try{el.setSelectionRange(focusSel,focusSelEnd);}catch(e){}}}
  }
}

function toggleSidebar(){
  S.sidebarOpen=!S.sidebarOpen;
  render();
}

function buildApp(){
  return `${S.sidebarOpen?`<div class="sidebar-overlay" id="sidebarOverlay"></div>`:''}
  <div style="display:flex;min-height:100vh;">
    <div class="sidebar${S.sidebarOpen?' open':''}">${buildSidebar()}</div>
    <div class="main">${buildTopbar()}<div class="page-content">${buildPage()}</div></div>
  </div>
  ${S.modal?buildModal():''}
  ${S.confirmData?buildConfirmModal():''}
  ${S.toast?`<div class="toast">${S.toast}</div>`:''}`;
}

      <div style="display:flex;align-items:center;gap:8px;">
        <button class="topbar-hamburger" id="btnHamburger"><span class="ham-icon"><span></span><span></span><span></span></span></button>
        <button class="btn btn-neutral btn-sm" id="btnBackToSpecs">${SVG('back',13)} <span class="hide-xs">Especificações</span></button>
        <span class="topbar-title">${titleStr}</span>
        ${s?.status==='concluida'?`<span class="pill pill-green">Concluída</span>`:`<span class="pill pill-orange">Rascunho</span>`}
      </div>
      <div style="display:flex;gap:6px;">
        ${S.fbUser?`<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;background:${S.fbSyncStatus==='synced'?'#34c759':S.fbSyncStatus==='syncing'?'#0071e3':'#ff3b30'};" title="sync"></span>`:''}
        <button class="btn btn-neutral btn-sm" id="btnExportPDFEditor">${SVG('pdf',13)} <span class="hide-xs">PDF</span></button>
        <button class="btn btn-neutral btn-sm" id="btnExportCSVEditor">${SVG('csv',13)} <span class="hide-xs">CSV</span></button>
      </div>
    </div>`;
  }
  return `<div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="topbar-hamburger" id="btnHamburger"><span class="ham-icon"><span></span><span></span><span></span></span></button>
      <span class="topbar-title">${titles[S.page]||''}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="topbar-meta hide-xs">
        <span class="topbar-stat" data-nav="catalog"><strong>${S.prods.length}</strong> produtos</span>
        <span class="topbar-stat" data-nav="arqs"><strong>${S.arqs.length}</strong> arquitetos</span>
        <span class="topbar-stat" data-nav="clis"><strong>${S.clis.length}</strong> clientes</span>
        <span class="topbar-stat" data-nav="specs"><strong>${S.sessoes.length}</strong> especificações</span>
      </div>
      ${S.fbUser
        ?`<div style="display:flex;align-items:center;gap:6px;">
            <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;background:${S.fbSyncStatus==='synced'?'#34c759':S.fbSyncStatus==='syncing'?'#0071e3':'#ff3b30'};" title="${S.fbSyncStatus==='synced'?'Sincronizado':S.fbSyncStatus==='syncing'?'Sincronizando...':'Erro de sincronização'}"></span>
            <div id="btnFbUser" style="display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:20px;cursor:pointer;max-width:180px;">
              ${S.fbUser.photoURL?`<img src="${S.fbUser.photoURL}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>`:''}
              <span style="font-size:11.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${S.fbUser.displayName||S.fbUser.email||'Usuário'}</span>
              <span style="font-size:10px;color:var(--text-tertiary);">×</span>
            </div>
          </div>`
        :`<button id="btnFbLogin" class="btn btn-primary btn-sm" style="gap:5px;white-space:nowrap;">
            ☁ Entrar na nuvem
          </button>`}
    </div>
  </div>`;
}

function buildPage(){
  if(S.page==='dashboard')return buildDash();
  if(S.page==='catalog')return buildCatalog();
  if(S.page==='arqs')return buildArqs();
  if(S.page==='clis')return buildClis();
  if(S.page==='specs')return buildSpecsList();
  if(S.page==='spec-editor')return buildSpecEditor();
  return '';
}

// ===== DASHBOARD =====
function buildDash(){
  const isEmpty=S.prods.length===0&&S.arqs.length===0&&S.clis.length===0&&S.sessoes.length===0;
  if(isEmpty)return buildOnboarding();

  /* ── helpers ─────────────────────────────────────── */
  const parseVal=v=>{
    if(!v)return 0;
    const n=parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));
    return isNaN(n)?0:n;
  };
  const fmtVal=v=>v===0?'\u2014':'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const today=new Date();
  const hrs=today.getHours();
  const greeting=hrs<12?'Bom dia':hrs<18?'Boa tarde':'Boa noite';
  const todayStr=today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  /* ── financial ───────────────────────────────────── */
  const vendidas=S.sessoes.filter(s=>s.vendaStatus==='vendido');
  const canceladas=S.sessoes.filter(s=>s.vendaStatus==='cancelado');
  const emAberto=S.sessoes.filter(s=>s.status==='concluida'&&s.vendaStatus!=='vendido'&&s.vendaStatus!=='cancelado');
  const valorVendido=vendidas.reduce((a,s)=>a+parseVal(s.valorVenda),0);
  const valorAberto=emAberto.reduce((a,s)=>a+parseVal(s.valorVenda),0);
  const valorCancelado=canceladas.reduce((a,s)=>a+parseVal(s.valorVenda),0);

  /* ── pipeline ────────────────────────────────────── */
  const totSessoes=S.sessoes.length;
  const rascunhos=S.sessoes.filter(s=>s.status==='rascunho').length;
  const concluidas=S.sessoes.filter(s=>s.status==='concluida').length;
  const nVendidas=vendidas.length;
  const pipeW=(n,tot)=>tot?Math.max(4,Math.round(n/tot*100)):0;

  /* ── attention items ─────────────────────────────── */
  const specsComPendencia=S.sessoes.filter(s=>sessaoItems(s.id).some(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo));
  const specsVazias=S.sessoes.filter(s=>sessaoItems(s.id).length===0);
  const rascunhosSemItem=S.sessoes.filter(s=>s.status==='rascunho'&&sessaoItems(s.id).length===0);
  const hasAttention=specsComPendencia.length>0||rascunhosSemItem.length>0;

  /* ── recent specs ────────────────────────────────── */
  const recentSpecs=[...S.sessoes]
    .sort((a,b)=>{
      const ta=a.atualizadoEm||a.criadoEm||'';
      const tb=b.atualizadoEm||b.criadoEm||'';
      return tb.localeCompare(ta);
    })
    .slice(0,5);

  /* ── status badge helper ─────────────────────────── */
  const statusBadge=s=>{
    if(s.vendaStatus==='vendido')return '<span class="pill pill-green" style="font-size:10px;">Vendido</span>';
    if(s.vendaStatus==='cancelado')return '<span class="pill pill-gray" style="font-size:10px;">Cancelado</span>';
    if(s.status==='concluida')return '<span class="pill pill-blue" style="font-size:10px;">Conclu\u00edda</span>';
    return '<span class="pill pill-orange" style="font-size:10px;">Rascunho</span>';
  };

  /* ── mini stat pill helper ───────────────────────── */
  const mStat=(val,label,color)=>`<div style="display:flex;flex-direction:column;align-items:center;padding:8px 14px;background:var(--bg-secondary);border-radius:8px;min-width:60px;"><div style="font-size:16px;font-weight:700;color:${color};">${val}</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px;white-space:nowrap;">${label}</div></div>`;

  return `<div style="max-width:1100px;">

    <!-- ── HEADER ROW ── -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--text);">${greeting}!</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;text-transform:capitalize;">${todayStr}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="S.page='specs';S.editSpec=null;render()" style="display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;">
        ${SVG('plus',14)} Nova Especifica\u00e7\u00e3o
      </button>
    </div>

    <!-- ── FINANCIAL ROW ── -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:20px;">

      <div class="card" style="padding:20px 24px;border-left:3px solid var(--green-text);">
        <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Valor Vendido</div>
        <div style="font-size:28px;font-weight:800;color:var(--green-text);line-height:1;">${fmtVal(valorVendido)}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:8px;">${nVendidas} venda${nVendidas!==1?'s':''} fechada${nVendidas!==1?'s':''}</div>
      </div>

      <div class="card" style="padding:20px 24px;border-left:3px solid var(--orange-text);">
        <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Em Aberto</div>
        <div style="font-size:28px;font-weight:800;color:var(--orange-text);line-height:1;">${fmtVal(valorAberto)}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:8px;">${emAberto.length} especifica\u00e7\u00e3o${emAberto.length!==1?'es':''} conclu\u00edda${emAberto.length!==1?'s':''}</div>
      </div>

      <div class="card" style="padding:20px 24px;border-left:3px solid var(--text-tertiary);">
        <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Cancelado</div>
        <div style="font-size:28px;font-weight:800;color:var(--text-secondary);line-height:1;">${fmtVal(valorCancelado)}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:8px;">${canceladas.length} especifica\u00e7\u00e3o${canceladas.length!==1?'es':''} cancelada${canceladas.length!==1?'s':''}</div>
      </div>

    </div>

    <!-- ── PIPELINE ROW ── -->
    <div class="card" style="padding:20px 24px;margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;">Pipeline de Especifica\u00e7\u00f5es</div>
      <div style="display:flex;align-items:stretch;gap:0;">

        <div style="flex:1;padding:14px 18px;background:var(--bg-secondary);border-radius:8px 0 0 8px;border:1px solid var(--border);">
          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Rascunho</div>
          <div style="font-size:26px;font-weight:800;color:var(--text);">${rascunhos}</div>
          <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px;">
            <div style="height:4px;border-radius:2px;background:var(--text-tertiary);width:${pipeW(rascunhos,totSessoes)}%;"></div>
          </div>
          <div style="font-size:10px;color:var(--text-tertiary);margin-top:4px;">${totSessoes?Math.round(rascunhos/totSessoes*100):0}% do total</div>
        </div>

        <div style="display:flex;align-items:center;padding:0 6px;color:var(--text-tertiary);font-size:16px;">&rsaquo;</div>

        <div style="flex:1;padding:14px 18px;background:var(--bg-secondary);border:1px solid var(--border);border-left:none;">
          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Conclu\u00edda</div>
          <div style="font-size:26px;font-weight:800;color:var(--accent);">${concluidas}</div>
          <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px;">
            <div style="height:4px;border-radius:2px;background:var(--accent);width:${pipeW(concluidas,totSessoes)}%;"></div>
          </div>
          <div style="font-size:10px;color:var(--text-tertiary);margin-top:4px;">${totSessoes?Math.round(concluidas/totSessoes*100):0}% do total</div>
        </div>

        <div style="display:flex;align-items:center;padding:0 6px;color:var(--text-tertiary);font-size:16px;">&rsaquo;</div>

        <div style="flex:1;padding:14px 18px;background:var(--bg-secondary);border-radius:0 8px 8px 0;border:1px solid var(--border);border-left:none;">
          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Vendida</div>
          <div style="font-size:26px;font-weight:800;color:var(--green-text);">${nVendidas}</div>
          <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px;">
            <div style="height:4px;border-radius:2px;background:var(--green-text);width:${pipeW(nVendidas,totSessoes)}%;"></div>
          </div>
          <div style="font-size:10px;color:var(--text-tertiary);margin-top:4px;">${totSessoes?Math.round(nVendidas/totSessoes*100):0}% do total</div>
        </div>

      </div>
    </div>

    <!-- ── QUICK STATS BAR ── -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center;">
      ${mStat(S.prods.length,'Produtos','var(--accent)')}
      ${mStat(S.clis.length,'Clientes','var(--text)')}
      ${mStat(S.arqs.length,'Arquitetos','var(--text)')}
      ${mStat(S.specs.length,'Itens Total','var(--text-secondary)')}
      ${mStat(specsVazias.length,'Specs Vazias','var(--orange-text)')}
      ${mStat(specsComPendencia.length,'Cota\u00e7\u00e3o Pendente','var(--orange-text)')}
    </div>

    <!-- ── ATTENTION PANEL (conditional) ── -->
    ${hasAttention?`
    <div class="card" style="padding:0;margin-bottom:20px;border-left:3px solid var(--orange-text);">
      <div style="padding:14px 20px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);">
        ${SVG('box',14)}
        <span style="font-size:12px;font-weight:700;color:var(--orange-text);text-transform:uppercase;letter-spacing:.6px;">Aten\u00e7\u00e3o Necess\u00e1ria</span>
      </div>
      ${specsComPendencia.length>0?`
      <div style="padding:12px 20px;border-bottom:1px solid var(--border);">
        <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Cota\u00e7\u00e3o Pendente (${specsComPendencia.length})</div>
        ${specsComPendencia.slice(0,5).map(s=>{
          const cli=S.clis.find(c=>c.id===s.clienteId);
          const fa=sessaoItems(s.id).filter(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo).length;
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="S.page=\'specs\';S.viewSpec=\'' +s.id+ '\';render()">'
          +'<div style="font-size:12px;font-weight:500;">'+(s.projeto||'Sem t\u00edtulo')+'</div>'
          +'<div style="display:flex;gap:6px;align-items:center;">'
          +(cli?'<span style="font-size:11px;color:var(--text-tertiary);">'+cli.nome+'</span>':'')
          +'<span class="pill pill-orange" style="font-size:10px;">'+fa+' item'+(fa!==1?'s':'')+'</span>'
          +'</div></div>';
        }).join('')}
      </div>
      `:''}${rascunhosSemItem.length>0?`
      <div style="padding:12px 20px;">
        <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Rascunhos sem itens (${rascunhosSemItem.length})</div>
        ${rascunhosSemItem.slice(0,4).map(s=>{
          const cli=S.clis.find(c=>c.id===s.clienteId);
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="S.page=\'specs\';S.viewSpec=\'' +s.id+ '\';render()">'
          +'<div style="font-size:12px;font-weight:500;">'+(s.projeto||'Sem t\u00edtulo')+'</div>'
          +(cli?'<span style="font-size:11px;color:var(--text-tertiary);">'+cli.nome+'</span>':'')
          +'</div>';
        }).join('')}
      </div>
      `:''}    </div>
    `:''}    

    <!-- ── BOTTOM ROW: Recent Specs + Counts ── -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;">

      <!-- Recent Specs -->
      <div class="card" style="padding:0;" onclick="S.page='specs';render()" title="Ver todas as especifica\u00e7\u00f5es">
        <div style="padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;">Especifica\u00e7\u00f5es Recentes</div>
          <span style="font-size:10px;color:var(--accent);cursor:pointer;">ver todas &rsaquo;</span>
        </div>
        ${recentSpecs.length===0
          ?'<div style="padding:20px;font-size:12px;color:var(--text-tertiary);">Nenhuma especifica\u00e7\u00e3o ainda.</div>'
          :recentSpecs.map(s=>{
            const cli=S.clis.find(c=>c.id===s.clienteId);
            const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
            const nItems=sessaoItems(s.id).length;
            return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="event.stopPropagation();S.page=\'specs\';S.viewSpec=\'' +s.id+ '\';render()">'
            +'<div style="min-width:0;flex:1;margin-right:10px;">'
            +'<div style="font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(s.projeto||'Sem t\u00edtulo')+'</div>'
            +'<div style="font-size:10.5px;color:var(--text-tertiary);margin-top:1px;">'+(cli?cli.nome:'—')+(arq?' \u00b7 '+arq.nome:'')+'</div>'
            +'</div>'
            +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'
            +statusBadge(s)
            +'<span style="font-size:10px;color:var(--text-tertiary);">'+nItems+' item'+(nItems!==1?'s':'')+'</span>'
            +'</div>'
            +'</div>';
          }).join('')
        }
      </div>

      <!-- Clients & Architects counts -->
      <div style="display:flex;flex-direction:column;gap:14px;">

        <div class="card" style="padding:0;flex:1;cursor:pointer;" data-nav="clis">
          <div style="padding:14px 20px 12px;border-bottom:1px solid var(--border);">
            <div style="font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;">Clientes</div>
          </div>
          <div style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:30px;font-weight:800;color:var(--text);">${S.clis.length}</div>
            <div style="font-size:11px;color:var(--text-tertiary);text-align:right;">
              ${S.arqs.length} arquiteto${S.arqs.length!==1?'s':''}<br>
              vinculado${S.arqs.length!==1?'s':''}
            </div>
          </div>
          <div style="padding:0 20px 14px;">
            ${[...S.clis].slice(-3).reverse().map(c=>{
              const a=S.arqs.find(a=>a.id===c.arquitetoId);
              const n=S.sessoes.filter(s=>s.clienteId===c.id).length;
              return '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid var(--border);">'
              +'<div style="font-size:11.5px;font-weight:500;">'+c.nome+'</div>'
              +'<div style="display:flex;align-items:center;gap:5px;">'
              +(a?'<span style="font-size:10px;color:var(--text-tertiary);">'+a.nome+'</span>':'')
              +'<span class="pill pill-gray" style="font-size:10px;">'+n+' spec'+(n!==1?'s':'')+'</span>'
              +'</div></div>';
            }).join('')}
          </div>
        </div>

        <div class="card" style="padding:16px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;" data-nav="catalog">
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Cat\u00e1logo</div>
            <div style="font-size:24px;font-weight:800;color:var(--accent);">${S.prods.length}</div>
            <div style="font-size:10.5px;color:var(--text-tertiary);margin-top:2px;">produto${S.prods.length!==1?'s':''} cadastrado${S.prods.length!==1?'s':''}</div>
          </div>
          <div style="opacity:.2;font-size:36px;">${SVG('box',32)}</div>
        </div>

      </div>
    </div>

  </div>`;
}
function buildOnboarding(){
  const steps=[
    {n:1,label:'Cadastre seus produtos',desc:'Produtos salvos no catálogo podem ser reutilizados em qualquer especificação.',page:'catalog',btn:'Ir ao Catálogo'},
    {n:2,label:'Adicione os arquitetos',desc:'Vincule arquitetos aos seus clientes para organizar melhor os projetos.',page:'arqs',btn:'Ir a Arquitetos'},
    {n:3,label:'Crie os clientes',desc:'Cada cliente agrupa suas especificações. Associe ao arquiteto responsável.',page:'clis',btn:'Ir a Clientes'},
    {n:4,label:'Lance as especificações',desc:'Selecione o cliente, o projeto e adicione todos os produtos. Conclua ao finalizar.',page:'specs',btn:'Ir a Especificações'},
  ];

function sCard(v,l,ic,bg,color,nav){return`<div class="stat-card" data-nav="${nav}"><div><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div><div class="stat-icon" style="background:${bg};color:${color};">${SVG(ic,18)}</div></div>`;}
function pBar(l,v,t,c){const p=t?Math.round(v/t*100):0;return`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--text-secondary);">${l}</span><span style="font-weight:600;">${v} <span style="color:var(--text-tertiary);font-weight:400;">(${p}%)</span></span></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${c};"></div></div></div>`;}

// ===== CATALOG =====
function buildCatalog(){
  const q=(S.catSearch||'').toLowerCase();
  const marcas=[...new Set(S.prods.map(p=>p.marca).filter(Boolean))].sort();
  let list=S.prods;
  if(q)list=list.filter(p=>p.nome.toLowerCase().includes(q)||(p.marca||'').toLowerCase().includes(q)||(p.codigo||'').toLowerCase().includes(q)||(p.referencia||'').toLowerCase().includes(q));
  if(S.catTipo)list=list.filter(p=>p.tipo===S.catTipo);
  if(S.catMarca)list=list.filter(p=>p.marca===S.catMarca);
  const hasFilters=q||S.catTipo||S.catMarca;
  return`<div class="card" style="max-width:1100px;">
    <div class="card-header">
      <div><div class="card-title">Catálogo de Produtos</div><div class="card-sub">${list.length} de ${S.prods.length} produto${S.prods.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" id="btnNovoProd">${SVG('plus',13)} Novo Produto</button>
    </div>
    <div class="filter-bar" style="gap:8px;flex-wrap:wrap;">
      <div class="search-wrap"><span class="search-ico">${SVG('search',13)}</span>
        <input id="catSearch" placeholder="Nome, marca, código, ref..." value="${S.catSearch||''}" style="padding-left:30px;max-width:260px;"/>
      </div>
      <select id="catTipo" style="max-width:170px;padding:6px 10px;font-size:12px;">
        <option value="">Todos os tipos</option>
        ${TIPOS.map(t=>`<option value="${t}" ${S.catTipo===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <select id="catMarca" style="max-width:160px;padding:6px 10px;font-size:12px;">
        <option value="">Todas as marcas</option>
        ${marcas.map(m=>`<option value="${m}" ${S.catMarca===m?'selected':''}>${m}</option>`).join('')}
      </select>
      ${hasFilters?`<button class="btn btn-neutral btn-sm" id="btnCatClear" style="flex-shrink:0;">${SVG('x',11)} Limpar</button>`:''}
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th style="width:44px;"></th><th>Nome</th><th>Marca</th><th>Tipo</th><th>Referência</th><th>Código</th><th>Obs.</th><th>Usos</th><th>Criado em</th><th style="text-align:center;">Ações</th></tr></thead>
      <tbody>${list.length===0?`<tr><td colspan="10">${emptyState('box','Nenhum produto','Cadastre produtos para reutilizá-los.')}</td></tr>`:
        list.map(p=>{const uses=S.specs.filter(s=>s.produtoId===p.id).length;return`<tr>
          <td>${p.imagemPrincipal?`<img src="${p.imagemPrincipal}" class="cat-thumb"/>`:'<div style="width:36px;height:36px;border-radius:6px;background:var(--surface3);'+'display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.4;">&#128444;</div>'}</td><td class="td-primary">${p.nome}${(p.fornecedorUrl||p.videoUrl||p.gifProduto||(p.imagensAplicado||[]).length)?'<span class="cat-has-media">+mídia</span>':''}</td><td style="color:var(--text-secondary);">${p.marca||'—'}</td>
          <td>${p.tipo?`<span class="pill pill-gray">${p.tipo}</span>`:'—'}</td>
          <td style="color:var(--text-tertiary);font-size:12px;">${p.referencia||'—'}</td>
          <td class="td-mono">${p.codigo||'—'}</td>
          <td style="color:var(--text-tertiary);font-size:12px;max-width:140px;">${p.obs||'—'}</td>
          <td><span class="pill pill-blue">${uses}×</span></td>
          <td class="date-cell">${fmtDate(p.criadoEm)}</td>
          <td style="text-align:center;white-space:nowrap;">
            <button class="btn-icon-sm edit" data-edit-prod="${p.id}">${SVG('edit',13)}</button>
            <button class="btn-icon-sm del" data-del-prod="${p.id}">${SVG('trash',13)}</button>
          </td>
        </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`;
}

    </div></div>

      <thead><tr><th>Nome</th><th>Escritório</th><th>E-mail</th><th>Telefone</th><th>Clientes</th><th>Criado em</th><th style="text-align:center;">Ações</th></tr></thead>

// ===== CLIENTES =====
function buildClis(){
  const q=(S.cliSearch||'').toLowerCase();
  let list=S.clis;
  if(q)list=list.filter(c=>c.nome.toLowerCase().includes(q)||(c.obra||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.tel||'').toLowerCase().includes(q));
  if(S.cliArqId)list=list.filter(c=>c.arquitetoId===S.cliArqId);
  const hasFilters=q||S.cliArqId;
  return`<div class="card" style="max-width:1000px;">
    <div class="card-header">
      <div><div class="card-title">Clientes</div><div class="card-sub">${list.length} de ${S.clis.length} cliente${S.clis.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" id="btnNovoCli">${SVG('plus',13)} Novo Cliente</button>
    </div>
    <div class="filter-bar" style="gap:8px;flex-wrap:wrap;">
      <div class="search-wrap"><span class="search-ico">${SVG('search',13)}</span>
        <input id="cliSearch" placeholder="Nome, obra, e-mail, telefone..." value="${S.cliSearch||''}" style="padding-left:30px;max-width:280px;"/>
      </div>
      <select id="cliArqId" style="max-width:200px;padding:6px 10px;font-size:12px;">
        <option value="">Todos os arquitetos</option>
        ${S.arqs.map(a=>`<option value="${a.id}" ${S.cliArqId===a.id?'selected':''}>${a.nome}${a.escritorio?' — '+a.escritorio:''}</option>`).join('')}
      </select>
      ${hasFilters?`<button class="btn btn-neutral btn-sm" id="btnCliClear" style="flex-shrink:0;">${SVG('x',11)} Limpar</button>`:''}
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nome</th><th>Arquiteto</th><th>Obra / Projeto</th><th>E-mail</th><th>Telefone</th><th>Specs</th><th>Criado em</th><th style="text-align:center;">Ações</th></tr></thead>
      <tbody>${list.length===0?`<tr><td colspan="8">${emptyState('person',S.clis.length===0?'Nenhum cliente':'Nenhum resultado',S.clis.length===0?'Adicione clientes para organizar as especificações.':'Tente outros filtros.')}</td></tr>`:
        list.map(c=>{const a=S.arqs.find(a=>a.id===c.arquitetoId);const n=S.sessoes.filter(s=>s.clienteId===c.id).length;return`<tr>
          <td class="td-primary">${c.nome}</td>
          <td>${a?`<span class="pill pill-blue">${a.nome}</span>`:'<span style="color:var(--text-tertiary);">—</span>'}</td>
          <td style="color:var(--text-secondary);">${c.obra||'—'}</td>
          <td style="color:var(--text-tertiary);font-size:12px;">${c.email||'—'}</td>
          <td style="color:var(--text-tertiary);font-size:12px;">${c.tel||'—'}</td>
          <td><button class="btn btn-neutral btn-sm" data-ver-cli="${c.id}">${n} spec${n!==1?'s':''}</button></td>
          <td class="date-cell">${fmtDate(c.criadoEm)}</td>
          <td style="text-align:center;white-space:nowrap;">
            <button class="btn-icon-sm edit" data-edit-cli="${c.id}">${SVG('edit',13)}</button>
            <button class="btn-icon-sm del" data-del-cli="${c.id}">${SVG('trash',13)}</button>
          </td>
        </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`;
}

// ===== SPECS LIST =====
function buildSpecsList(){
  let list=[...S.sessoes].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
  if(S.fSessaoStatus)list=list.filter(s=>s.status===S.fSessaoStatus);
  if(S.fArqId)list=list.filter(s=>{const c=S.clis.find(c=>c.id===s.clienteId);return c&&c.arquitetoId===S.fArqId;});
  if(S.fCliId)list=list.filter(s=>s.clienteId===S.fCliId);
  if(S.fCotacaoStatus){list=list.filter(s=>{const its=sessaoItems(s.id);if(S.fCotacaoStatus==='pendente')return its.some(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo);if(S.fCotacaoStatus==='cotado')return its.length>0&&its.filter(i=>i.cotar==='COTAR').length>0&&!its.some(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo);if(S.fCotacaoStatus==='separado')return its.some(i=>i.separado==='SEPARADO');if(S.fCotacaoStatus==='em_separacao')return its.some(i=>i.separado==='EM SEPARAÇÃO');return true;});}
  if(S.fVendaStatus)list=list.filter(s=>s.vendaStatus===S.fVendaStatus||(S.fVendaStatus==='em_aberto'&&!s.vendaStatus&&s.status==='concluida'));
  const _q=S.fItemSearch.trim().toLowerCase();
  if(_q)list=list.filter(s=>sessaoItems(s.id).some(i=>(i.produto||'').toLowerCase().includes(_q)||(i.referencia||'').toLowerCase().includes(_q)||(i.codigo||'').toLowerCase().includes(_q)));

  return`<div style="max-width:1100px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-size:18px;font-weight:700;letter-spacing:-.3px;">Especificações</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${S.sessoes.length} especificação${S.sessoes.length!==1?'s':''} · ${S.sessoes.filter(s=>s.status==='concluida').length} concluída${S.sessoes.filter(s=>s.status==='concluida').length!==1?'s':''}</div>
      </div>
      <button class="btn btn-primary" id="btnNovaSpec">${SVG('plus',13)} Nova Especificação</button>
    </div>
    <div style="margin-bottom:12px;position:relative;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.45;">${SVG('box',16)}</span>
      <input id="fItemSearch" type="text" placeholder="Buscar por produto, código ou referência em qualquer especificação…" value="${S.fItemSearch}" autocomplete="off"
        style="width:100%;padding:11px 40px 11px 38px;font-size:13px;border:1.5px solid ${_q?'var(--accent)':'var(--border)'};border-radius:10px;background:var(--bg);color:var(--text);outline:none;"/>
      ${_q?`<button id="btnClearItemSearch" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:18px;line-height:1;padding:0 4px;">&times;</button>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--border);">
      <span style="font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;">Filtros:</span>
      <select id="fSessaoStatus" style="padding:5px 8px;font-size:12px;min-width:110px;">
        <option value="">Todas</option>
        <option value="rascunho" ${S.fSessaoStatus==='rascunho'?'selected':''}>Rascunho</option>
        <option value="concluida" ${S.fSessaoStatus==='concluida'?'selected':''}>Concluídas</option>
      </select>
      <select id="fArqId" style="padding:5px 8px;font-size:12px;min-width:120px;">
        <option value="">Arquiteto</option>
        ${S.arqs.map(a=>`<option value="${a.id}" ${S.fArqId===a.id?'selected':''}>${a.nome}</option>`).join('')}
      </select>
      <select id="fCliId" style="padding:5px 8px;font-size:12px;min-width:120px;">
        <option value="">Cliente</option>
        ${S.clis.map(c=>`<option value="${c.id}" ${S.fCliId===c.id?'selected':''}>${c.nome}</option>`).join('')}
      </select>
      <select id="fCotacaoStatus" style="padding:5px 8px;font-size:12px;min-width:130px;">
        <option value="">Cotação</option>
        <option value="pendente" ${S.fCotacaoStatus==='pendente'?'selected':''}>Em Cotação</option>
        <option value="cotado" ${S.fCotacaoStatus==='cotado'?'selected':''}>Cotado</option>
        <option value="separado" ${S.fCotacaoStatus==='separado'?'selected':''}>Separado</option>
        <option value="em_separacao" ${S.fCotacaoStatus==='em_separacao'?'selected':''}>Em Separação</option>
      </select>
      <select id="fVendaStatus" style="padding:5px 8px;font-size:12px;min-width:120px;">
        <option value="">Venda</option>
        <option value="em_aberto" ${S.fVendaStatus==='em_aberto'?'selected':''}>Em Aberto</option>
        <option value="vendido" ${S.fVendaStatus==='vendido'?'selected':''}>Vendido</option>
        <option value="cancelado" ${S.fVendaStatus==='cancelado'?'selected':''}>Cancelado</option>
      </select>
      ${(S.fSessaoStatus||S.fArqId||S.fCliId||S.fCotacaoStatus||S.fVendaStatus)?`<button class="btn btn-neutral btn-sm" id="btnClearFilters" style="font-size:11px;padding:4px 10px;">Limpar filtros</button>`:''}
    </div>
    ${_q?`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;padding:0 2px;">${SVG('box',13)} <strong>${list.length}</strong> especificação${list.length!==1?'s':''} com "<strong>${S.fItemSearch}</strong>"</div>`:''}

    ${list.length===0?`<div class="card">${emptyState('folder','Nenhuma especificação','Clique em "+ Nova Especificação" para começar.')}</div>`:
    `<div class="spec-grid">${list.map(s=>{
      const cli=S.clis.find(c=>c.id===s.clienteId);
      const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
      const items=sessaoItems(s.id);
      const sep=items.filter(i=>i.separado==='SEPARADO').length;
      const isConc=s.status==='concluida';
      return`<div class="spec-card ${isConc?'concluida':''}" data-open-spec="${s.id}">
        <div class="spec-card-top">
          <div style="flex:1;min-width:0;">
            <div class="spec-card-name">${s.projeto||'Sem título'}</div>
            <div class="spec-card-proj">${cli?cli.nome:'—'}</div>
          </div>
          ${isConc
            ?`<span class="pill pill-green" style="flex-shrink:0;">Concluída</span>`
            :`<span class="pill pill-orange" style="flex-shrink:0;">Rascunho</span>`}
          ${s.vendaStatus==='vendido'?`<span class="pill" style="background:#d1fae5;color:#065f46;flex-shrink:0;font-size:10px;">Vendido</span>`:s.vendaStatus==='cancelado'?`<span class="pill" style="background:#fee2e2;color:#991b1b;flex-shrink:0;font-size:10px;">Cancelado</span>`:isConc?`<span class="pill" style="background:#fff7ed;color:#c2410c;flex-shrink:0;font-size:10px;">Em Aberto</span>`:''}
        </div>
        <div class="spec-card-meta">
          ${arq?`<span class="pill pill-blue" style="font-size:11px;">${arq.nome}</span>`:''}
          <span class="pill pill-gray">${items.length} produto${items.length!==1?'s':''}</span>
          ${(()=>{const fa=items.filter(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo).length;const tot=items.filter(i=>i.cotar==='COTAR').length;if(tot===0)return '';if(fa===0)return '<span class="pill pill-green" style="font-size:10.5px;">cotado ✓</span>';return `<span class="pill pill-orange" style="font-size:10.5px;">${fa} sem cot.</span>`;})()}
          ${sep>0?`<span class="pill pill-green">${sep} separado${sep!==1?'s':''}</span>`:''}
        </div>
        ${_q?(()=>{const hits=items.filter(i=>(i.produto||'').toLowerCase().includes(_q)||(i.referencia||'').toLowerCase().includes(_q)||(i.codigo||'').toLowerCase().includes(_q));return hits.length?`<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px;">${hits.map(i=>`<div style="font-size:11px;background:var(--accent-light);border-left:3px solid var(--accent);padding:3px 8px;border-radius:0 5px 5px 0;color:var(--text);">${i.produto||'—'}${i.referencia?` <span style="color:var(--text-tertiary);">· ${i.referencia}</span>`:''}${i.codigo?` <span style="color:var(--text-tertiary);">· ${i.codigo}</span>`:''}</div>`).join('')}</div>`:''})():''}
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:8px;">${isConc?`Concluída em ${fmtDateTime(s.concluidoEm)}`:`Criada em ${fmtDate(s.criadoEm)}`}</div>
        <div class="spec-card-actions">
          <button class="btn btn-neutral btn-sm" style="flex:1;justify-content:center;" data-open-spec="${s.id}">${SVG('edit',13)} ${isConc?'Visualizar':'Continuar'}</button>
          <button class="btn btn-neutral btn-sm" data-export-pdf="${s.id}">${SVG('pdf',13)}</button>
          <button class="btn btn-neutral btn-sm" data-export-spec="${s.id}">${SVG('csv',13)}</button>
          <button class="btn btn-neutral btn-sm" data-del-sessao="${s.id}" style="color:var(--red-text);">${SVG('trash',13)}</button>
        </div>
      </div>`;
    }).join('')}</div>`}
  </div>`;
}

// ===== SPEC EDITOR =====
function buildSpecEditor(){
  const sessao=getActiveSessao();
  if(!sessao)return`<div class="card">${emptyState('warn','Erro','Especificação não encontrada.')}</div>`;

  const cli=S.clis.find(c=>c.id===sessao.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessao.id);
  const isConc=sessao.status==='concluida';

  return`<div style="max-width:1400px;">
    <!-- Context header -->
    <div class="editor-header">
      <div class="editor-meta">
        <div class="editor-meta-field">
          <label>Cliente</label>
          <div style="font-size:14px;font-weight:600;color:var(--text);">${cli?cli.nome:'—'}</div>
        </div>
        <div class="editor-meta-field">
          <label>Arquiteto</label>
          <div style="font-size:13px;color:var(--text-secondary);">${arq?arq.nome:'—'}</div>
          ${arq&&arq.escritorio?`<div style="font-size:11px;color:var(--text-tertiary);">${arq.escritorio}</div>`:''}
        </div>
        <div class="editor-meta-field">
          <label>Projeto / Obra</label>
          <div style="font-size:13px;font-weight:500;color:var(--text);">${sessao.projeto||'—'}</div>
        </div>
      </div>
    </div>

    <!-- Items table -->
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Produtos da Especificação</div>
          <div class="card-sub">${items.length} produto${items.length!==1?'s':''} adicionado${items.length!==1?'s':''}</div>
        </div>
        ${!isConc?`<button class="btn ${S.addRow?'btn-neutral':'btn-primary'}" id="btnAddRow">
          ${S.addRow?`${SVG('x',13)} Cancelar`:`${SVG('plus',13)} Adicionar Produto`}
        </button>`:''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="min-width:180px;">Produto</th>
            <th>Marca</th><th>Tipo</th><th>Ambiente</th>
            <th style="text-align:center;">Qtd</th>
            <th>Unidade</th>
            <th>Referência</th><th>Código</th>
            <th>Cotar</th><th>Preço</th><th>Prazo</th><th>Separado</th><th>Obs.</th>
            ${!isConc?`<th style="text-align:center;width:72px;">Ações</th>`:''}
          </tr></thead>
          <tbody>
            ${S.addRow&&!isConc?buildAddRow():''}
            ${items.length===0&&!S.addRow?`<tr><td colspan="${isConc?13:14}">${emptyState('box','Nenhum produto adicionado','Use o botão acima para adicionar produtos a esta especificação.')}</td></tr>`:''}
            ${items.map(s=>S.editItemId===s.id?buildEditRow(s):`<tr>
              <td class="td-primary" style="max-width:200px;">${s.produto||'—'}</td>
              <td style="color:var(--text-secondary);">${s.marca||'—'}</td>
              <td>${s.tipo?`<span class="pill pill-gray" style="font-size:10.5px;">${s.tipo}</span>`:'—'}</td>
              <td style="color:var(--text-tertiary);font-size:12px;">${s.ambiente||'—'}</td>
              <td style="text-align:center;font-weight:600;">${s.quantidade||'—'}</td>
              <td style="color:var(--text-secondary);font-size:12px;text-align:center;">${s.unidade||'—'}</td>
              <td style="color:var(--text-tertiary);font-size:12px;">${s.referencia||'—'}</td>
              <td class="td-mono">${s.codigo||'—'}</td>
              <td>${badgeCotar(s.id,s.cotar,isConc)}</td>
              <td style="min-width:80px;">${s.cotar==='COTAR'?`<input type="text" class="inline-price-input" data-spec-id="${s.id}" data-field="preco" value="${esc(s.preco||'')}" placeholder="R$ preço" ${isConc?'disabled':''} style="width:75px;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);"/>`:'<span style="color:var(--text-tertiary)">—</span>'}</td>

const FB_CONFIG={apiKey:"AIzaSyCiPqRI0HJAUXN6gVCiAxSL7FJM66z-ox8",authDomain:"especificacoes-realize.firebaseapp.com",projectId:"especificacoes-realize",storageBucket:"especificacoes-realize.firebasestorage.app",messagingSenderId:"798852174843",appId:"1:798852174843:web:74258a14ebea7a573a715e"};
let fbApp=null,fbAuth=null,fbDb=null;

function initFirebase(){
  if(S.fbInitialized)return;
  try{
    fbApp=firebase.initializeApp(FB_CONFIG);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    S.fbInitialized=true;
    fbAuth.onAuthStateChanged(user=>{
      S.fbUser=user;
      if(user){fbLoad();}
      else{S.fbSyncStatus='idle';render();}
    });
  }catch(e){console.error('Firebase init:',e);}
}

function fbLogin(){
  if(!S.fbInitialized)initFirebase();
  const provider=new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(e=>toast('Erro ao entrar: '+e.message));
}

function fbLogout(){
  fbAuth.signOut().then(()=>{S.fbUser=null;S.fbSyncStatus='idle';toast('Desconectado da nuvem');render();});
}

async function fbLoad(){
  S.fbSyncStatus='syncing';render();
  try{
    const ref=fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main');
    const doc=await ref.get();
    if(doc.exists){
      const d=doc.data();
      const cloudTime=d.updatedAt?.toMillis?.()||0;
      const localMs=S.lastSave?new Date().setHours(...S.lastSave.split(':').map(Number),0,0):0;
      if(cloudTime>=localMs){
        S.arqs=d.arqs||[];S.clis=d.clis||[];S.prods=d.prods||[];
        S.sessoes=d.sessoes||[];S.specs=d.specs||[];
        DB.set('arq',S.arqs);DB.set('cli',S.clis);DB.set('prods',S.prods);
        DB.set('sessoes',S.sessoes);DB.set('specs',S.specs);
        toast('\u2714 Dados carregados da nuvem');
      }else{
        await fbSaveAsync();
        toast('\u2714 Dados locais enviados para a nuvem');
      }
    }else{
      await fbSaveAsync();
      toast('\u2714 Primeira sincroniza\u00e7\u00e3o com a nuvem conclu\u00edda');
    }
    S.fbSyncStatus='synced';
  }catch(e){
    S.fbSyncStatus='error';
    toast('Erro ao sincronizar: '+e.message);
  }
  render();
}

async function fbSaveAsync(){
  if(!S.fbUser||!fbDb)return;
  S.fbSyncStatus='syncing';
  try{
    await fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main').set(
      {arqs:S.arqs,clis:S.clis,sessoes:S.sessoes,specs:S.specs,prods:S.prods,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}
    );
    S.fbSyncStatus='synced';
  }catch(e){
    try{
      const p2=S.prods.map(p=>({...p,imagemPrincipal:'',imagensAplicado:[],gifProduto:''}));
      await fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main').set(
        {arqs:S.arqs,clis:S.clis,sessoes:S.sessoes,specs:S.specs,prods:p2,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}
      );
      S.fbSyncStatus='synced';
    }catch(e2){S.fbSyncStatus='error';}
  }
}


// ===== EXPORT =====
function exportCSVForSessao(sessaoId){
  const s=S.sessoes.find(s=>s.id===sessaoId);if(!s)return;
  const cli=S.clis.find(c=>c.id===s.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessaoId);
  const header=['Projeto','Cliente','Arquiteto','Produto','Marca','Tipo','Ambiente','Quantidade','Referência','Código','Cotar','Separado','Obs.'];
  const rows=items.map(i=>[s.projeto,cli?.nome||'',arq?.nome||'',i.produto,i.marca,i.tipo,i.ambiente,i.quantidade,i.referencia,i.codigo,i.cotar,i.separado,i.obs].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=[header.map(h=>'"'+h+'"'),...rows].map(r=>r.join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${(s.projeto||'especificacao').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('CSV exportado');
}

          <div style="display:flex;align-items:center;justify-content:center;height:100%;background:${hasImages?'var(--accent)':'var(--bg)'};border-right:1px solid ${hasImages?'var(--accent)':'var(--border)'};">${SVG('box',20,hasImages?'icon-white':'')}</div>
          <div style="padding:12px 14px;">

          </div>
        </button>
      </div>
    </div>
  </div></div>`;

function exportPDFComImagens(sessaoId){
  const s=S.sessoes.find(x=>x.id===sessaoId);if(!s)return;
  const cli=S.clis.find(c=>c.id===s.clienteId);

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== BACKUP =====
function backupJSON(){
  const data={arqs:S.arqs,clis:S.clis,prods:S.prods,sessoes:S.sessoes,specs:S.specs,exportedAt:now()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`especificapro_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('Backup exportado');
}
function restoreJSON(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.arqs||!data.clis)throw new Error();
      showConfirm('Restaurar backup','Todos os dados atuais serão substituídos.',file.name,'Esta ação não pode ser desfeita.',()=>{
        S.arqs=data.arqs||[];S.clis=data.clis||[];S.prods=data.prods||[];
        S.sessoes=data.sessoes||[];S.specs=data.specs||[];
        save();toast('Dados restaurados!');
      });
    }catch{toast('Arquivo inválido.');}
  };
  reader.readAsText(file);
}

// ===== AUTOCOMPLETE =====
function hlText(txt,q){if(!q)return txt;const i=txt.toLowerCase().indexOf(q.toLowerCase());if(i<0)return txt;return txt.slice(0,i)+`<mark>${txt.slice(i,i+q.length)}</mark>`+txt.slice(i+q.length);}
function reRenderAC(){
  const container=document.getElementById('acListContainer');if(!container)return;
  container.innerHTML='';if(!S.acOpen)return;
  const div=document.createElement('div');div.className='ac-dropdown';div.id='acList';
  // Position fixed dropdown below the input, escaping overflow:auto parents
  const inp=document.getElementById('arProd');
  if(inp){const r=inp.getBoundingClientRect();div.style.top=(r.bottom+4)+'px';div.style.left=r.left+'px';div.style.width=Math.max(320,r.width)+'px';}
  div.innerHTML=S.acResults.map((p,i)=>`<div class="ac-item ${i===S.acSel?'sel':''}" data-ac-pick="${p.id}"><div class="ac-name">${hlText(p.nome,S.acQuery)}</div><div class="ac-sub">${[p.marca,p.tipo,p.codigo].filter(Boolean).join(' · ')}</div></div>`).join('')+(S.acQuery?`<div class="ac-new" id="acSaveNew"><div class="ac-new-ico">+</div><span>Salvar "<strong>${S.acQuery}</strong>" no catálogo</span></div>`:'');
  container.appendChild(div);
  div.querySelectorAll('[data-ac-pick]').forEach(el=>el.onclick=()=>pickProd(el.dataset.acPick));
  const acn=div.querySelector('#acSaveNew');if(acn)acn.onclick=saveNewFromQuery;
}
function pickProd(id){
  const p=S.prods.find(p=>p.id===id);if(!p)return;
  S.addData={...S.addData,produto:p.nome,marca:p.marca||'',tipo:p.tipo||'',referencia:p.referencia||'',codigo:p.codigo||'',produtoId:id};
  S.acOpen=false;S.acQuery=p.nome;S.acResults=[];
  render();setTimeout(()=>{document.getElementById('arAmb')?.focus();},40);
}
function saveNewFromQuery(){
  const nome=S.acQuery.trim();if(!nome)return;
  const p={id:DB.uid(),nome,marca:'',tipo:'',referencia:'',codigo:'',obs:'',criadoEm:now()};
  S.prods.push(p);save();
  S.addData={...S.addData,produto:nome,produtoId:p.id};
  S.acOpen=false;S.acResults=[];
  toast(`"${nome}" adicionado ao catálogo`);render();
  setTimeout(()=>{document.getElementById('arAmb')?.focus();},40);
}

  });
    const bsp=document.getElementById('btnSaveProd');if(bsp)bsp.onclick=saveProd;
  // media helpers
  function compressImg(file,cb){
    const r=new FileReader();r.onload=ev=>{
      const img=new Image();img.onload=()=>{
        const sc=Math.min(1,800/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        cb(c.toDataURL('image/jpeg',0.82));
      };img.src=ev.target.result;
    };r.readAsDataURL(file);
  }
  if(S.modal==='prod'){
    if(!S._mp)S._mp={imagemPrincipal:S.editItem?.imagemPrincipal||'',gifProduto:S.editItem?.gifProduto||'',imagensAplicado:[...(S.editItem?.imagensAplicado||[])]};
    const fip=document.getElementById('fImgPrincipal');
    if(fip)fip.onchange=function(){if(this.files[0])compressImg(this.files[0],b64=>{S._mp.imagemPrincipal=b64;if(S.editItem)S.editItem.imagemPrincipal=b64;render();});};
