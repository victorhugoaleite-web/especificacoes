  ${cardsHTML}
  <div class="doc-footer">
    <span>Especifica Realize! &middot; ${escHtml(cli?cli.nome:'')} &mdash; ${escHtml(s.projeto||'')}</span>
    <span>Gerado em ${dataGer}</span>
  </div>
</div>
</body></html>`;

  const w=window.open('','_blank');
  if(!w){toast('Permita pop-ups para exportar PDF.');return;}
  w.document.write(html);
  w.document.close();
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== BACKUP =====
function backupJSON(){
  const data={arqs:S.arqs,clis:S.clis,prods:S.prods,sessoes:S.sessoes,specs:S.specs,exportedAt:now()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`especificapro_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('Backup exportado');
}
function restoreJSON(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.arqs||!data.clis)throw new Error();
      showConfirm('Restaurar backup','Todos os dados atuais serão substituídos.',file.name,'Esta ação não pode ser desfeita.',()=>{
        S.arqs=data.arqs||[];S.clis=data.clis||[];S.prods=data.prods||[];
        S.sessoes=data.sessoes||[];S.specs=data.specs||[];
        save();toast('Dados restaurados!');
      });
    }catch{toast('Arquivo inválido.');}
  };
  reader.readAsText(file);
}

// ===== AUTOCOMPLETE =====
function hlText(txt,q){if(!q)return txt;const i=txt.toLowerCase().indexOf(q.toLowerCase());if(i<0)return txt;return txt.slice(0,i)+`<mark>${txt.slice(i,i+q.length)}</mark>`+txt.slice(i+q.length);}
function reRenderAC(){
  // Always clean up previous dropdown (appended directly to body to escape backdrop-filter stacking contexts)
  document.getElementById('acList')?.remove();
  if(!S.acOpen)return;
  const inp=document.getElementById('arProd');
  if(!inp)return;
  const div=document.createElement('div');div.className='ac-dropdown';div.id='acList';
  // Use getBoundingClientRect for true viewport coords — works because we append to body (no transform ancestors)
  const r=inp.getBoundingClientRect();
  const dropH=Math.min(S.acResults.length*48+44,260);
  const spaceBelow=window.innerHeight-r.bottom-8;
  const openUp=spaceBelow<dropH&&r.top>dropH;
  div.style.position='fixed';
  div.style.left=r.left+'px';
  div.style.width=Math.max(280,r.width)+'px';
  div.style.zIndex='9999';
  if(openUp){div.style.bottom=(window.innerHeight-r.top+4)+'px';div.style.top='auto';}
  else{div.style.top=(r.bottom+4)+'px';div.style.bottom='auto';}
  div.innerHTML=S.acResults.map((p,i)=>`<div class="ac-item ${i===S.acSel?'sel':''}" data-ac-pick="${p.id}"><div class="ac-name">${hlText(p.nome,S.acQuery)}</div><div class="ac-sub">${[p.marca,p.tipo,p.codigo].filter(Boolean).join(' · ')}</div></div>`).join('')+(S.acQuery?`<div class="ac-new" id="acSaveNew"><div class="ac-new-ico">+</div><span>Salvar "<strong>${S.acQuery}</strong>" no catálogo</span></div>`:'');
  document.body.appendChild(div);
  div.querySelectorAll('[data-ac-pick]').forEach(el=>el.onclick=()=>pickProd(el.dataset.acPick));
  const acn=div.querySelector('#acSaveNew');if(acn)acn.onclick=saveNewFromQuery;
}
function pickProd(id){
  const p=S.prods.find(p=>p.id===id);if(!p)return;
  S.addData={...S.addData,produto:p.nome,marca:p.marca||'',tipo:p.tipo||'',referencia:p.referencia||'',codigo:p.codigo||'',produtoId:id};
  S.acOpen=false;S.acQuery=p.nome;S.acResults=[];
  render();setTimeout(()=>{document.getElementById('arAmb')?.focus();},40);
}
function saveNewFromQuery(){
  const nome=S.acQuery.trim();if(!nome)return;
  const p={id:DB.uid(),nome,marca:'',tipo:'',referencia:'',codigo:'',obs:'',criadoEm:now()};
  S.prods.push(p);save();
  S.addData={...S.addData,produto:nome,produtoId:p.id};
  S.acOpen=false;S.acResults=[];
  toast(`"${nome}" adicionado ao catálogo`);render();
  setTimeout(()=>{document.getElementById('arAmb')?.focus();},40);
}

// ===== BIND =====
function bind(){
  // Clean up any previous AC outside-click listener to avoid accumulation
  if(window._acOutsideRef){document.removeEventListener('mousedown',window._acOutsideRef);window._acOutsideRef=null;}
  // Close avatar menu when clicking outside
  if(window._avatarOutsideRef){document.removeEventListener('mousedown',window._avatarOutsideRef);window._avatarOutsideRef=null;}
  if(S.avatarMenu){
    window._avatarOutsideRef=e=>{
      const av=document.getElementById('dashAvatar');
      if(av&&!av.contains(e.target)){S.avatarMenu=false;reRenderAC();render();}
    };
    document.addEventListener('mousedown',window._avatarOutsideRef);
  }
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{
    S.page=el.dataset.nav;S.addRow=false;S._err={};S.activeSessaoId=null;
    if(S.sidebarOpen)toggleSidebar();
    render();
  });
  document.querySelectorAll('[data-brand-dir]').forEach(btn=>{
    btn.onpointerdown=e=>{
      e.preventDefault();
      e.stopPropagation();
      scrollBrandCarousel(btn, Number(btn.dataset.brandDir)||1);
    };
    btn.onclick=e=>{
      e.preventDefault();
      e.stopPropagation();
    };
  });
  const btnHam=document.getElementById('btnHamburger');
  if(btnHam)btnHam.onclick=()=>toggleSidebar();
  const sbOv=document.getElementById('sidebarOverlay');
  if(sbOv)sbOv.onclick=()=>toggleSidebar();

  const bd=document.getElementById('btnDark');
  if(bd)bd.onclick=()=>{S.darkMode=!S.darkMode;DB.set('darkMode',S.darkMode);document.body.classList.toggle('dark',S.darkMode);render();};
  const btnFL=document.getElementById('btnFbLogin');if(btnFL)btnFL.onclick=fbLogin;
  const btnFLS=document.getElementById('btnFbLoginSb');if(btnFLS)btnFLS.onclick=fbLogin;
  const btnFU=document.getElementById('btnFbUser');if(btnFU)btnFU.onclick=()=>showConfirm('Sair da nuvem','Deseja desconectar sua conta?',S.fbUser?.displayName||'','Os dados locais serão mantidos.',fbLogout);
  const btnFLO=document.getElementById('btnFbLogout');if(btnFLO)btnFLO.onclick=()=>showConfirm('Sair da nuvem','Deseja desconectar sua conta?',S.fbUser?.displayName||'','Os dados locais serão mantidos.',fbLogout);

  ['btnClose','btnClose2'].forEach(id=>{const b=document.getElementById(id);if(b)b.onclick=closeModal;});
  const mbg=document.getElementById('modalBg');if(mbg)mbg.onclick=e=>{if(e.target.id==='modalBg')closeModal();};
  const bpdf1=document.getElementById('btnPdfComum');if(bpdf1)bpdf1.onclick=()=>{const sid=S._pdfSessaoId;closeModal();if(sid)exportPDFForSessao(sid);};
  const bpdf2=document.getElementById('btnPdfImagens');if(bpdf2)bpdf2.onclick=()=>{const sid=S._pdfSessaoId;closeModal();if(sid)exportPDFComImagens(sid);};
  const bcc=document.getElementById('btnConfirmCancel');if(bcc)bcc.onclick=()=>{S.confirmData=null;render();};
  const bco=document.getElementById('btnConfirmOk');if(bco)bco.onclick=()=>{const fn=S.confirmData?.onConfirm;const before=S._renderSeq||0;S.confirmData=null;if(fn)fn();if((S._renderSeq||0)===before)render();};
  const cbg=document.getElementById('confirmBg');if(cbg)cbg.onclick=e=>{if(e.target.id==='confirmBg'){S.confirmData=null;render();}};
  document.addEventListener('keydown',handleEsc,{once:true});

  // backup
  const bb=document.getElementById('btnBackup');if(bb)bb.onclick=backupJSON;
  const ir=document.getElementById('inputRestore');if(ir)ir.onchange=e=>{if(e.target.files[0])restoreJSON(e.target.files[0]);};

  // catalog
  const cs=document.getElementById('catSearch');if(cs)cs.oninput=e=>{S.catSearch=e.target.value;render();};
  const ct=document.getElementById('catTipo');if(ct)ct.onchange=e=>{S.catTipo=e.target.value;render();};
  const cm=document.getElementById('catMarca');if(cm)cm.onchange=e=>{S.catMarca=e.target.value;render();};
  const bcatClear=document.getElementById('btnCatClear');if(bcatClear)bcatClear.onclick=()=>{S.catSearch='';S.catTipo='';S.catMarca='';S.catSort='';render();};

  // clientes search/filter
  const cliS=document.getElementById('cliSearch');if(cliS)cliS.oninput=e=>{S.cliSearch=e.target.value;render();};
  const cliA=document.getElementById('cliArqId');if(cliA)cliA.onchange=e=>{S.cliArqId=e.target.value;render();};
  const bclc=document.getElementById('btnCliClear');if(bclc)bclc.onclick=()=>{S.cliSearch='';S.cliArqId='';render()};
  const bnp=document.getElementById('btnNovoProd');if(bnp)bnp.onclick=()=>{S.modal='prod';S.editItem=null;S._err={};render();};
  document.querySelectorAll('[data-edit-prod]').forEach(el=>el.onclick=()=>{S.editItem=S.prods.find(p=>p.id===el.dataset.editProd);S.modal='prod';S._err={};render();});
  document.querySelectorAll('[data-del-prod]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.delProd;const p=S.prods.find(p=>p.id===id);
    const uses=S.specs.filter(s=>s.produtoId===id).length;
    showConfirm('Excluir produto','Deseja excluir este produto do catálogo?',p?.nome,uses>0?`Vinculado a ${uses} item(s) de especificações.`:'',()=>{S.prods=S.prods.filter(p=>p.id!==id);save();toast('Produto removido.');});
  });
    const bsp=document.getElementById('btnSaveProd');if(bsp)bsp.onclick=saveProd;
  const bgr=document.getElementById('btnGenReport');if(bgr)bgr.onclick=gerarRelatorio;
  // media helpers
  function compressImg(file,cb){
    const r=new FileReader();r.onload=ev=>{
      const img=new Image();img.onload=()=>{
        const sc=Math.min(1,800/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        cb(c.toDataURL('image/jpeg',0.82));
      };img.src=ev.target.result;
    };r.readAsDataURL(file);
  }
  if(S.modal==='prod'){
    if(!S._mp)S._mp={imagemPrincipal:S.editItem?.imagemPrincipal||'',gifProduto:S.editItem?.gifProduto||'',imagensAplicado:[...(S.editItem?.imagensAplicado||[])]};
    const fip=document.getElementById('fImgPrincipal');
    if(fip)fip.onchange=function(){if(this.files[0])compressImg(this.files[0],b64=>{S._mp.imagemPrincipal=b64;if(S.editItem)S.editItem.imagemPrincipal=b64;render();});};
    const fg=document.getElementById('fGif');
    if(fg)fg.onchange=function(){if(this.files[0]){const r=new FileReader();r.onload=ev=>{S._mp.gifProduto=ev.target.result;if(S.editItem)S.editItem.gifProduto=ev.target.result;render();};r.readAsDataURL(this.files[0]);}};
    document.querySelectorAll('.fImgAplicado').forEach(inp=>inp.onchange=function(){
      if(this.files[0]&&S._mp.imagensAplicado.length<5)
        compressImg(this.files[0],b64=>{S._mp.imagensAplicado.push(b64);if(S.editItem)S.editItem.imagensAplicado=[...S._mp.imagensAplicado];render();});
    });
    document.querySelectorAll('[data-remove]').forEach(btn=>btn.onclick=function(e){e.stopPropagation();
      S._mp[this.dataset.remove]='';if(S.editItem)S.editItem[this.dataset.remove]='';render();});
    document.querySelectorAll('[data-remove-applied]').forEach(btn=>btn.onclick=function(e){e.stopPropagation();
      const i=parseInt(this.dataset.removeApplied);S._mp.imagensAplicado=S._mp.imagensAplicado.filter((_,j)=>j!==i);
      if(S.editItem)S.editItem.imagensAplicado=[...S._mp.imagensAplicado];render();});
  }

  // arquitetos
  const ars=document.getElementById('arqSearch');if(ars)ars.oninput=e=>{S.arqSearch=e.target.value;render();};
  const bna=document.getElementById('btnNovoArq');if(bna)bna.onclick=()=>{S.modal='arq';S.editItem=null;S._err={};render();};
  document.querySelectorAll('[data-edit-arq]').forEach(el=>el.onclick=()=>{S.editItem=S.arqs.find(a=>a.id===el.dataset.editArq);S.modal='arq';S._err={};render();});
  document.querySelectorAll('[data-del-arq]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.delArq;const a=S.arqs.find(a=>a.id===id);const n=S.clis.filter(c=>c.arquitetoId===id).length;
    showConfirm('Excluir arquiteto','Deseja excluir este arquiteto?',a?.nome,n>0?`Vinculado a ${n} cliente(s).`:'',()=>{S.arqs=S.arqs.filter(a=>a.id!==id);save();toast('Arquiteto excluído.');});
  });
  const bsa=document.getElementById('btnSaveArq');if(bsa)bsa.onclick=saveArq;

  // clientes
  const bnc=document.getElementById('btnNovoCli');if(bnc)bnc.onclick=()=>{S.modal='cli';S.editItem=null;S._err={};render();};
  document.querySelectorAll('[data-edit-cli]').forEach(el=>el.onclick=()=>{S.editItem=S.clis.find(c=>c.id===el.dataset.editCli);S.modal='cli';S._err={};render();});
  document.querySelectorAll('[data-del-cli]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.delCli;const c=S.clis.find(c=>c.id===id);const n=S.sessoes.filter(s=>s.clienteId===id).length;
    showConfirm('Excluir cliente','Deseja excluir este cliente?',c?.nome,n>0?`Serão excluídas ${n} especificação(ões) vinculadas.`:'',()=>{
      S.clis=S.clis.filter(c=>c.id!==id);
      const sids=S.sessoes.filter(s=>s.clienteId===id).map(s=>s.id);
      S.sessoes=S.sessoes.filter(s=>s.clienteId!==id);
      S.specs=S.specs.filter(s=>!sids.includes(s.sessaoId));
      save();toast('Cliente excluído.');
    });
  });
  const bsc=document.getElementById('btnSaveCli');if(bsc)bsc.onclick=saveCli;
  document.querySelectorAll('[data-ver-cli]').forEach(el=>el.onclick=()=>{
    S.page='specs';S._fCliId=el.dataset.verCli;render();
  });

  // specs list
  const fss=document.getElementById('fSessaoStatus');if(fss)fss.onchange=e=>{S.fSessaoStatus=e.target.value;render();};
  const fArq=document.getElementById('fArqId');if(fArq)fArq.onchange=e=>{S.fArqId=e.target.value;render();};
  const fCli=document.getElementById('fCliId');if(fCli)fCli.onchange=e=>{S.fCliId=e.target.value;render();};
  const fCot=document.getElementById('fCotacaoStatus');if(fCot)fCot.onchange=e=>{S.fCotacaoStatus=e.target.value;render();};
  const fVen=document.getElementById('fVendaStatus');if(fVen)fVen.onchange=e=>{S.fVendaStatus=e.target.value;render();};
  const btnClrF=document.getElementById('btnClearFilters');if(btnClrF)btnClrF.onclick=()=>{S.fSessaoStatus='';S.fArqId='';S.fCliId='';S.fCotacaoStatus='';S.fVendaStatus='';render();};
  const fIS=document.getElementById('fItemSearch');if(fIS){fIS.oninput=e=>{S.fItemSearch=e.target.value;render();};fIS.addEventListener('keydown',e=>{if(e.key==='Escape'){S.fItemSearch='';render();}});}
  const btnClrIS=document.getElementById('btnClearItemSearch');if(btnClrIS)btnClrIS.onclick=()=>{S.fItemSearch='';render();};
  // venda status in editor
  const selVS=document.getElementById('selVendaStatus');if(selVS)selVS.onchange=e=>{
    const s=getActiveSessao();if(!s)return;
    const next=e.target.value||undefined;
    s.vendaStatus=next;
    if(next==='vendido'&&!s.vendidoEm)s.vendidoEm=new Date().toISOString();
    if(next==='cancelado'&&!s.canceladoEm)s.canceladoEm=new Date().toISOString();
    if(!next){delete s.vendidoEm;delete s.canceladoEm;}
    save();render();
  };
  const bns=document.getElementById('btnNovaSpec');
  if(bns)bns.onclick=()=>{S.modal='nova-spec';S._err={};S._nsCliente='';S._nsProjeto='';render();};

  // spec cards
  document.querySelectorAll('[data-open-spec]').forEach(el=>el.onclick=e=>{
    if(e.target.closest('[data-del-sessao]')||e.target.closest('[data-export-spec]'))return;
    const id=el.dataset.openSpec;S.activeSessaoId=id;S.addRow=false;S.addData={};S.page='spec-editor';render();
  });
  document.querySelectorAll('[data-export-spec]').forEach(el=>el.onclick=e=>{e.stopPropagation();exportCSVForSessao(el.dataset.exportSpec);});
  document.querySelectorAll('[data-export-pdf]').forEach(el=>el.onclick=e=>{e.stopPropagation();S._pdfSessaoId=el.dataset.exportPdf;S.modal='pdf-options';render();});
  document.querySelectorAll('[data-del-sessao]').forEach(el=>el.onclick=e=>{
    confirmDeleteSessao(el.dataset.delSessao,e);
  });

  // nova spec modal
  const nsCli=document.getElementById('nsCliente');
  if(nsCli){
    nsCli.onchange=e=>{
      S._nsCliente=e.target.value;
      // auto-fill architect field
      const ar=document.getElementById('nsArqNome');
      const row=document.getElementById('nsArqRow');
      if(ar&&row){
        if(S._nsCliente){
          const c=S.clis.find(c=>c.id===S._nsCliente);
          const a=c?S.arqs.find(a=>a.id===c.arquitetoId):null;
          ar.value=a?a.nome+' — '+(a.escritorio||''):'Sem arquiteto vinculado';
          // Auto-fill project from client.obra
          const proj=document.getElementById('nsProjeto');
          if(proj&&c?.obra&&!proj.value)proj.value=c.obra;
          row.style.opacity='1';row.style.pointerEvents='auto';
        }else{
          ar.value='';row.style.opacity='.4';row.style.pointerEvents='none';
        }
      }
    };
  }
  const nsProj=document.getElementById('nsProjeto');if(nsProj)nsProj.oninput=e=>{S._nsProjeto=e.target.value;};
  const btnCriar=document.getElementById('btnCriarSpec');if(btnCriar)btnCriar.onclick=criarSpec;

  // spec editor
  const btnBack=document.getElementById('btnBackToSpecs');if(btnBack)btnBack.onclick=()=>{S.page='specs';S.activeSessaoId=null;S.addRow=false;S.sidebarOpen=false;render();};
  const btnConc=document.getElementById('btnConcluirSpec');if(btnConc)btnConc.onclick=concluirSpec;
  const btnReopen=document.getElementById('btnReopenSpec');if(btnReopen)btnReopen.onclick=reabrirSpec;
  document.querySelectorAll('[data-spec-filter-kind]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const kind=el.dataset.specFilterKind;
    const value=el.dataset.specFilterValue;
    if(!kind)return;
    S.specFilter=Object.assign({},S.specFilter||{});
    if(sameSpecFilterValue(S.specFilter[kind],value))delete S.specFilter[kind];
    else S.specFilter[kind]=value;
    S.openDrop='specFilterV2';
    render();
  });
  document.querySelectorAll('[data-clear-spec-filter]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    S.specFilter={};
    S.openDrop='specFilterV2';
    render();
  });
  const btnApplySpecFilter=document.getElementById('btnApplySpecFilter');if(btnApplySpecFilter)btnApplySpecFilter.onclick=e=>{e.stopPropagation();S.openDrop=null;render();};
  document.querySelectorAll('[data-close-spec-filter]').forEach(el=>el.onclick=()=>{S.openDrop=null;render();});
  const btnExpE=document.getElementById('btnExportCSVEditor');if(btnExpE)btnExpE.onclick=()=>{if(S.activeSessaoId)exportCSVForSessao(S.activeSessaoId);};
  const btnExpPDF=document.getElementById('btnExportPDFEditor');if(btnExpPDF)btnExpPDF.onclick=()=>{if(S.activeSessaoId){S._pdfSessaoId=S.activeSessaoId;S.modal='pdf-options';render();}};

  // add row toggle (editor)
  const bar=document.getElementById('btnAddRow');if(bar)bar.onclick=()=>{S.addRow=!S.addRow;S.addData={cotar:'NÃO COTAR',separado:'NÃO SEPARADO'};S.acOpen=false;S.acResults=[];S.acQuery='';render();};

  // add row fields
  [['arMarca','marca'],['arTipo','tipo'],['arAmb','ambiente'],['arQtd','quantidade'],['arRef','referencia'],['arCod','codigo'],['arCotar','cotar'],['arSep','separado'],['arObs','obs']].forEach(([id,k])=>{
    const el=document.getElementById(id);if(el)el.oninput=el.onchange=e=>{S.addData[k]=e.target.value;};
  });

  // autocomplete
  const arProd=document.getElementById('arProd');
  if(arProd){
    arProd.oninput=e=>{
      const q=e.target.value;S.addData.produto=q;S.acQuery=q;
      S.acResults=searchProds(q);S.acOpen=q.length>0;S.acSel=-1;reRenderAC();
    };
    arProd.onkeydown=e=>{
      if(!S.acOpen)return;
      const total=S.acResults.length+(S.acQuery?1:0);
      if(e.key==='ArrowDown'){e.preventDefault();S.acSel=Math.min(S.acSel+1,total-1);reRenderAC();}
      else if(e.key==='ArrowUp'){e.preventDefault();S.acSel=Math.max(S.acSel-1,-1);reRenderAC();}
      else if(e.key==='Enter'){e.preventDefault();if(S.acSel>=0&&S.acSel<S.acResults.length)pickProd(S.acResults[S.acSel].id);else saveNewFromQuery();}
      else if(e.key==='Escape'){S.acOpen=false;reRenderAC();}
      else if(e.key==='Tab'&&S.acResults.length>0){e.preventDefault();pickProd(S.acResults[0].id);}
    };
    arProd.onfocus=()=>{if(S.acQuery&&S.acResults.length){S.acOpen=true;reRenderAC();}};
    // Close dropdown when clicking outside (use mousedown so it fires before blur)
    window._acOutsideRef=e=>{
      const ac=document.getElementById('acList');
      if(ac&&!ac.contains(e.target)&&e.target!==arProd){S.acOpen=false;reRenderAC();}
    };
    document.addEventListener('mousedown',window._acOutsideRef);
    arProd.onblur=e=>{
      // Small delay so click on ac-item fires first
      setTimeout(()=>{if(!document.getElementById('acList')?.contains(document.activeElement)){S.acOpen=false;reRenderAC();}},150);
    };
  }
  const bsi=document.getElementById('btnSaveItem');if(bsi)bsi.onclick=saveItemInline;

  // delete item
  // edit item
  document.querySelectorAll('[data-edit-item]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    S.editItemId=el.dataset.editItem;S.editData={};S.addRow=false;render();
    setTimeout(()=>document.getElementById('eiProd')?.focus(),40);
  });
  const bse=document.getElementById('btnSaveEdit');
  if(bse)bse.onclick=()=>{
    const id=bse.dataset.editId;
    const s=S.specs.find(s=>s.id===id);if(!s)return;
    const prod=document.getElementById('eiProd')?.value.trim();if(!prod)return;
    s.produto=prod;
    s.marca=gv('eiMarca');s.tipo=gv('eiTipo');s.ambiente=gv('eiAmb');
    const qtd=gv('eiQtd');if(qtd&&!validateQtd(qtd))return;
    s.quantidade=qtd;s.unidade=gv('eiUnid');
    s.referencia=gv('eiRef');s.codigo=gv('eiCod');
    s.cotar=gv('eiCotar');s.preco=gv('eiPreco');s.prazo=gv('eiPrazo');
    s.separado=gv('eiSep');s.obs=gv('eiObs');
    S.editItemId=null;S.editData={};save();
    toast('Produto atualizado');
  };
  const bce=document.getElementById('btnCancelEdit');
  if(bce)bce.onclick=()=>{S.editItemId=null;S.editData={};render();};

  document.querySelectorAll('[data-del-item]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.delItem;const item=S.specs.find(s=>s.id===id);
    showConfirm('Remover produto','Remover este produto da especificação?',item?.produto,'',()=>{S.specs=S.specs.filter(s=>s.id!==id);save();toast('Produto removido.');});
  });

  // cycle badges
  document.querySelectorAll('[data-cyc-cotar]').forEach(el=>el.onclick=()=>{
    const s=S.specs.find(s=>s.id===el.dataset.cycCotar);if(!s)return;
    s.cotar=COTAR[(COTAR.indexOf(s.cotar)+1)%COTAR.length];save();render();
  });
  document.querySelectorAll('[data-cyc-sep]').forEach(el=>el.onclick=()=>{
    const s=S.specs.find(s=>s.id===el.dataset.cycSep);if(!s)return;
    s.separado=SEP[(SEP.indexOf(s.separado)+1)%SEP.length];save();render();
  });

  // inline price/prazo
  document.querySelectorAll('.inline-price-input').forEach(el=>{
    el.onchange=function(){
      const s=S.specs.find(s=>s.id===el.dataset.specId);if(!s)return;
      s[el.dataset.field]=el.value.trim();save();
    };
    el.onclick=e=>e.stopPropagation();
  });

  // stat cards
  document.querySelectorAll('.stat-card[data-nav]').forEach(el=>el.onclick=()=>{S.page=el.dataset.nav;render();});
}

function handleEsc(e){
  if(e.key==='Escape'){
    if(S.confirmData){S.confirmData=null;render();}
    else if(S.modal){closeModal();}
  }else{document.addEventListener('keydown',handleEsc,{once:true});}
}

// ===== SAVE FUNCTIONS =====
function closeModal(){S.modal=null;S.editItem=null;S._err={};S._nsCliente='';S._nsProjeto='';S._mp=null;render();}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}

function criarSpec(){
  const cliId=gv('nsCliente');const projeto=v('nsProjeto');
  const er={};
  if(!cliId)er.cliente='Selecione o cliente';
  if(!projeto)er.projeto='Informe o projeto ou obra';
  if(Object.keys(er).length){S._err=er;S.modal='nova-spec';render();return;}
  const sessao={id:DB.uid(),clienteId:cliId,projeto,status:'rascunho',criadoEm:now(),concluidoEm:null};
  S.sessoes.push(sessao);save();
  S.activeSessaoId=sessao.id;S.page='spec-editor';S.addRow=true;S.addData={cotar:'NÃO COTAR',separado:'NÃO SEPARADO'};
  closeModal();
}

function concluirSpec(){
  const s=getActiveSessao();if(!s)return;
  s.status='concluida';s.concluidoEm=now();
  S.addRow=false;save();
  toast('Especificação concluída!');
}

function reabrirSpec(){
  const s=getActiveSessao();if(!s)return;
  s.status='rascunho';s.concluidoEm=null;
  save();toast('Especificação reaberta como rascunho.');
}

function saveItemInline(){
  const prod=gv('arProd');
  if(!prod.trim()){const el=document.getElementById('arProd');if(el){el.classList.add('err');el.focus();}return;}
  let produtoId=S.addData.produtoId||'';
  if(!produtoId){
    const ex=S.prods.find(p=>p.nome.toLowerCase()===prod.trim().toLowerCase());
    if(ex){produtoId=ex.id;}
    else{const np={id:DB.uid(),nome:prod.trim(),marca:gv('arMarca'),tipo:gv('arTipo'),referencia:gv('arRef'),codigo:gv('arCod'),obs:'',criadoEm:now()};S.prods.push(np);produtoId=np.id;}
  }
  const qtd=gv('arQtd');
  if(qtd&&!validateQtd(qtd)){const el=document.getElementById('arQtd');if(el){el.classList.add('err');el.focus();}return;}
  const obj={id:DB.uid(),sessaoId:S.activeSessaoId,produtoId,produto:prod.trim(),marca:gv('arMarca'),tipo:gv('arTipo'),ambiente:gv('arAmb'),quantidade:qtd,referencia:gv('arRef'),codigo:gv('arCod'),cotar:gv('arCotar'),separado:gv('arSep'),obs:gv('arObs'),unidade:gv('arUnid'),preco:'',prazo:'',criadoEm:now()};
  S.specs.push(obj);
  S.addData={cotar:obj.cotar,separado:obj.separado};
  save();render();
  setTimeout(()=>{const el=document.getElementById('arProd');if(el){el.value='';el.focus();}},40);
}

function saveProd(){
  const nome=v('fNome');if(!nome){S._err={nome:'Obrigatório'};S.modal='prod';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,marca:v('fMarca'),tipo:v('fTipo'),referencia:v('fRef'),codigo:v('fCod'),unidade:gv('fUnid'),obs:v('fObs'),fornecedorUrl:v('fFornUrl'),videoUrl:v('fVideoUrl'),imagemPrincipal:S._mp?.imagemPrincipal??S.editItem?.imagemPrincipal??'',gifProduto:S._mp?.gifProduto??S.editItem?.gifProduto??'',imagensAplicado:S._mp?.imagensAplicado??S.editItem?.imagensAplicado??[],criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.prods=S.prods.map(p=>p.id===obj.id?obj:p);else S.prods.push(obj);
  save();closeModal();toast('Produto salvo no catálogo');
}
function saveArq(){
  const nome=v('fNome');const email=v('fEmail');const er={};
  if(!nome)er.nome='Obrigatório';if(email&&!validateEmail(email))er.email='E-mail inválido';
  if(Object.keys(er).length){S._err=er;S.modal='arq';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,escritorio:v('fEsc'),aniversario:gv('fAniv'),email,tel:v('fTel'),obs:v('fObs'),criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.arqs=S.arqs.map(a=>a.id===obj.id?obj:a);else S.arqs.push(obj);
  save();closeModal();toast('Arquiteto salvo');
}
function deleteSessaoById(id){
  const existed=S.sessoes.some(s=>s.id===id);
  S.sessoes=S.sessoes.filter(s=>s.id!==id);
  S.specs=S.specs.filter(s=>s.sessaoId!==id);
  if(S.activeSessaoId===id){
    S.activeSessaoId=null;
    S.addRow=false;
    S.addData={};
    S.editItemId=null;
    S.editData={};
    S.page='specs';
  }
  save();
  if(existed)toast('Especificação excluída.');
  render();
}
function confirmDeleteSessao(id,e){
  if(e)e.stopPropagation();
  const s=S.sessoes.find(s=>s.id===id);
  const n=sessaoItems(id).length;
  showConfirm('Excluir especificação','Deseja excluir esta especificação?',s?.projeto,n>0?`${n} produto(s) serão removidos.`:'',()=>deleteSessaoById(id));
}
function saveCli(){
  const nome=v('fNome');const email=v('fEmail');const er={};
  if(!nome)er.nome='Obrigatório';if(email&&!validateEmail(email))er.email='E-mail inválido';
  if(Object.keys(er).length){S._err=er;S.modal='cli';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,arquitetoId:v('fArq'),email,tel:v('fTel'),obra:v('fObra'),endereco:v('fEnd'),obs:v('fObs'),criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.clis=S.clis.map(c=>c.id===obj.id?obj:c);else S.clis.push(obj);
  save();closeModal();toast('Cliente salvo');
}

render();

initFirebase();

  // Create a canvas icon with white background so logo is visible on any wallpaper
  function makeCompositeIcon(size, callback){
    var canvas=document.createElement('canvas');
    canvas.width=size;canvas.height=size;
    var ctx=canvas.getContext('2d');
    // White rounded background
    var r=size*0.2;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();
    ctx.fillStyle='#ffffff';ctx.fill();
    // Draw logo centered with padding
    var img=new Image();
    img.onload=function(){
      var pad=size*0.15;
      ctx.drawImage(img,pad,pad,size-pad*2,size-pad*2);
      callback(canvas.toDataURL('image/png'));
    };
    img.onerror=function(){callback(rawIconUrl);};
    img.src=rawIconUrl;
  }

  document.getElementById('pwaBannerClose').onclick=function(){banner.remove();DB.set('pwabannerDismissed',true);};
}
setupPWA();
</script>
