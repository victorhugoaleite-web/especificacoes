  const fVen=document.getElementById('fVendaStatus');if(fVen)fVen.onchange=e=>{S.fVendaStatus=e.target.value;render();};
  const btnClrF=document.getElementById('btnClearFilters');if(btnClrF)btnClrF.onclick=()=>{S.fSessaoStatus='';S.fArqId='';S.fCliId='';S.fCotacaoStatus='';S.fVendaStatus='';render();};
  const fIS=document.getElementById('fItemSearch');if(fIS){fIS.oninput=e=>{S.fItemSearch=e.target.value;render();};fIS.addEventListener('keydown',e=>{if(e.key==='Escape'){S.fItemSearch='';render();}});}
  const btnClrIS=document.getElementById('btnClearItemSearch');if(btnClrIS)btnClrIS.onclick=()=>{S.fItemSearch='';render();};
  // venda status in editor
  const selVS=document.getElementById('selVendaStatus');if(selVS)selVS.onchange=e=>{const s=getActiveSessao();if(!s)return;s.vendaStatus=e.target.value||undefined;save();render();};
  const bns=document.getElementById('btnNovaSpec');
  if(bns)bns.onclick=()=>{S.modal='nova-spec';S._err={};S._nsCliente='';S._nsProjeto='';render();};

  // spec cards
  document.querySelectorAll('[data-open-spec]').forEach(el=>el.onclick=e=>{
    if(e.target.closest('[data-del-sessao]')||e.target.closest('[data-export-spec]'))return;
    const id=el.dataset.openSpec;S.activeSessaoId=id;S.addRow=false;S.addData={};S.page='spec-editor';render();
  });
  document.querySelectorAll('[data-export-spec]').forEach(el=>el.onclick=e=>{e.stopPropagation();exportCSVForSessao(el.dataset.exportSpec);});
  document.querySelectorAll('[data-export-pdf]').forEach(el=>el.onclick=e=>{e.stopPropagation();S._pdfSessaoId=el.dataset.exportPdf;S.modal='pdf-options';render();});
  document.querySelectorAll('[data-del-sessao]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const id=el.dataset.delSessao;const s=S.sessoes.find(s=>s.id===id);
    const n=sessaoItems(id).length;
    showConfirm('Excluir especificação','Deseja excluir esta especificação?',s?.projeto,n>0?`${n} produto(s) serão removidos.`:'',()=>{
      S.sessoes=S.sessoes.filter(s=>s.id!==id);
      S.specs=S.specs.filter(s=>s.sessaoId!==id);
      save();toast('Especificação excluída.');
    });
  });

  // nova spec modal
  const nsCli=document.getElementById('nsCliente');
  if(nsCli){
    nsCli.onchange=e=>{
      S._nsCliente=e.target.value;
      // auto-fill architect field
      const ar=document.getElementById('nsArqNome');
      const row=document.getElementById('nsArqRow');
      if(ar&&row){
        if(S._nsCliente){
          const c=S.clis.find(c=>c.id===S._nsCliente);
          const a=c?S.arqs.find(a=>a.id===c.arquitetoId):null;
          ar.value=a?a.nome+' — '+(a.escritorio||''):'Sem arquiteto vinculado';
          // Auto-fill project from client.obra
          const proj=document.getElementById('nsProjeto');
          if(proj&&c?.obra&&!proj.value)proj.value=c.obra;
          row.style.opacity='1';row.style.pointerEvents='auto';
        }else{
          ar.value='';row.style.opacity='.4';row.style.pointerEvents='none';
        }
      }
    };
  }
  const nsProj=document.getElementById('nsProjeto');if(nsProj)nsProj.oninput=e=>{S._nsProjeto=e.target.value;};
  const btnCriar=document.getElementById('btnCriarSpec');if(btnCriar)btnCriar.onclick=criarSpec;

  // spec editor
  const btnBack=document.getElementById('btnBackToSpecs');if(btnBack)btnBack.onclick=()=>{S.page='specs';S.activeSessaoId=null;S.addRow=false;S.sidebarOpen=false;render();};
  const btnConc=document.getElementById('btnConcluirSpec');if(btnConc)btnConc.onclick=concluirSpec;
  const btnReopen=document.getElementById('btnReopenSpec');if(btnReopen)btnReopen.onclick=reabrirSpec;
  const btnExpE=document.getElementById('btnExportCSVEditor');if(btnExpE)btnExpE.onclick=()=>{if(S.activeSessaoId)exportCSVForSessao(S.activeSessaoId);};
  const btnExpPDF=document.getElementById('btnExportPDFEditor');if(btnExpPDF)btnExpPDF.onclick=()=>{if(S.activeSessaoId){S._pdfSessaoId=S.activeSessaoId;S.modal='pdf-options';render();}};

  // add row toggle (editor)
  const bar=document.getElementById('btnAddRow');if(bar)bar.onclick=()=>{S.addRow=!S.addRow;S.addData={};S.acOpen=false;S.acResults=[];S.acQuery='';render();};

  // add row fields
  [['arMarca','marca'],['arTipo','tipo'],['arAmb','ambiente'],['arQtd','quantidade'],['arRef','referencia'],['arCod','codigo'],['arCotar','cotar'],['arSep','separado'],['arObs','obs']].forEach(([id,k])=>{
    const el=document.getElementById(id);if(el)el.oninput=el.onchange=e=>{S.addData[k]=e.target.value;};
  });

  // autocomplete
  const arProd=document.getElementById('arProd');
  if(arProd){
    arProd.oninput=e=>{
      const q=e.target.value;S.addData.produto=q;S.acQuery=q;
      S.acResults=searchProds(q);S.acOpen=q.length>0;S.acSel=-1;reRenderAC();
    };
    arProd.onkeydown=e=>{
      if(!S.acOpen)return;
      const total=S.acResults.length+(S.acQuery?1:0);
      if(e.key==='ArrowDown'){e.preventDefault();S.acSel=Math.min(S.acSel+1,total-1);reRenderAC();}
      else if(e.key==='ArrowUp'){e.preventDefault();S.acSel=Math.max(S.acSel-1,-1);reRenderAC();}
      else if(e.key==='Enter'){e.preventDefault();if(S.acSel>=0&&S.acSel<S.acResults.length)pickProd(S.acResults[S.acSel].id);else saveNewFromQuery();}
      else if(e.key==='Escape'){S.acOpen=false;reRenderAC();}
      else if(e.key==='Tab'&&S.acResults.length>0){e.preventDefault();pickProd(S.acResults[0].id);}
    };
    arProd.onfocus=()=>{if(S.acQuery&&S.acResults.length){S.acOpen=true;reRenderAC();}};
  }
  const bsi=document.getElementById('btnSaveItem');if(bsi)bsi.onclick=saveItemInline;

  // delete item
  // edit item
  document.querySelectorAll('[data-edit-item]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    S.editItemId=el.dataset.editItem;S.editData={};S.addRow=false;render();
    setTimeout(()=>document.getElementById('eiProd')?.focus(),40);
  });
  const bse=document.getElementById('btnSaveEdit');
  if(bse)bse.onclick=()=>{
    const id=bse.dataset.editId;
    const s=S.specs.find(s=>s.id===id);if(!s)return;
    const prod=document.getElementById('eiProd')?.value.trim();if(!prod)return;
    s.produto=prod;
    s.marca=gv('eiMarca');s.tipo=gv('eiTipo');s.ambiente=gv('eiAmb');
    const qtd=gv('eiQtd');if(qtd&&!validateQtd(qtd))return;
    s.quantidade=qtd;s.unidade=gv('eiUnid');
    s.referencia=gv('eiRef');s.codigo=gv('eiCod');
    s.cotar=gv('eiCotar');s.preco=gv('eiPreco');s.prazo=gv('eiPrazo');
    s.separado=gv('eiSep');s.obs=gv('eiObs');
    S.editItemId=null;S.editData={};save();render();
    toast('Produto atualizado');
  };
  const bce=document.getElementById('btnCancelEdit');
  if(bce)bce.onclick=()=>{S.editItemId=null;S.editData={};render();};

  document.querySelectorAll('[data-del-item]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.delItem;const item=S.specs.find(s=>s.id===id);

  });

  // cycle badges
  document.querySelectorAll('[data-cyc-cotar]').forEach(el=>el.onclick=()=>{
    const s=S.specs.find(s=>s.id===el.dataset.cycCotar);if(!s)return;
    s.cotar=COTAR[(COTAR.indexOf(s.cotar)+1)%COTAR.length];save();render();
  });
  document.querySelectorAll('[data-cyc-sep]').forEach(el=>el.onclick=()=>{
    const s=S.specs.find(s=>s.id===el.dataset.cycSep);if(!s)return;
    s.separado=SEP[(SEP.indexOf(s.separado)+1)%SEP.length];save();render();
  });

  // inline price/prazo
  document.querySelectorAll('.inline-price-input').forEach(el=>{
    el.onchange=function(){
      const s=S.specs.find(s=>s.id===el.dataset.specId);if(!s)return;
      s[el.dataset.field]=el.value.trim();save();
    };
    el.onclick=e=>e.stopPropagation();
  });

  // stat cards
  document.querySelectorAll('.stat-card[data-nav]').forEach(el=>el.onclick=()=>{S.page=el.dataset.nav;render();});
}

function handleEsc(e){
  if(e.key==='Escape'){
    if(S.confirmData){S.confirmData=null;render();}
    else if(S.modal){closeModal();}
  }else{document.addEventListener('keydown',handleEsc,{once:true});}
}

// ===== SAVE FUNCTIONS =====
function closeModal(){S.modal=null;S.editItem=null;S._err={};S._nsCliente='';S._nsProjeto='';S._mp=null;render();}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}

function criarSpec(){
  const cliId=gv('nsCliente');const projeto=v('nsProjeto');
  const er={};
  if(!cliId)er.cliente='Selecione o cliente';
  if(!projeto)er.projeto='Informe o projeto ou obra';
  if(Object.keys(er).length){S._err=er;S.modal='nova-spec';render();return;}
  const sessao={id:DB.uid(),clienteId:cliId,projeto,status:'rascunho',criadoEm:now(),concluidoEm:null};
  S.sessoes.push(sessao);save();
  S.activeSessaoId=sessao.id;S.page='spec-editor';S.addRow=true;S.addData={};
  closeModal();
}

function concluirSpec(){
  const s=getActiveSessao();if(!s)return;
  s.status='concluida';s.concluidoEm=now();
  S.addRow=false;save();
  toast('Especificação concluída!');render();
}

function reabrirSpec(){
  const s=getActiveSessao();if(!s)return;
  s.status='rascunho';s.concluidoEm=null;
  save();toast('Especificação reaberta como rascunho.');render();
}

function saveItemInline(){
  const prod=gv('arProd');
  if(!prod.trim()){const el=document.getElementById('arProd');if(el){el.classList.add('err');el.focus();}return;}
  let produtoId=S.addData.produtoId||'';
  if(!produtoId){
    const ex=S.prods.find(p=>p.nome.toLowerCase()===prod.trim().toLowerCase());
    if(ex){produtoId=ex.id;}
    else{const np={id:DB.uid(),nome:prod.trim(),marca:gv('arMarca'),tipo:gv('arTipo'),referencia:gv('arRef'),codigo:gv('arCod'),obs:'',criadoEm:now()};S.prods.push(np);produtoId=np.id;}
  }
  const qtd=gv('arQtd');
  if(qtd&&!validateQtd(qtd)){const el=document.getElementById('arQtd');if(el){el.classList.add('err');el.focus();}return;}
  const obj={id:DB.uid(),sessaoId:S.activeSessaoId,produtoId,produto:prod.trim(),marca:gv('arMarca'),tipo:gv('arTipo'),ambiente:gv('arAmb'),quantidade:qtd,referencia:gv('arRef'),codigo:gv('arCod'),cotar:gv('arCotar'),separado:gv('arSep'),obs:gv('arObs'),unidade:gv('arUnid'),preco:'',prazo:'',criadoEm:now()};
  S.specs.push(obj);
  S.addData={cotar:obj.cotar,separado:obj.separado};
  save();render();
  setTimeout(()=>{const el=document.getElementById('arProd');if(el){el.value='';el.focus();}},40);
}

function saveProd(){
  const nome=v('fNome');if(!nome){S._err={nome:'Obrigatório'};S.modal='prod';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,marca:v('fMarca'),tipo:v('fTipo'),referencia:v('fRef'),codigo:v('fCod'),unidade:gv('fUnid'),obs:v('fObs'),fornecedorUrl:v('fFornUrl'),videoUrl:v('fVideoUrl'),imagemPrincipal:S._mp?.imagemPrincipal??S.editItem?.imagemPrincipal??'',gifProduto:S._mp?.gifProduto??S.editItem?.gifProduto??'',imagensAplicado:S._mp?.imagensAplicado??S.editItem?.imagensAplicado??[],criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.prods=S.prods.map(p=>p.id===obj.id?obj:p);else S.prods.push(obj);
  save();closeModal();toast('Produto salvo no catálogo');
}
function saveArq(){
  const nome=v('fNome');const email=v('fEmail');const er={};
  if(!nome)er.nome='Obrigatório';if(email&&!validateEmail(email))er.email='E-mail inválido';
  if(Object.keys(er).length){S._err=er;S.modal='arq';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,escritorio:v('fEsc'),email,tel:v('fTel'),obs:v('fObs'),criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.arqs=S.arqs.map(a=>a.id===obj.id?obj:a);else S.arqs.push(obj);
  save();closeModal();toast('Arquiteto salvo');
}
function saveCli(){
  const nome=v('fNome');const email=v('fEmail');const er={};
  if(!nome)er.nome='Obrigatório';if(email&&!validateEmail(email))er.email='E-mail inválido';
  if(Object.keys(er).length){S._err=er;S.modal='cli';render();return;}
  const obj={id:S.editItem?.id||DB.uid(),nome,arquitetoId:v('fArq'),email,tel:v('fTel'),obra:v('fObra'),endereco:v('fEnd'),obs:v('fObs'),criadoEm:S.editItem?.criadoEm||now(),atualizadoEm:now()};
  if(S.editItem)S.clis=S.clis.map(c=>c.id===obj.id?obj:c);else S.clis.push(obj);
  save();closeModal();toast('Cliente salvo');
}

render();
initFirebase();

  // Create a canvas icon with white background so logo is visible on any wallpaper
  function makeCompositeIcon(size, callback){
    var canvas=document.createElement('canvas');
    canvas.width=size;canvas.height=size;
    var ctx=canvas.getContext('2d');
    // White rounded background
    var r=size*0.2;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();
    ctx.fillStyle='#ffffff';ctx.fill();
    // Draw logo centered with padding
    var img=new Image();
    img.onload=function(){
      var pad=size*0.15;
      ctx.drawImage(img,pad,pad,size-pad*2,size-pad*2);
      callback(canvas.toDataURL('image/png'));
    };
    img.onerror=function(){callback(rawIconUrl);};
    img.src=rawIconUrl;
  }

  document.getElementById('pwaBannerClose').onclick=function(){banner.remove();DB.set('pwabannerDismissed',true);};
}
setupPWA();
</script>
