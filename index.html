      `).join('')}
    </div>
  </div>` : ''}

  <!-- ── Recent specs ──────────────────────────────────────── -->
  ${recentSessoes.length > 0 ? `
  <div class="section dash-recent-section">
    <div class="section-head">
      <h3>Especificações recentes</h3>
      <button class="more" onclick="S.page='specs';render()">Ver todas</button>
    </div>
    <div class="glass spec-card">
      ${recentSessoes.map((s,i) => {
        const cli = S.clis.find(c=>c.id===s.clienteId);
        const arq = cli ? S.arqs.find(a=>a.id===cli.arquitetoId) : null;
        const statusKey = s.vendaStatus==='vendido' ? 'vendido' : s.vendaStatus==='cancelado' ? 'cancelado' : s.status==='concluida' ? 'aberto' : 'rascunho';
        const sc = statusChip[statusKey] || statusChip.rascunho;
        const refNum = String(i+2844);
        const d = s.criadoEm ? new Date(s.criadoEm) : null;
        const daysAgo = d ? Math.floor((today-d)/86400000) : 0;
        const daysStr = daysAgo===0?'Hoje':daysAgo===1?'Ontem':`${daysAgo}d`;
        return `
        <div class="spec-row" onclick="S.page='specs';render()">
          <div class="spec-thumb">${refNum}</div>
          <div style="min-width:0;">
            <div class="spec-title">${s.projeto||cli?.nome||'Especificação'}</div>
            <div class="spec-meta">
              <span>${arq?.nome||cli?.nome||'—'}</span>
              <span class="sep-dot"></span>
              <span>${daysStr}</span>
            </div>
          </div>
          <div style="text-align:right;">
            <div class="spec-value t-num">${s.valorVenda?fmtK(parseVal(s.valorVenda)):'—'}</div>
            <div class="spec-value-sub"><span class="chip ${sc.cls}">${sc.lbl}</span></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}

  <!-- ── Brand chips ───────────────────────────────────────── -->
  ${S.prods.length > 0 ? `
  <div class="section dash-brands-section">
    <div class="section-head">
      <h3>Marcas em alta</h3>
      <div class="brand-actions">
        <button class="brand-nav" data-brand-dir="-1" aria-label="Voltar marcas" onclick="scrollBrandCarousel(this,-1)">
          <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <button class="brand-nav" data-brand-dir="1" aria-label="Avancar marcas" onclick="scrollBrandCarousel(this,1)">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
        <button class="more" onclick="S.page='catalog';render()">Cat&aacute;logo</button>
      </div>
      <button class="more" onclick="S.page='catalog';render()">Catálogo</button>
    </div>
    <div class="brand-row brand-carousel">
      ${(()=>{
        const brandMap = {};
        S.specs.forEach(sp => {
          const prod = S.prods.find(p=>p.id===sp.produto||p.nome===sp.produto);
          if(!prod) return;
          const brand = (prod.marca||'').trim();
          if(!brand) return;
          if(!brandMap[brand]) brandMap[brand] = { val:0, cnt:0 };
          brandMap[brand].val += parseVal(sp.preco);
          brandMap[brand].cnt++;
        });
        let brands = Object.entries(brandMap).sort((a,b)=>b[1].val-a[1].val);
        if(!brands.length) {
          brands = [...new Set(S.prods.map(p=>(p.marca||'').trim()).filter(Boolean))]
            .slice(0,12)
            .map(name => [name,{val:0,cnt:0}]);
        }
        if(!brands.length) return '';
        brands = brands.slice(0,12);
        const cards = brands.map(([name,d]) => `
          <div class="glass brand">
            <div class="brand-name">${name}</div>
            <div class="brand-val t-num">${d.val > 0 ? fmtK(d.val) : d.cnt + " spec" + (d.cnt!==1?"s":"")}</div>
            <div class="brand-sub">${d.cnt} spec${d.cnt!==1?'s':''}</div>
          </div>`)
          .join('');
        return `<div class="brand-track">
          <div class="brand-set">${cards}</div>
        </div>`;
      })()}
    </div>
  </div>` : ''}


</div>`;
}

function sCard(v,l,ic,bg,color,nav){return`<div class="stat-card" data-nav="${nav}"><div><div class="stat-val">${v}</div><div class="stat-label">${l}</div></div><div class="stat-icon" style="background:${bg};color:${color};">${SVG(ic,18)}</div></div>`;}
function pBar(l,v,t,c){const p=t?Math.round(v/t*100):0;return`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--text-secondary);">${l}</span><span style="font-weight:600;">${v} <span style="color:var(--text-tertiary);font-weight:400;">(${p}%)</span></span></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${c};"></div></div></div>`;}
function scrollBrandCarousel(btn, dir){
  const carousel = btn.closest('.dash-brands-section')?.querySelector('.brand-carousel');
  if(!carousel) return;
  const card = carousel.querySelector('.brand');
  const cardW = card ? card.getBoundingClientRect().width : 220;
  carousel.scrollBy({ left: dir * (cardW * 2 + 28), behavior: 'smooth' });
}

// ===== CATALOG =====
function buildCatalog(){
  const q=(S.catSearch||'').toLowerCase();
  const marcas=[...new Set(S.prods.map(p=>p.marca).filter(Boolean))].sort();
  const tiposAll=[...new Set(S.prods.map(p=>p.tipo).filter(Boolean))].sort();
  const sortOptions=[
    ['','Padrão'],
    ['abc_vendas','Curva ABC vendas'],
    ['abc_specs','Curva ABC especificações'],
    ['nome_asc','Alfabético A-Z'],
    ['nome_desc','Alfabético Z-A'],
    ['marca_asc','Marca A-Z'],
    ['marca_desc','Marca Z-A'],
    ['vendas_asc','Vendas menor-maior'],
    ['specs_asc','Especificações menor-maior'],
  ];
  const catSort=S.catSort||'';
  const sortLabel=(sortOptions.find(o=>o[0]===catSort)||sortOptions[0])[1];
  const moneyVal=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));return isNaN(n)?0:n;};
  const productKey=v=>String(v||'').trim().toLowerCase();
  const metricMap={};
  S.prods.forEach(p=>{metricMap[p.id]={sold:0,used:0,qty:0};});
  S.specs.forEach(sp=>{
    const prod=S.prods.find(p=>String(p.id||'')&&String(p.id)===String(sp.produtoId||''))||
      S.prods.find(p=>productKey(p.nome)&&productKey(p.nome)===productKey(sp.produto))||
      S.prods.find(p=>(sp.referencia&&productKey(p.referencia)===productKey(sp.referencia))||(sp.codigo&&productKey(p.codigo)===productKey(sp.codigo)));
    if(!prod)return;
    if(!metricMap[prod.id])metricMap[prod.id]={sold:0,used:0,qty:0};
    const m=metricMap[prod.id];
    m.used+=1;
    const sess=S.sessoes.find(s=>s.id===sp.sessaoId);
    if(sess&&sess.vendaStatus==='vendido'){
      const qty=Math.max(1,parseFloat(String(sp.quantidade||'1').replace(',','.'))||1);
      m.qty+=qty;
      m.sold+=moneyVal(sp.preco)*qty;
    }
  });
  const textCmp=(a,b,field)=>String(a[field]||'').localeCompare(String(b[field]||''),'pt-BR',{sensitivity:'base'});
  let list=S.prods;
  if(q)list=list.filter(p=>matchQ([p.nome,p.marca,p.codigo,p.referencia],q));
  if(S.catTipo)list=list.filter(p=>p.tipo===S.catTipo);
  if(S.catMarca)list=list.filter(p=>p.marca===S.catMarca);
  list=[...list];
  if(catSort==='abc_vendas')list.sort((a,b)=>(metricMap[b.id]?.sold||0)-(metricMap[a.id]?.sold||0)||textCmp(a,b,'nome'));
  else if(catSort==='abc_specs')list.sort((a,b)=>(metricMap[b.id]?.used||0)-(metricMap[a.id]?.used||0)||textCmp(a,b,'nome'));
  else if(catSort==='nome_asc')list.sort((a,b)=>textCmp(a,b,'nome'));
  else if(catSort==='nome_desc')list.sort((a,b)=>textCmp(b,a,'nome'));
  else if(catSort==='marca_asc')list.sort((a,b)=>textCmp(a,b,'marca')||textCmp(a,b,'nome'));
  else if(catSort==='marca_desc')list.sort((a,b)=>textCmp(b,a,'marca')||textCmp(a,b,'nome'));
  else if(catSort==='vendas_asc')list.sort((a,b)=>(metricMap[a.id]?.sold||0)-(metricMap[b.id]?.sold||0)||textCmp(a,b,'nome'));
  else if(catSort==='specs_asc')list.sort((a,b)=>(metricMap[a.id]?.used||0)-(metricMap[b.id]?.used||0)||textCmp(a,b,'nome'));
  const nMarcas=[...new Set(S.prods.map(p=>p.marca).filter(Boolean))].length;
  const nTipos=[...new Set(S.prods.map(p=>p.tipo).filter(Boolean))].length;
  const tipoCnts={};S.prods.forEach(p=>{if(p.tipo)tipoCnts[p.tipo]=(tipoCnts[p.tipo]||0)+1;});
  const tiposUsed=Object.entries(tipoCnts).sort((a,b)=>b[1]-a[1]);

  function tipoIcon(tipo){
    const t=(tipo||'').toLowerCase();
    if(t.includes('el\u00e9t')||t.includes('elet'))
      return '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
    if(t.includes('hidr'))
      return '<path d="M12 2C6 8 4 11 4 14a8 8 0 0016 0c0-3-2-6-8-12z" stroke="currentColor" stroke-width="1.8" fill="none"/>';
    if(t.includes('ilum')||t.includes('lumi'))
      return '<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
    if(t.includes('piso')||t.includes('rev')||t.includes('cer'))
      return '<rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>';
    if(t.includes('met'))
      return '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>';
    return '<rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
  }

  /* card compacto — ícone menor, menos padding, mais produtos visíveis */
  function prodCard(p){
    const col=TIPO_COLORS[p.tipo||'']||'#8B5CF6';
    const brand=p.marca||'';
    const code=p.codigo||p.referencia||'';
    const sub=[brand,code].filter(Boolean).join(' \u00b7 ');
    const nomeTrunc=p.nome.length>34?p.nome.substring(0,32)+'\u2026':p.nome;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--sep);cursor:pointer;active:opacity:.7;" onclick="S.modal='prod';S.editItem=S.prods.find(x=>x.id==='${p.id}');S._err={};render()">
      <div style="width:42px;height:42px;border-radius:12px;background:${col}18;border:1px solid ${col}35;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${col};">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">${tipoIcon(p.tipo)}</svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${nomeTrunc}</div>
        ${sub?`<div style="font-size:11.5px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>`:''}
      </div>
      <div style="padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:600;color:${col};background:${col}18;border:1px solid ${col}35;white-space:nowrap;flex-shrink:0;">${p.tipo||'Outro'}</div>
    </div>`;
  }

  /* input style compartilhado entre search bar e dropdowns */
  const inputBase='height:42px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;color:var(--text);font-family:var(--font);font-size:14px;';

  const mobCatalog=`<div class="mob-only blk mob-screen">
    <div class="screen-hdr" style="padding:16px 20px 10px;">
      <div>
        <div class="screen-kicker">Produtos</div>
        <div class="screen-title-xl">Cat\u00e1logo</div>
        <div class="screen-meta">${S.prods.length} produto${S.prods.length!==1?'s':''} &middot; ${nTipos} tipo${nTipos!==1?'s':''} &middot; ${nMarcas} marca${nMarcas!==1?'s':''}</div>
      </div>
      <!-- relatório + transparente no padrão glass -->
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="openReport('catalog')" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${SVG('chart',18)}</button>
        <button onclick="S.modal='prod';S.editItem=null;S._err={};render()" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${icoSVG('plus',20)}</button>
      </div>
    </div>

    <!-- search bar alinhada -->
    <div style="margin:0 20px 8px;">
      <div style="${inputBase}display:flex;align-items:center;padding:0 14px;gap:10px;">
        <div style="opacity:.45;flex-shrink:0;">${icoSVG('search',16)}</div>
        <input type="text" id="catSearchInput" placeholder="Nome, marca, c\u00f3digo, ref..." value="${S.catSearch||''}" oninput="S.catSearch=this.value;render()" autocomplete="off"
          style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font);"/>
      </div>
    </div>

    <!-- dropdowns: custom glass -->
    <div style="display:flex;gap:8px;margin:0 20px 10px;">

      <!-- Tipo -->
      <div style="flex:1;position:relative;">
        <div onclick="S.openDrop=S.openDrop==='catTipo'?null:'catTipo';render()"
          style="${inputBase}display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;box-sizing:border-box;user-select:none;">
          <span style="color:${S.catTipo?'var(--text)':'var(--text-3)'};">${S.catTipo||'Todos os tipos'}</span>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg>
        </div>
        ${S.openDrop==='catTipo'?`
          <div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:199;"></div>
          <div style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);backdrop-filter:blur(24px);">
            <div onclick="S.catTipo='';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${!S.catTipo?'var(--accent)':'var(--text)'};font-weight:${!S.catTipo?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">Todos os tipos</div>
            ${tiposAll.map(t=>`<div onclick="S.catTipo='${t}';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${S.catTipo===t?'var(--accent)':'var(--text)'};font-weight:${S.catTipo===t?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">${t}</div>`).join('')}
          </div>`:''}
      </div>

      <!-- Marca -->
      <div style="flex:1;position:relative;">
        <div onclick="S.openDrop=S.openDrop==='catMarca'?null:'catMarca';render()"
          style="${inputBase}display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;box-sizing:border-box;user-select:none;">
          <span style="color:${S.catMarca?'var(--text)':'var(--text-3)'};">${S.catMarca||'Todas as marcas'}</span>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg>
        </div>
        ${S.openDrop==='catMarca'?`
          <div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:199;"></div>
          <div style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);backdrop-filter:blur(24px);">
            <div onclick="S.catMarca='';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${!S.catMarca?'var(--accent)':'var(--text)'};font-weight:${!S.catMarca?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">Todas as marcas</div>
            ${marcas.map(m=>`<div onclick="S.catMarca='${m}';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${S.catMarca===m?'var(--accent)':'var(--text)'};font-weight:${S.catMarca===m?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">${m}</div>`).join('')}
          </div>`:''}
      </div>

    </div>

    <!-- ordenação -->
    <div style="margin:0 20px 10px;position:relative;">
      <button onclick="S.openDrop=S.openDrop==='catSort'?null:'catSort';render()"
        style="${inputBase}width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;box-sizing:border-box;user-select:none;">
        <span style="display:flex;align-items:center;gap:8px;color:${catSort?'var(--text)':'var(--text-3)'};">${icoSVG('sort',15)} Ordenar por: ${sortLabel}</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg>
      </button>
      ${S.openDrop==='catSort'?`
        <div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:199;"></div>
        <div style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);backdrop-filter:blur(24px);">
          ${sortOptions.map(([v,l])=>`<div onclick="S.catSort='${v}';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${catSort===v?'var(--accent)':'var(--text)'};font-weight:${catSort===v?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">${l}</div>`).join('')}
        </div>`:''}
    </div>

    <!-- carrossel de tipos: todos mesma cor neutra, sem cor de tipo -->
    <div style="padding:0 20px 10px;overflow:hidden;">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
        <div onclick="S.catTipo='';render()" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;border:0.5px solid ${!S.catTipo?'var(--accent)':'var(--glass-border)'};background:${!S.catTipo?'var(--accent)':'var(--glass-tint-2)'};color:${!S.catTipo?'#fff':'var(--text-2)'};font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;">
          Todos <span style="opacity:.7;">${S.prods.length}</span>
        </div>
        ${tiposUsed.map(([tipo,cnt])=>`<div onclick="S.catTipo='${tipo}';render()" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;border:0.5px solid ${S.catTipo===tipo?'var(--accent)':'var(--glass-border)'};background:${S.catTipo===tipo?'var(--accent)':'var(--glass-tint-2)'};color:${S.catTipo===tipo?'#fff':'var(--text-2)'};font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;">
          ${tipo} <span style="opacity:.7;">${cnt}</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- lista de produtos compacta -->
    ${list.length===0
      ?`<div class="glass" style="margin:0 20px;border-radius:22px;padding:36px 20px;text-align:center;">
          <div style="font-size:28px;margin-bottom:8px;">&#128230;</div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Nenhum produto</div>
          <div style="font-size:13px;color:var(--text-3);margin-top:4px;">Tente outros filtros ou toque em +</div>
        </div>`
      :`<div class="glass" style="margin:0 20px;border-radius:18px;overflow:hidden;padding:0;">
          ${list.map(p=>prodCard(p)).join('')}
        </div>`
    }
  </div>`;

  const deskCatalog=`<div class="desk-only">
    <div class="page-hdr" style="padding:24px 32px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div><h2 style="margin:0;font-size:22px;font-weight:700;">Cat\u00e1logo</h2><div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">${S.prods.length} produto${S.prods.length!==1?'s':''}</div></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-report" onclick="openReport('catalog')">${SVG('chart',15)} Relat\u00f3rio</button>
        <button class="btn primary" onclick="S.modal='prod';S.editItem=null;S._err={};render()">${SVG('plus',16)} Novo produto</button>
      </div>
    </div>
    <div style="padding:0 32px;display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <input type="text" class="search-box" style="flex:1;min-width:200px;" placeholder="Nome, marca, c\u00f3digo..." value="${S.catSearch||''}" oninput="S.catSearch=this.value;render()"/>
      <select class="select-box" onchange="S.catTipo=this.value;render()">
        <option value="">Todos os tipos</option>
        ${tiposAll.map(t=>`<option value="${t}" ${S.catTipo===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <select class="select-box" onchange="S.catMarca=this.value;render()">
        <option value="">Todas as marcas</option>
        ${marcas.map(m=>`<option value="${m}" ${S.catMarca===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <div style="position:relative;min-width:230px;">
        <button class="select-box" onclick="S.openDrop=S.openDrop==='catSortDesk'?null:'catSortDesk';render()" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;">
          <span style="display:flex;align-items:center;gap:8px;">${icoSVG('sort',15)} ${sortLabel}</span>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg>
        </button>
        ${S.openDrop==='catSortDesk'?`
          <div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:199;"></div>
          <div style="position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.35);backdrop-filter:blur(24px);">
            ${sortOptions.map(([v,l])=>`<div onclick="S.catSort='${v}';S.openDrop=null;render()" style="padding:12px 14px;font-size:13px;color:${catSort===v?'var(--accent)':'var(--text)'};font-weight:${catSort===v?'700':'500'};border-bottom:0.5px solid var(--sep);cursor:pointer;">${l}</div>`).join('')}
          </div>`:''}
      </div>
    </div>
    <div class="two-col-layout">
      <div>
        ${list.length===0?`<div class="card" style="text-align:center;padding:60px 20px;color:var(--text-secondary);">Nenhum produto encontrado</div>`:`<div class="card" style="padding:0;overflow:hidden;">${list.map(p=>prodCard(p)).join('')}</div>`}
      </div>
    </div>
  </div>`;

  return mobCatalog + deskCatalog;
}

function buildArqs(){
  const q=(S.arqSearch||'').toLowerCase();
  const arqStats=S.arqs.map((a,i)=>{
    const nCli=S.clis.filter(c=>c.arquitetoId===a.id).length;
    const specsArq=S.sessoes.filter(s=>{const c=S.clis.find(c=>c.id===s.clienteId);return c&&c.arquitetoId===a.id;});
    const nSpec=specsArq.length;
    const vendidas=specsArq.filter(s=>s.vendaStatus==='vendido');
    const nVend=vendidas.length;
    const parseV=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));return isNaN(n)?0:n;};
    const val=vendidas.reduce((acc,s)=>acc+parseV(s.valorVenda),0);
    return{...a,nCli,nSpec,nVend,val,idx:i};
  });
  const list=q?arqStats.filter(a=>matchQ([a.nome,a.escritorio],q)):arqStats;
  const totalSpecs=S.sessoes.length;
  const totalVend=S.sessoes.filter(s=>s.vendaStatus==='vendido').length;
  const convPct=totalSpecs>0?Math.round(totalVend/totalSpecs*100):0;
  const maisAtiva=arqStats.length?[...arqStats].sort((a,b)=>b.nSpec-a.nSpec)[0]:null;

  function archCard(a){
    const fmtV=v=>{if(v>=1000000)return'R$\u00a0'+(v/1000000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'M';if(v>=1000)return'R$\u00a0'+Math.round(v/1000)+'k';return v>0?'R$\u00a0'+v.toLocaleString('pt-BR',{minimumFractionDigits:0}):'—';};
    return `<div class="glass arch-card-v2" style="cursor:pointer;" onclick="S.modal='arq';S.editItem=S.arqs.find(x=>x.id==='${a.id}');S._err={};render()">
      <div class="arch-card-v2-head">
        ${mobAvatar(a.nome,a.idx,36)}
        <div class="arch-card-v2-info">
          <div class="arch-card-v2-name">${a.nome}</div>
          ${a.escritorio?`<div class="arch-card-v2-office">${a.escritorio}</div>`:''}
          ${(a.aniversario||a.nascimento)?`<div class="arch-card-v2-office">Aniversário ${formatBirthday(a.aniversario||a.nascimento)}</div>`:''}
        </div>
        <div class="btn-dots" onclick="event.stopPropagation();S.modal='arq';S.editItem=S.arqs.find(x=>x.id==='${a.id}');S._err={};render()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="19" cy="12" r="2" fill="currentColor"/></svg>
        </div>
      </div>
      <div class="arch-card-v2-stats">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div class="arch-stat-blk">
            <div class="arch-stat-num">${a.nCli}</div>
            <div class="arch-stat-lbl2">${a.nCli===1?'cliente':'clientes'}</div>
          </div>
          <div style="width:0.5px;background:var(--sep);align-self:stretch;margin:1px 0;"></div>
          <div class="arch-stat-blk">
            <div class="arch-stat-num">${a.nSpec}</div>
            <div class="arch-stat-lbl2">${a.nSpec===1?'spec':'specs'}</div>
          </div>
          <div style="width:0.5px;background:var(--sep);align-self:stretch;margin:1px 0;"></div>
          <div class="arch-stat-blk">
            <div class="arch-stat-num" style="${a.nVend>0?'color:#22c55e;':''}">${a.nVend}</div>
            <div class="arch-stat-lbl2">${a.nVend===1?'venda':'vendas'}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:700;color:${a.val>0?'#22c55e':'var(--text-3)'};">${fmtV(a.val||0)}</div>
          <div style="font-size:10px;color:var(--text-3);margin-top:2px;">em vendas</div>
        </div>
      </div>
    </div>`;
  }

  const mobArqs=`<div class="mob-only blk mob-screen">
    <div class="screen-hdr" style="padding:16px 20px 10px;">
      <div>
        <div class="screen-kicker">Relacionamento</div>
        <div class="screen-title-xl">Arquitetos</div>
        <div class="screen-meta">${S.arqs.length} arquiteto${S.arqs.length!==1?'s':''} &middot; ${S.clis.length} cliente${S.clis.length!==1?'s':''} vinculados</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="openReport('arqs')" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${SVG('chart',18)}</button>
        <button onclick="S.modal='arq';S.editItem=null;S._err={};render()" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${icoSVG('plus',20)}</button>
      </div>
    </div>
    <div style="margin:0 20px 12px;">
      <div style="height:42px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;padding:0 14px;gap:10px;">
        <div style="opacity:.45;flex-shrink:0;">${icoSVG('search',16)}</div>
        <input type="text" id="arqSearchInput" placeholder="Buscar arquiteto..." value="${S.arqSearch||''}" oninput="S.arqSearch=this.value;render()" autocomplete="off"
          style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font);"/>
      </div>
    </div>
    ${S.arqs.length>0?`<div class="glass agg-card" style="margin:0 20px 12px;">
      <div class="agg-col">
        <div class="agg-label">Convers\u00e3o geral</div>
        <div class="agg-val">${convPct}<span style="font-size:20px;">%</span></div>
        <div class="agg-sub">${totalVend} vendida${totalVend!==1?'s':''} de ${totalSpecs}</div>
      </div>
      <div class="agg-divider"></div>
      <div class="agg-col">
        <div class="agg-label">Mais ativa</div>
        <div class="agg-name" style="font-size:16px;font-weight:700;color:var(--text);line-height:1.2;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${maisAtiva?maisAtiva.nome:'&mdash;'}</div>
        <div class="agg-sub">${maisAtiva&&maisAtiva.nVend>0?maisAtiva.nVend+' venda'+(maisAtiva.nVend!==1?'s':'')+' fechada'+(maisAtiva.nVend!==1?'s':''):maisAtiva?maisAtiva.nSpec+' spec'+(maisAtiva.nSpec!==1?'s':'')+' ativa'+(maisAtiva.nSpec!==1?'s':''):'nenhum'}</div>
      </div>
    </div>`:''}
    ${list.length===0
      ?`<div class="glass" style="margin:0 20px;border-radius:24px;padding:40px 20px;text-align:center;">
          <div style="font-size:32px;">&#128101;</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-top:10px;">Nenhum arquiteto</div>
          <div style="font-size:14px;color:var(--text-3);margin-top:4px;">Toque em + para adicionar</div>
        </div>`
      :`<div style="padding:4px 20px 8px;font-size:13px;font-weight:600;color:var(--text-3);">Todos os arquitetos</div>
        ${list.map(a=>archCard(a)).join('')}`
    }
  </div>`;

  const deskArqs=`<div class="desk-only">
    <div style="padding:24px 32px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div><h2 style="margin:0;font-size:22px;font-weight:700;">Arquitetos</h2></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-report" onclick="openReport('arqs')">${SVG('chart',15)} Relatório</button>
        <button class="btn primary" onclick="S.modal='arq';S.editItem=null;S._err={};render()">${SVG('plus',16)} Novo arquiteto</button>
      </div>
    </div>
    <div style="padding:0 32px 16px;"><input type="text" class="search-box" style="width:100%;box-sizing:border-box;" placeholder="Buscar arquiteto..." value="${S.arqSearch||''}" oninput="S.arqSearch=this.value;render()"/></div>
    <div style="padding:0 32px;">
      ${list.length===0?`<div class="card" style="text-align:center;padding:60px;color:var(--text-secondary);">Nenhum arquiteto encontrado</div>`
        :`<div style="display:grid;gap:16px;">${list.map(a=>`<div class="card" style="padding:16px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div style="width:44px;height:44px;border-radius:100px;background:${AVT_COLORS[a.idx%AVT_COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;">${a.nome[0]}</div>
            <div style="flex:1;"><div style="font-size:16px;font-weight:700;">${a.nome}</div>${a.escritorio?`<div style="font-size:12px;color:var(--text-secondary);">${a.escritorio}</div>`:''}</div>
            <button class="edit-glass-btn" onclick="event.stopPropagation();S.modal='arq';S.editItem=S.arqs.find(x=>x.id==='${a.id}');S._err={};render()">${SVG('edit',14)} Editar</button>
          </div>
          <div style="display:flex;gap:16px;font-size:13px;color:var(--text-secondary);">
            <span><b style="color:var(--text);">${a.nCli}</b> clientes</span>
            <span><b style="color:var(--text);">${a.nSpec}</b> specs</span>
            <span><b style="color:var(--text);">${a.nVend}</b> vendas</span>
          </div>
          ${a.email?`<div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">${a.email}</div>`:''}
          ${(a.aniversario||a.nascimento)?`<div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">Aniversário ${formatBirthday(a.aniversario||a.nascimento)}</div>`:''}
        </div>`).join('')}</div>`}
    </div>
  </div>`;

  return mobArqs + deskArqs;
}


function buildClis(){
  const q=(S.cliSearch||'').toLowerCase();
  const arqFilt=S.cliArqFilter||'';
  let list=S.clis;
  if(q)list=list.filter(c=>{const arq=S.arqs.find(a=>a.id===c.arquitetoId);return matchQ([c.nome,c.obra,arq&&arq.nome],q);});
  if(arqFilt)list=list.filter(c=>c.arquitetoId===arqFilt);

  const nObras=[...new Set(S.clis.map(c=>c.obra).filter(Boolean))].length;

  /* input style igual ao catálogo */
  const inputBase='height:42px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;color:var(--text);font-family:var(--font);font-size:14px;';

  function cliCard(c,i){
    const arq=S.arqs.find(a=>a.id===c.arquitetoId);
    const nSpecs=S.sessoes.filter(s=>s.clienteId===c.id).length;
    const phone=c.tel||c.telefone||c.fone||'';
    const arqColor=arq?AVT_COLORS[S.arqs.indexOf(arq)%AVT_COLORS.length]:'var(--text-3)';
    return `<div class="glass" style="border-radius:16px;margin:0 20px 8px;padding:12px 14px;cursor:pointer;" onclick="S.modal='cli';S.editItem=S.clis.find(x=>x.id==='${c.id}');S._err={};render()">
      <div style="display:flex;align-items:center;gap:10px;">
        ${mobAvatar(c.nome,i,44)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.nome}</div>
          ${c.obra?`<div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:.5;flex-shrink:0;"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span style="font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.obra}</span>
          </div>`:''}
        </div>
        ${nSpecs>0?`<span style="padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);color:var(--text-2);white-space:nowrap;">${nSpecs} spec${nSpecs!==1?'s':''}</span>`:''}
      </div>
      ${(arq||phone)?`<div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;">
        ${arq?`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);font-size:11.5px;font-weight:600;color:var(--text-2);">
          <span style="width:7px;height:7px;border-radius:100px;background:${arqColor};flex-shrink:0;display:inline-block;"></span>${arq.nome}
        </span>`:''}
        ${phone?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--text-3);">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.26 11a19.79 19.79 0 01-3.07-8.67A2 2 0 013.18 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.91 9.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          ${phone}
        </span>`:''}
      </div>`:''}
    </div>`;
  }

  const mobClis=`<div class="mob-only blk mob-screen">
    <div class="screen-hdr" style="padding:16px 20px 10px;">
      <div>
        <div class="screen-kicker">Carteira</div>
        <div class="screen-title-xl">Clientes</div>
        <div class="screen-meta">${S.clis.length} cliente${S.clis.length!==1?'s':''} &middot; ${nObras} obra${nObras!==1?'s':''} ativa${nObras!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="openReport('clis')" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${SVG('chart',18)}</button>
        <button onclick="S.modal='cli';S.editItem=null;S._err={};render()" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${icoSVG('plus',20)}</button>
      </div>
    </div>

    <!-- search bar -->
    <div style="margin:0 20px 8px;">
      <div style="${inputBase}display:flex;align-items:center;padding:0 14px;gap:10px;">
        <div style="opacity:.45;flex-shrink:0;">${icoSVG('search',16)}</div>
        <input type="text" id="cliSearchInput" placeholder="Nome, obra, e-mail, telefone..." value="${S.cliSearch||''}" oninput="S.cliSearch=this.value;render()" autocomplete="off"
          style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font);"/>
      </div>
    </div>

    <!-- dropdown arquiteto: custom glass -->
    ${S.arqs.length>0?`<div style="margin:0 20px 12px;position:relative;">
      <div onclick="S.openDrop=S.openDrop==='cliArq'?null:'cliArq';render()"
        style="${inputBase}display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;box-sizing:border-box;width:100%;user-select:none;">
        <span style="color:${arqFilt?'var(--text)':'var(--text-3)'};">${arqFilt?(S.arqs.find(a=>a.id===arqFilt)||{}).nome||'Arquiteto':'Todos os arquitetos'}</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg>
      </div>
      ${S.openDrop==='cliArq'?`
        <div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:199;"></div>
        <div style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);border:0.5px solid var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);backdrop-filter:blur(24px);">
          <div onclick="S.cliArqFilter='';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${!arqFilt?'var(--accent)':'var(--text)'};font-weight:${!arqFilt?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">Todos os arquitetos</div>
          ${S.arqs.map(a=>`<div onclick="S.cliArqFilter='${a.id}';S.openDrop=null;render()" style="padding:13px 16px;font-size:14px;color:${arqFilt===a.id?'var(--accent)':'var(--text)'};font-weight:${arqFilt===a.id?'700':'400'};border-bottom:0.5px solid var(--sep);cursor:pointer;">${a.nome}</div>`).join('')}
        </div>`:''}
    </div>`:``}

    <!-- lista de clientes -->
    ${list.length===0
      ?`<div class="glass" style="margin:0 20px;border-radius:22px;padding:36px 20px;text-align:center;">
          <div style="font-size:28px;margin-bottom:8px;">&#128100;</div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Nenhum cliente</div>
          <div style="font-size:13px;color:var(--text-3);margin-top:4px;">Tente outro filtro ou toque em +</div>
        </div>`
      :list.map((c,i)=>cliCard(c,i)).join('')
    }
  </div>`;

  const deskClis=`<div class="desk-only">
    <div style="padding:24px 32px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div><h2 style="margin:0;font-size:22px;font-weight:700;">Clientes</h2><div style="font-size:13px;color:var(--text-secondary);">${S.clis.length} cliente${S.clis.length!==1?'s':''}</div></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-report" onclick="openReport('clis')">${SVG('chart',15)} Relatório</button>
        <button class="btn primary" onclick="S.modal='cli';S.editItem=null;S._err={};render()">${SVG('plus',16)} Novo cliente</button>
      </div>
    </div>
    <div class="client-filter-row" style="padding:0 32px 16px;display:flex;gap:12px;">
      <div class="client-search-field"><input type="text" class="search-box" placeholder="Buscar por cliente, obra, e-mail ou telefone..." value="${S.cliSearch||''}" oninput="S.cliSearch=this.value;render()"/></div>
      ${S.arqs.length>0?`<select class="select-box" onchange="S.cliArqFilter=this.value;render()"><option value="">Todos os arquitetos</option>${S.arqs.map(a=>`<option value="${a.id}" ${arqFilt===a.id?'selected':''}>${a.nome}</option>`).join('')}</select>`:''}
    </div>
    <div style="padding:0 32px;">
      ${list.length===0?`<div class="card" style="text-align:center;padding:60px;color:var(--text-secondary);">Nenhum cliente encontrado</div>`
        :`<div style="display:grid;gap:12px;">${list.map((c,i)=>{const arq=S.arqs.find(a=>a.id===c.arquitetoId);const nSpecs=S.sessoes.filter(s=>s.clienteId===c.id).length;return`<div class="card" style="padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="S.modal='cli';S.editItem=S.clis.find(x=>x.id==='${c.id}');S._err={};render()">
          <div style="width:44px;height:44px;border-radius:100px;background:${AVT_COLORS[i%AVT_COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">${c.nome.split(' ').slice(0,2).map(s=>s[0]).join('').toUpperCase()}</div>
          <div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:600;">${c.nome}</div>${c.obra?`<div style="font-size:12px;color:var(--text-secondary);">${c.obra}</div>`:''}<div style="font-size:12px;color:var(--text-secondary);">${arq?arq.nome:'sem arquiteto'} &middot; ${nSpecs} spec${nSpecs!==1?'s':''}</div></div>
          <button class="edit-glass-btn" onclick="event.stopPropagation();S.modal='cli';S.editItem=S.clis.find(x=>x.id==='${c.id}');S._err={};render()">${SVG('edit',14)} Editar</button>
        </div>`;}).join('')}</div>`}
    </div>
  </div>`;

  return mobClis + deskClis;
}

function buildSpecsList(){
  if(!S.mobSpecFilter)S.mobSpecFilter='';
  if(S.mobSpecFilter==='enviada'||S.mobSpecFilter==='concluida')S.mobSpecFilter='aberto';
  if(S.mobSpecFilter==='cancelado')S.mobSpecFilter='cancelada';
  if(!S.specSearch)S.specSearch='';
  const qSpec=(S.specSearch||'').toLowerCase();

  let allList=[...S.sessoes].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
  if(qSpec)allList=allList.filter(s=>{
    const cli=S.clis.find(c=>c.id===s.clienteId);
    const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
    const its=sessaoItems(s.id);
    const fields=[s.projeto,s.status,s.vendaStatus,cli&&cli.nome,cli&&cli.obra,cli&&cli.email,cli&&cli.telefone,arq&&arq.nome,arq&&arq.escritorio,arq&&arq.email];
    its.forEach(it=>{
      fields.push(it.produto,it.tipo,it.marca,it.codigo,it.referencia,it.ambiente,it.cotar,it.separado,it.unid,it.obs);
      const prod=it.prodId?S.prods.find(p=>p.id===it.prodId):null;
      if(prod)fields.push(prod.nome,prod.marca,prod.tipo,prod.codigo,prod.referencia);
    });
    return matchQ(fields,qSpec);
  });

  const nTot=S.sessoes.length;
  const nRasc=S.sessoes.filter(s=>s.status==='rascunho').length;
  const isOpenSpec=s=>s.status==='concluida'&&s.vendaStatus!=='vendido'&&s.vendaStatus!=='cancelado';
  const nAberto=S.sessoes.filter(isOpenSpec).length;
  const nVend=S.sessoes.filter(s=>s.vendaStatus==='vendido').length;
  const nCanc=S.sessoes.filter(s=>s.vendaStatus==='cancelado').length;

  function filterList(list,f){
    if(f==='rascunho')return list.filter(s=>s.status==='rascunho');
    if(f==='enviada'||f==='concluida'||f==='aberto')return list.filter(isOpenSpec);
    if(f==='vendida')return list.filter(s=>s.vendaStatus==='vendido');
    if(f==='cancelada'||f==='cancelado')return list.filter(s=>s.vendaStatus==='cancelado');
    return list;
  }
  const mobList=filterList(allList,S.mobSpecFilter);

  const ARQ_COLORS=['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#EF4444','#14B8A6','#F97316'];

  function specCard(s){
    const cli=S.clis.find(c=>c.id===s.clienteId);
    const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
    const items=sessaoItems(s.id);
    const isConc=s.status==='concluida';
    const isVend=s.vendaStatus==='vendido';
    const isCanceled=s.vendaStatus==='cancelado';
    const isViewOnly=isVend||isCanceled;
    const dias=Math.max(0,Math.floor((new Date()-new Date(s.criadoEm||''))/86400000));
    const fa=items.filter(i=>i.cotar==='COTAR'&&!i.preco&&!i.prazo).length;
    const arqColor=arq?ARQ_COLORS[S.arqs.indexOf(arq)%ARQ_COLORS.length]:'#8B5CF6';
    const arqInitial=arq?arq.nome.trim()[0].toUpperCase():'?';
    const badgeCls=isVend?'chip-ok':isCanceled?'chip-danger':isConc?'chip-accent':'chip-warn';
    const badgeLbl=isVend?'Vendida':isCanceled?'Cancelada':isConc?'Conclu\u00edda':'Rascunho';
    const cardStateCls=isVend?' is-sold':isCanceled?' is-canceled':isConc?' is-open':' is-draft';
    const dateLbl=isCanceled?'Cancelada em '+fmtDate(s.canceladoEm||s.concluidoEm||s.criadoEm):isVend?'Vendida em '+fmtDate(s.vendidoEm||s.concluidoEm||s.criadoEm):isConc?'Conclu\u00edda em '+fmtDate(s.concluidoEm||s.criadoEm):'Criada em '+fmtDate(s.criadoEm);
    let matchHTML='';
    if(qSpec){
      const qTok=searchTokens(qSpec);
      const labeled=[];
      const push=(lbl,val)=>{if(val!=null&&val!==''&&fieldHasQuery(val,qTok))labeled.push({lbl,val:String(val)});};
      push('Cliente',cli&&cli.nome);
      push('Obra',cli&&cli.obra);
      push('Email cli.',cli&&cli.email);
      push('Tel.',cli&&cli.telefone);
      push('Arquiteto',arq&&arq.nome);
      push('Escrit\u00f3rio',arq&&arq.escritorio);
      push('Status',isVend?'Vendida':isCanceled?'Cancelada':isConc?'Em aberto':'Rascunho');
      const its=sessaoItems(s.id);
      const seenProd=new Set();
      its.forEach(it=>{
        const prod=it.prodId?S.prods.find(p=>p.id===it.prodId):null;
        const fields=[
          ['Produto',it.produto||(prod&&prod.nome)],
          ['Marca',it.marca||(prod&&prod.marca)],
          ['Tipo',it.tipo||(prod&&prod.tipo)],
          ['C\u00f3digo',it.codigo||(prod&&prod.codigo)],
          ['Refer\u00eancia',it.referencia||(prod&&prod.referencia)],
          ['Ambiente',it.ambiente],
          ['Obs.',it.obs]
        ];
        fields.forEach(([lbl,val])=>{
          if(val==null||val==='')return;
          if(!fieldHasQuery(val,qTok))return;
          const k=lbl+'|'+val;
          if(seenProd.has(k))return;
          seenProd.add(k);
          labeled.push({lbl,val:String(val)});
        });
      });
      if(labeled.length){
        const shown=labeled.slice(0,5);
        const more=labeled.length-shown.length;
        matchHTML='<div class="spec-match-row" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:10px;border-top:0.5px dashed rgba(250,204,21,.25);">'
          +shown.map(m=>'<span class="chip" style="font-size:10.5px;background:rgba(250,204,21,.10);border-color:rgba(250,204,21,.28);color:inherit;"><span style="opacity:.55;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:9px;margin-right:4px;">'+m.lbl+'</span>'+highlightQuery(m.val,qSpec)+'</span>').join('')
          +(more>0?'<span class="chip" style="font-size:10.5px;opacity:.6;">+'+more+'</span>':'')
          +'</div>';
      }
    }
    const pdfIco='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
    const shareIco='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';
    const trashIco='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';
    const editIco='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    const eyeIco='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    return `<div class="glass spec-full-card${cardStateCls}">
      <div class="spec-full-head">
        <div style="flex:1;min-width:0;">
          <div class="spec-full-title">${s.projeto||'Sem t\u00edtulo'}</div>
          ${cli?`<div class="spec-full-client">${cli.nome}</div>`:''}
        </div>
        <span class="chip ${badgeCls}" style="flex-shrink:0;font-size:10px;font-weight:700;padding:3px 9px;">${badgeLbl}</span>
      </div>
      <div class="spec-full-meta">
        ${arq?`<div class="client-arch-chip">
          <div class="avatar-dot neutral" style="width:18px;height:18px;font-size:8px;">${arqInitial}</div>
          <span style="white-space:nowrap;">${arq.nome}</span>
        </div>`:''}
        <span class="chip">${items.length} produto${items.length!==1?'s':''}</span>
        <span class="chip">${dias}d ${isVend?'vendida':isCanceled?'cancelada':isConc?'em aberto':'em rascunho'}</span>
        ${fa>0?`<span class="chip">${fa} sem cota\u00e7\u00e3o</span>`:''}
      </div>
      <div class="spec-full-date">${dateLbl}</div>
      ${matchHTML}
      <div class="spec-full-actions" onclick="event.stopPropagation()">
        <button class="spec-main-btn${isViewOnly?' done':''}" onclick="S.activeSessaoId='${s.id}';S.addRow=false;S.addData={};S.page='spec-editor';render()">
          ${isViewOnly?eyeIco:editIco} ${isViewOnly?'Visualizar':'Continuar'}
        </button>
        <button class="spec-icon-btn" title="PDF" onclick="S._pdfSessaoId='${s.id}';S.modal='pdf-options';render()">${pdfIco}</button>
        <button class="spec-icon-btn" title="Compartilhar" onclick="(async()=>{const txt='Especifica\u00e7\u00e3o: ${s.projeto||''}';if(navigator.share)navigator.share({title:txt,text:txt});else navigator.clipboard.writeText(txt);})()">${shareIco}</button>
        <button class="spec-icon-btn danger" title="Excluir" onclick="confirmDeleteSessao('${s.id}',event)">${trashIco}</button>
      </div>
    </div>`;
  }

  const chips=[
    {f:'',     lbl:'Todas',    cnt:nTot},
    {f:'rascunho', lbl:'Rascunho', cnt:nRasc},
    {f:'aberto',   lbl:'Em aberto',cnt:nAberto},
    {f:'vendida',  lbl:'Vendida',  cnt:nVend},
    {f:'cancelada',lbl:'Cancelada',cnt:nCanc},
  ];

  const mobSpecs=`<div class="mob-only blk mob-screen">
    <div class="screen-hdr" style="padding:16px 20px 10px;">
      <div>
        <div class="screen-kicker">Pipeline</div>
        <div class="screen-title-xl">Especifica\u00e7\u00f5es</div>
        <div class="screen-meta">${nTot} total &middot; ${nAberto} em aberto &middot; ${nVend} vendida${nVend!==1?'s':''} &middot; ${nCanc} cancelada${nCanc!==1?'s':''} &middot; ${nRasc} rascunho${nRasc!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="openReport('specs')" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${SVG('chart',18)}</button>
        <button onclick="S.modal='nova-spec';S.editItem=null;S._err={};render()" style="width:44px;height:44px;border-radius:100px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);backdrop-filter:blur(12px);">${icoSVG('plus',20)}</button>
      </div>
    </div>
    <div style="margin:0 20px 10px;">
      <div style="height:42px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;padding:0 14px;gap:10px;">
        <div style="opacity:.45;flex-shrink:0;">${icoSVG('search',16)}</div>
        <input type="text" id="specSearchInput" placeholder="Cliente, projeto, arquiteto..." value="${S.specSearch||''}" oninput="S.specSearch=this.value;render()" autocomplete="off"
          style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font);"/>
      </div>
    </div>
    <div class="chip-scroll-wrap">
      <div class="chip-scroll">
        ${chips.map(c=>`<div class="chip ${S.mobSpecFilter===c.f?'chip-active':''}" onclick="S.mobSpecFilter='${c.f}';render()">${c.lbl} <span style="opacity:.65;">${c.cnt}</span></div>`).join('')}
      </div>
    </div>
    ${mobList.length===0
      ?`<div class="glass" style="margin:0 20px;border-radius:24px;padding:40px 20px;text-align:center;">
          <div style="font-size:32px;">&#128203;</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-top:10px;">Nenhuma spec</div>
          <div style="font-size:14px;color:var(--text-3);margin-top:4px;">Toque em + para criar</div>
        </div>`
      :mobList.map(s=>specCard(s)).join('')
    }
  </div>`;

  // ── desktop view (preserved) ──
  const allSpecs=[...S.sessoes].sort((a,b)=>new Date(b.criadoEm)-new Date(a.criadoEm));
  const deskFiltered=S.filter?allSpecs.filter(s=>s.status===S.filter||s.vendaStatus===S.filter):allSpecs;
  const deskSpecs=`<div class="desk-only">
    <div style="padding:24px 32px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div><h2 style="margin:0;font-size:22px;font-weight:700;">Especifica\u00e7\u00f5es</h2></div>
      <button class="btn primary" onclick="S.modal='nova-spec';S.editItem=null;S._err={};render()">${SVG('plus',16)} Nova especifica\u00e7\u00e3o</button>
    </div>
    <div style="padding:0 32px;display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      ${[['','Todas'],['rascunho','Rascunho'],['concluida','Conclu\u00eddas'],['vendido','Vendidas']].map(([v,l])=>`<button class="filter-chip${S.filter===v?'on':''}" onclick="S.filter='${v}';render()">${l}</button>`).join('')}
    </div>
    <div style="padding:0 32px;">
      ${deskFiltered.length===0?`<div class="card" style="text-align:center;padding:60px;color:var(--text-secondary);">Nenhuma especifica\u00e7\u00e3o</div>`
        :`<div style="display:grid;gap:10px;">${deskFiltered.map(s=>{const cli=S.clis.find(c=>c.id===s.clienteId);const items=sessaoItems(s.id);const isConc=s.status==='concluida';const isVend=s.vendaStatus==='vendido';return`<div class="card spec-card" style="cursor:pointer;" onclick="S.activeSessaoId='${s.id}';S.addRow=false;S.addData={};S.page='spec-editor';render()">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="flex:1;min-width:0;"><div style="font-size:16px;font-weight:600;">${s.projeto||'Sem t\u00edtulo'}</div><div style="font-size:12px;color:var(--text-secondary);">${cli?cli.nome:'sem cliente'} &middot; ${items.length} items &middot; ${isVend?'Vendida':isConc?'Conclu\u00edda':'Rascunho'}</div></div>
            <div style="display:flex;gap:6px;">
              <button class="btn" onclick="event.stopPropagation();S._pdfSessaoId='${s.id}';S.modal='pdf-options';render()">PDF</button>
              <button class="btn danger" onclick="confirmDeleteSessao('${s.id}',event)">&#10005;</button>
            </div>
          </div>
        </div>`;}).join('')}</div>`}
    </div>
  </div>`;

  if(S.filter===undefined)S.filter='';
  if(S.filter==='vendido')S.filter='vendida';
  if(S.filter==='enviada'||S.filter==='concluida')S.filter='aberto';
  if(S.filter==='cancelado')S.filter='cancelada';
  const deskFilteredRich=filterList(allList,S.filter||'');
  const deskSpecsRich=`<div class="desk-only">
    <div style="padding:24px 32px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h2 style="margin:0;font-size:22px;font-weight:700;">Especifica\u00e7\u00f5es</h2>
        <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">${nTot} total &middot; ${nAberto} em aberto &middot; ${nVend} vendida${nVend!==1?'s':''} &middot; ${nCanc} cancelada${nCanc!==1?'s':''} &middot; ${nRasc} rascunho${nRasc!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-report" onclick="openReport('specs')">${SVG('chart',15)} Relat\u00f3rio</button>
        <button class="btn primary" onclick="S.modal='nova-spec';S.editItem=null;S._err={};render()">${SVG('plus',16)} Nova especifica\u00e7\u00e3o</button>
      </div>
    </div>
    <div class="spec-desk-toolbar" style="padding:0 32px;display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="spec-desktop-search">
        <input type="text" class="search-box" placeholder="Buscar por projeto, cliente ou arquiteto..." value="${S.specSearch||''}" oninput="S.specSearch=this.value;render()"/>
      </div>
      <div class="spec-filter-chips">
        ${chips.map(c=>`<button class="filter-chip${(S.filter||'')===c.f?' on':''}" onclick="S.filter='${c.f}';render()">${c.lbl} <span class="count">${c.cnt}</span></button>`).join('')}
      </div>
    </div>
    <div style="padding:0 32px;">
      ${deskFilteredRich.length===0?`<div class="card" style="text-align:center;padding:60px;color:var(--text-secondary);">Nenhuma especifica\u00e7\u00e3o encontrada</div>`
        :`<div class="spec-web-grid">${deskFilteredRich.map(s=>specCard(s)).join('')}</div>`}
    </div>
  </div>`;

  return mobSpecs + deskSpecsRich;
}


function buildSpecEditor(){
  const sessao=getActiveSessao();
  if(!sessao)return`<div class="card">${emptyState('warn','Erro','Especificação não encontrada.')}</div>`;

  const cli=S.clis.find(c=>c.id===sessao.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessao.id);
  const specFilt=S.specFilter||{};
  const specSortKey=S.specSort||'ambiente';
  let displayItems=items.filter(i=>{
    if(specFilt.tipo&&!sameSpecFilterValue(i.tipo,specFilt.tipo))return false;
    if(specFilt.cotar&&!sameSpecFilterValue(i.cotar,specFilt.cotar))return false;
    if(specFilt.separado&&!sameSpecFilterValue(i.separado,specFilt.separado))return false;
    return true;
  });
  if(specSortKey==='nome')displayItems=[...displayItems].sort((a,b)=>(a.produto||'').localeCompare(b.produto||''));
  else if(specSortKey==='tipo')displayItems=[...displayItems].sort((a,b)=>(a.tipo||'').localeCompare(b.tipo||''));
  else if(specSortKey==='recente')displayItems=[...displayItems].sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
  const activeFiltCount=Object.values(specFilt).filter(Boolean).length;
  const isConc=sessao.status==='concluida';
  const isVend=sessao.vendaStatus==='vendido';
  const isCanceled=sessao.vendaStatus==='cancelado';

  /* ── derived data ── */
  const ARQ_COLORS=['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#EF4444','#14B8A6','#F97316'];
  const arqColor=arq?ARQ_COLORS[S.arqs.indexOf(arq)%ARQ_COLORS.length]:'#8B5CF6';
  const arqInitial=arq?arq.nome.trim()[0].toUpperCase():'?';
  const badgeCls=isVend?'chip-ok':isCanceled?'chip-danger':isConc?'chip-accent':'chip-warn';
  const badgeLbl=isVend?'Vendida':isCanceled?'Cancelada':isConc?'Conclu\u00edda':'Rascunho';
  const totalUnits=items.reduce((a,i)=>a+parseInt(i.quantidade||0),0);
  const aCotar=items.filter(i=>i.cotar==='COTAR'&&!i.preco).length;
  const cotados=items.filter(i=>i.cotar==='COTAR'&&i.preco).length;

  /* ── ambientes com produtos ── */
  const ambSet=[];
  displayItems.forEach(i=>{const a=i.ambiente||'GERAL';if(!ambSet.includes(a))ambSet.push(a);});
  if(ambSet.length===0&&items.length===0)ambSet.push('GERAL');

  /* ── SVG icons ── */
  const backIco='<svg width="8" height="14" viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1L1 7l6 6"/></svg>';
  const dotsIco='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>';
  const plusIco='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  const chevIco='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
  const filterIco='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>';
  const thumbIco='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
  const pdfIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  const shareIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';
  const editIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  const checkIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const trashIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';
  const vendaIco='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>';

  /* ── product card renderer ── */
  const productKey = v => String(v||'').trim().toLowerCase();
  function catalogProductForSpec(s){
    return S.prods.find(p => String(p.id||'') && (String(p.id)===String(s.produtoId||'') || String(p.id)===String(s.produto||'')))
      || S.prods.find(p => productKey(p.nome) && productKey(p.nome)===productKey(s.produto))
      || S.prods.find(p =>
        (s.referencia && productKey(p.referencia)===productKey(s.referencia)) ||
        (s.codigo && productKey(p.codigo)===productKey(s.codigo))
      )
      || {};
  }

  function prodCard(s){
    const collapsed=S.collapsedAmbs&&S.collapsedAmbs.includes(s.id);
    const isEditing=S.editItemId===s.id;
    const catProd=catalogProductForSpec(s);
    const productImg=s.imagem||s.imagemPrincipal||catProd.imagemPrincipal||catProd.gifProduto||(catProd.imagensAplicado||[]).find(Boolean)||'';
    const productBrand=s.marca||catProd.marca||'';
    const productRef=s.referencia||catProd.referencia||'';
    const productCode=s.codigo||catProd.codigo||'';
    if(isEditing){

          </div>
          <div class="spec-add-row2">
            <input id="eiMarca" class="spec-add-inp" placeholder="Marca" value="${esc(S.editData.marca!==undefined?S.editData.marca:s.marca||'')}"/>
            <input type="hidden" id="eiTipo" value="${S.editData.tipo!==undefined?S.editData.tipo:s.tipo||''}"><div onclick="S.openDrop=S.openDrop==='specEiTipo'?null:'specEiTipo';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${(S.editData.tipo!==undefined?S.editData.tipo:s.tipo)?'var(--text)':'var(--text-3)'};">${(S.editData.tipo!==undefined?S.editData.tipo:s.tipo)||'Tipo'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
          </div>
          <div class="spec-add-row2">
            <input id="eiAmb" list="eiAmbList" class="spec-add-inp" placeholder="Ambiente" value="${esc(S.editData.ambiente!==undefined?S.editData.ambiente:s.ambiente||'')}"/>
            <datalist id="eiAmbList">${AMBS.map(a=>`<option value="${a}"></option>`).join('')}</datalist>
            <div class="spec-add-row2" style="gap:6px;">
              <input id="eiQtd" class="spec-add-inp" type="number" min="0" placeholder="Qtd" value="${esc(String(S.editData.quantidade!==undefined?S.editData.quantidade:s.quantidade||''))}"/>
              <input type="hidden" id="eiUnid" value="${S.editData.unidade!==undefined?S.editData.unidade:s.unidade||''}"><div onclick="S.openDrop=S.openDrop==='specEiUnid'?null:'specEiUnid';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${(S.editData.unidade!==undefined?S.editData.unidade:s.unidade)?'var(--text)':'var(--text-3)'};">${(S.editData.unidade!==undefined?S.editData.unidade:s.unidade)||'Un.'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
            </div>
          </div>
          <div class="spec-add-row2">
            <input id="eiRef" class="spec-add-inp" placeholder="REF" value="${esc(S.editData.referencia!==undefined?S.editData.referencia:s.referencia||'')}"/>
            <input id="eiCod" class="spec-add-inp" placeholder="CÓD" value="${esc(S.editData.codigo!==undefined?S.editData.codigo:s.codigo||'')}"/>
          </div>
          <div class="spec-add-row2">
            <input type="hidden" id="eiCotar" value="${S.editData.cotar!==undefined?S.editData.cotar:s.cotar||''}"><div onclick="S.openDrop=S.openDrop==='specEiCotar'?null:'specEiCotar';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${(S.editData.cotar!==undefined?S.editData.cotar:s.cotar)?'var(--text)':'var(--text-3)'};">${(S.editData.cotar!==undefined?S.editData.cotar:s.cotar)||'Cotar?'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
            <input type="hidden" id="eiSep" value="${S.editData.separado!==undefined?S.editData.separado:s.separado||''}"><div onclick="S.openDrop=S.openDrop==='specEiSep'?null:'specEiSep';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${(S.editData.separado!==undefined?S.editData.separado:s.separado)?'var(--text)':'var(--text-3)'};">${(S.editData.separado!==undefined?S.editData.separado:s.separado)||'Separação'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
          </div>
          <div class="spec-add-row2">
            <input id="eiPreco" class="spec-add-inp" placeholder="R$ preço" value="${esc(S.editData.preco!==undefined?S.editData.preco:s.preco||'')}"/>
            <input id="eiPrazo" class="spec-add-inp" placeholder="Prazo (dias)" value="${esc(S.editData.prazo!==undefined?S.editData.prazo:s.prazo||'')}"/>
          </div>
          <input id="eiObs" class="spec-add-inp" placeholder="Obs." value="${esc(S.editData.obs!==undefined?S.editData.obs:s.obs||'')}"/>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-neutral btn-sm" id="btnCancelEdit" style="flex:1;padding:10px;">Cancelar</button>
          <button class="btn btn-primary" id="btnSaveEdit" data-edit-id="${s.id}" style="flex:2;padding:10px;">${checkIco} Salvar</button>
        </div>
        ${S.openDrop==='specEiTipo'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">TIPO</div><div onclick="S.editData.tipo='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${TIPOS.map(t=>`<div onclick="S.editData.tipo='${t}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${(S.editData.tipo!==undefined?S.editData.tipo:s.tipo)===t?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${t}</div>`).join('')}</div>`:''}${S.openDrop==='specEiUnid'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">UNIDADE</div><div onclick="S.editData.unidade='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${UNIDADES.map(u=>`<div onclick="S.editData.unidade='${u}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${(S.editData.unidade!==undefined?S.editData.unidade:s.unidade)===u?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${u}</div>`).join('')}</div>`:''}${S.openDrop==='specEiCotar'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">COTAR?</div><div onclick="S.editData.cotar='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${COTAR.map(o=>`<div onclick="S.editData.cotar='${o}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${(S.editData.cotar!==undefined?S.editData.cotar:s.cotar)===o?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${o}</div>`).join('')}</div>`:''}${S.openDrop==='specEiSep'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">SEPARAÇÃO</div><div onclick="S.editData.separado='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${SEP.map(o=>`<div onclick="S.editData.separado='${o}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${(S.editData.separado!==undefined?S.editData.separado:s.separado)===o?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${o}</div>`).join('')}</div>`:''}  
      </div>`;
    }
    return `<div class="spec-prod-card">

          <div class="spec-prod-name">${escHtml(s.produto||'Sem nome')}</div>
          <div class="spec-prod-ref">${[productRef?'REF '+productRef:'',productCode?'C\u00f3d '+productCode:''].filter(Boolean).join('\u2002\u00b7\u2002')||''}</div>
        </div>
        ${!isConc?`<div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn-icon-sm" data-edit-item="${s.id}" title="Editar">${SVG('edit',12)}</button>
          <button class="btn-icon-sm del" data-del-item="${s.id}" title="Excluir">${SVG('trash',12)}</button>
        </div>`:''}
      </div>
      <div class="spec-prod-chips">
        ${s.quantidade?`<span class="chip" style="font-weight:700;">${escHtml(String(s.quantidade))} ${escHtml(s.unidade||'UN')}</span>`:''}
        ${s.tipo?`<span class="chip">${escHtml(s.tipo)}</span>`:''}
        ${badgeCotar(s.id,s.cotar,isConc)}
        ${badgeSep(s.id,s.separado,isConc)}
      </div>
      ${s.cotar==='COTAR'?`<div class="spec-prod-price-row">
        <div>
          <div class="spec-prod-price-lbl">Pre\u00e7o Unit.</div>

          </div>
        </div>
      </div>`:''}
      ${s.obs?`<div style="font-size:11px;color:var(--text-3);margin-top:6px;padding-top:6px;border-top:.5px solid var(--hair);">${escHtml(s.obs)}</div>`:''}
    </div>`;
  }

  /* ── kebab menu ── */
  const kebab=S.specMenuOpen?`<div class="spec-kebab" onclick="event.stopPropagation()">
    <button class="spec-kebab-item" onclick="S._pdfSessaoId='${sessao.id}';S.modal='pdf-options';S.specMenuOpen=false;render()">${pdfIco} Exportar PDF</button>
    <button class="spec-kebab-item" onclick="(async()=>{const t='${escHtml(sessao.projeto||'')}';if(navigator.share)navigator.share({title:t,text:t});else navigator.clipboard.writeText(t);S.specMenuOpen=false;render();})()">${shareIco} Compartilhar</button>
    <div class="spec-kebab-sep"></div>
    ${isConc?`
    <button class="spec-kebab-item" onclick="S.vendaSheetOpen=true;S.specMenuOpen=false;render()">${vendaIco} Status de Venda</button>
    <button class="spec-kebab-item" id="btnReopenSpec" onclick="S.specMenuOpen=false">${editIco} Reabrir como Rascunho</button>
    `:`<button class="spec-kebab-item" id="btnConcluirSpec" ${items.length===0?'disabled style="opacity:.5;"':''} onclick="S.specMenuOpen=false">${checkIco} Concluir Especifica\u00e7\u00e3o</button>`}

  /* ── venda bottom-sheet ── */
  const vendaSheet=S.vendaSheetOpen?`<div class="spec-venda-sheet">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);" onclick="S.vendaSheetOpen=false;render()"></div>

        <div class="spec-add-label">Status</div>
        <select id="selVendaStatus" class="spec-add-inp">
          <option value="">Em aberto</option>
          <option value="vendido" ${sessao.vendaStatus==='vendido'?'selected':''}>Vendido</option>

      ${(sessao.vendaStatus==='vendido'||!sessao.vendaStatus)?`<div style="margin-bottom:16px;">

        <input id="inpValorVenda" class="spec-add-inp" type="text" placeholder="R$ 0,00" value="${sessao.valorVenda||''}" oninput="getActiveSessao().valorVenda=this.value;save();"/>
      </div>`:''}
      <button onclick="S.vendaSheetOpen=false;render()" style="width:100%;padding:12px;border-radius:100px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);">Fechar</button>
    </div>
