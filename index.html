// ===== DASHBOARD =====
/* ── matchQ: busca parcial multi-token (AND) ─────────────────
   Ex: matchQ(['Disjuntor Bipolar 40A'], 'dis bi 40') → true
   Todos os tokens do query devem aparecer em algum dos fields ── */
function normalizeSearchText(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function searchTokens(v){
  return normalizeSearchText(v).split(/[^a-z0-9]+/).filter(Boolean);
}
function fieldHasQuery(value, queryTokens){
  if(value==null||value==='')return false;
  const s=normalizeSearchText(value);
  const words=s.split(/[^a-z0-9]+/).filter(Boolean);
  const compact=s.replace(/[^a-z0-9]/g,'');
  return queryTokens.some(q=>words.some(w=>w.startsWith(q))||compact.includes(q));
}
function highlightQuery(value, rawQ){
  const str=String(value||'');
  if(!rawQ||!str)return escHtml(str);
  const tokens=searchTokens(rawQ);
  if(!tokens.length)return escHtml(str);
  const norm=normalizeSearchText(str);
  const ranges=[];
  tokens.forEach(t=>{
    let i=0;
    while((i=norm.indexOf(t,i))!==-1){ranges.push([i,i+t.length]);i+=t.length||1;}
  });
  if(!ranges.length)return escHtml(str);
  ranges.sort((a,b)=>a[0]-b[0]);
  const merged=[];
  ranges.forEach(r=>{const last=merged[merged.length-1];if(last&&r[0]<=last[1])last[1]=Math.max(last[1],r[1]);else merged.push([r[0],r[1]]);});
  let out='',pos=0;
  merged.forEach(([a,b])=>{out+=escHtml(str.slice(pos,a))+'<mark style="background:rgba(250,204,21,.30);color:inherit;border-radius:3px;padding:0 2px;">'+escHtml(str.slice(a,b))+'</mark>';pos=b;});
  out+=escHtml(str.slice(pos));
  return out;
}
function matchQ(fields, rawQ){
  if(!rawQ) return true;
  const queryTokens=searchTokens(rawQ);
  if(!queryTokens.length)return true;
  const words=[];
  const compact=[];
  fields.filter(v=>v!=null&&v!=='').forEach(v=>{
    const s=normalizeSearchText(v);
    const parts=s.split(/[^a-z0-9]+/).filter(Boolean);
    words.push(...parts);
    const joined=s.replace(/[^a-z0-9]/g,'');
    if(joined&&(/[-_/\\.]/.test(s)||(!/\s/.test(s)&&/[0-9]/.test(s))))compact.push(joined);
  });
  return queryTokens.every(q=>
    words.some(w=>w.startsWith(q)) ||
    compact.some(c=>c.includes(q))
  );
}

function normalizeSpecFilterValue(v){
  let s=String(v||'').trim().toUpperCase();
  s=s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  s=s
    .replace(/A[\u0191\u0192\u00A3\u00A1\u0081]/g,'A')
    .replace(/A[\u2021\u00A7]/g,'C')
    .replace(/A[\u2030\u0089\u00A9]/g,'E')
    .replace(/A[\u008D\u00AD]/g,'I')
    .replace(/A[\u201C\u00B3]/g,'O')
    .replace(/A[\u0161\u0153\u00BA\u00BC]/g,'U')
    .replace(/\bNAAO\b/g,'NAO')
    .replace(/[\u0080-\u009F]/g,'');
  return s.replace(/\s+/g,' ');
}
function sameSpecFilterValue(a,b){
  return normalizeSpecFilterValue(a)===normalizeSpecFilterValue(b);
}
function parseBirthdayDate(value){
  if(!value)return null;
  const m=String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m)return null;
  const month=parseInt(m[2],10),day=parseInt(m[3],10);
  if(month<1||month>12||day<1||day>31)return null;
  return {month,day};
}
function daysUntilBirthday(value,today=new Date()){
  const b=parseBirthdayDate(value);
  if(!b)return null;
  const base=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  let target=new Date(base.getFullYear(),b.month-1,b.day);
  if(target<base)target=new Date(base.getFullYear()+1,b.month-1,b.day);
  return Math.round((target-base)/86400000);
}
function formatBirthday(value){
  const b=parseBirthdayDate(value);
  if(!b)return '';
  return String(b.day).padStart(2,'0')+'/'+String(b.month).padStart(2,'0');
}
function architectBirthdayAlerts(){
  const targets=[30,7,2];
  return S.arqs
    .map(a=>({arq:a,days:daysUntilBirthday(a.aniversario||a.nascimento||'')}))
    .filter(x=>targets.includes(x.days))
    .sort((a,b)=>a.days-b.days);
}

function buildDash(){
  const isEmpty = S.prods.length===0 && S.arqs.length===0 && S.clis.length===0 && S.sessoes.length===0;
  if(isEmpty) return buildOnboarding();

  /* ── helpers ─────────────────────────────────────────────── */
  const parseVal = v => {
    if(!v) return 0;
    const n = parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));
    return isNaN(n) ? 0 : n;
  };
  const fmtK = v => {
    if(v >= 1000000) return 'R$ ' + (v/1000000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'M';
    if(v >= 1000) return 'R$ ' + Math.round(v/1000) + 'k';
    return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:0});
  };
  const fmtFull = v => 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const today = new Date();
  const thisMonth = today.getMonth();
  const thisYear = today.getFullYear();
  const dayNames = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const monthNames = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const dateStr = dayNames[today.getDay()] + ' · ' + today.getDate() + ' ' + monthNames[thisMonth];
  const mobName = (S.fbUser && S.fbUser.displayName) ? S.fbUser.displayName.split(' ')[0] : 'Você';

  /* ── financials ─────────────────────────────────────────────── */
  /* ── Period filter ──────────────────────────────────────── */
  const period = S.dashPeriod || 'mes';
  const periodLabels = {hoje:'hoje', sem:'na semana', mes:'no mês', tri:'no trimestre'};
  const periodLabel = periodLabels[period] || 'no mês';
  const periodChip = {hoje:'Hoje', sem:'Semana', mes:monthNames[thisMonth].charAt(0).toUpperCase()+monthNames[thisMonth].slice(1), tri:'Trim.'}[period];
  const inPeriod = s => {
    const d = s.criadoEm ? new Date(s.criadoEm) : null;
    if(!d) return false;
    if(period==='hoje') return d.toDateString()===today.toDateString();
    if(period==='sem'){const w=new Date(today);w.setDate(today.getDate()-7);return d>=w;}
    if(period==='tri'){const q=new Date(today);q.setMonth(today.getMonth()-3);return d>=q;}
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  };
  const sessoesMes = S.sessoes.filter(s => inPeriod(s));
  const vendidas = S.sessoes.filter(s => s.vendaStatus==='vendido');
  const vendidasMes = vendidas.filter(s => inPeriod(s));
  const valorVendidoMes = vendidasMes.reduce((a,s) => a+parseVal(s.valorVenda), 0);
  const valorTotalVendido = vendidas.reduce((a,s) => a+parseVal(s.valorVenda), 0);

  /* prev month delta */
  const prevMonth = thisMonth === 0 ? 11 : thisMonth - 1;
  const prevYear = thisMonth === 0 ? thisYear - 1 : thisYear;
  const vendidasPrev = vendidas.filter(s => {
    const d = s.criadoEm ? new Date(s.criadoEm) : null;
    return d && d.getMonth()===prevMonth && d.getFullYear()===prevYear;
  });
  const valorPrev = vendidasPrev.reduce((a,s) => a+parseVal(s.valorVenda), 0);
  const delta = valorPrev > 0 ? ((valorVendidoMes - valorPrev) / valorPrev * 100) : 0;
  const deltaSign = delta >= 0 ? '+' : '';
  const deltaStr = deltaSign + delta.toFixed(1) + '%';

  /* hero number breakdown */
  const heroInt = Math.floor(valorVendidoMes / 1000);
  const heroDec = valorVendidoMes % 1000;
  const heroDecStr = '.' + String(Math.round(heroDec)).padStart(3,'0');

  /* goal */
  const avgMonthly = vendidas.length > 0 ? valorTotalVendido / 12 : 50000;
  const goal = Math.max(avgMonthly * 1.3, 10000);
  const goalPct = Math.min(100, (valorVendidoMes / goal * 100)).toFixed(0);

  /* pipeline */
  const rascunhos = S.sessoes.filter(s => s.status==='rascunho');
  const enviadas  = S.sessoes.filter(s => s.status==='concluida' && s.vendaStatus!=='vendido' && s.vendaStatus!=='cancelado');
  const orcadas   = S.sessoes.filter(s => s.status==='concluida' && s.vendaStatus==='orcado');
  const canceladas= S.sessoes.filter(s => s.vendaStatus==='cancelado');
  const funnel = [
    { label:'Rascunho', count: rascunhos.length, value: fmtK(rascunhos.reduce((a,s)=>a+parseVal(s.valorVenda),0)), color:'hsl(32 95% 60%)' },
    { label:'Enviado',  count: enviadas.length,  value: fmtK(enviadas.reduce((a,s)=>a+parseVal(s.valorVenda),0)),  color:'hsl(220 92% 60%)' },
    { label:'Orçado',   count: vendidas.length + (orcadas.length||0), value: fmtK((orcadas.length?orcadas:enviadas).reduce((a,s)=>a+parseVal(s.valorVenda),0)), color:'hsl(280 80% 65%)' },
    { label:'Vendido',  count: vendidas.length,  value: fmtK(valorTotalVendido), color:'hsl(142 68% 45%)' },
  ];
  const totalFunnel = funnel.reduce((a,f)=>a+f.count,0);
  const totalFunnelVal = funnel.reduce((a,f)=>a+parseVal(f.value.replace('R$ ','').replace('k','000').replace('M','000000')),0);
  const convRate = funnel[0].count + funnel[1].count + funnel[2].count > 0
    ? Math.round(funnel[3].count / (funnel[0].count + funnel[1].count + funnel[2].count) * 100)
    : 0;

  /* KPIs */
  const ticketMedio = vendidasMes.length > 0 ? Math.round(valorVendidoMes / vendidasMes.length) : 0;
  const specsMes = sessoesMes.length;
  const fechadasGlobal = S.sessoes.filter(s=>s.vendaStatus==='vendido' || s.vendaStatus==='cancelado').length;
  const taxaFechamento = fechadasGlobal > 0
    ? Math.round(vendidas.length / fechadasGlobal * 100)
    : 0;

  /* deltas reais (mês atual vs mês anterior) */
  const sessoesPrev = S.sessoes.filter(s => {
    const d = s.criadoEm ? new Date(s.criadoEm) : null;
    return d && d.getMonth()===prevMonth && d.getFullYear()===prevYear;
  });
  const specsPrev = sessoesPrev.length;
  const specsDelta = specsMes - specsPrev;
  const hasSpecsPrev = specsPrev > 0;
  const valorPrevSum = vendidasPrev.reduce((a,s)=>a+parseVal(s.valorVenda),0);
  const ticketMedioPrev = vendidasPrev.length > 0 ? Math.round(valorPrevSum / vendidasPrev.length) : 0;
  const ticketDelta = ticketMedio - ticketMedioPrev;
  const hasTicketPrev = vendidasPrev.length > 0;
  const fechadasPrev = sessoesPrev.filter(s=>s.vendaStatus==='vendido' || s.vendaStatus==='cancelado').length;
  const taxaPrev = fechadasPrev > 0 ? Math.round(vendidasPrev.length / fechadasPrev * 100) : 0;
  const taxaDelta = taxaFechamento - taxaPrev;
  const hasTaxaPrev = fechadasPrev > 0;

  /* specs needing cotar */
  const specsCotarList = S.specs.filter(s => s.cotar && !s.preco).slice(0, 3);
  const alertsCotar = specsCotarList.length;
  const birthdayAlerts = architectBirthdayAlerts();
  const totalAlerts = alertsCotar + birthdayAlerts.length;

  /* top architects by value sold */
  const arqMap = {};
  vendidas.forEach(s => {
    const cli = S.clis.find(c=>c.id===s.clienteId);
    const arqId = cli ? cli.arquitetoId : null;
    if(!arqId) return;
    if(!arqMap[arqId]) arqMap[arqId] = { val: 0, count: 0 };
    arqMap[arqId].val += parseVal(s.valorVenda);
    arqMap[arqId].count++;
  });
  const arqColors = ['hsl(198 70% 50%)','hsl(280 60% 55%)','hsl(340 70% 55%)','hsl(32 85% 55%)'];
  const topArqs = S.arqs
    .map((a,i) => ({ ...a, sold: arqMap[a.id]?.val||0, deals: arqMap[a.id]?.count||0, color: arqColors[i%arqColors.length] }))
    .sort((a,b) => b.sold - a.sold)
    .slice(0, 4);

  /* Insight do arquiteto top: taxa de fechamento real + marca mais especificada */
  let topArqTaxa = 0;
  let topArqMarca = '';
  if(topArqs[0] && topArqs[0].deals > 0){
    const topId = topArqs[0].id;
    const cliIds = S.clis.filter(c=>c.arquitetoId===topId).map(c=>c.id);
    const sessArq = S.sessoes.filter(s=>cliIds.includes(s.clienteId));
    const fechadasArq = sessArq.filter(s=>s.vendaStatus==='vendido' || s.vendaStatus==='cancelado').length;
    const vendArq = sessArq.filter(s=>s.vendaStatus==='vendido').length;
    topArqTaxa = fechadasArq > 0 ? Math.round(vendArq/fechadasArq*100) : 0;
    const marcaCount = {};
    sessArq.filter(s=>s.vendaStatus==='vendido').forEach(s=>{
      sessaoItems(s.id).forEach(it=>{
        if(it.marca && it.marca.trim()) marcaCount[it.marca] = (marcaCount[it.marca]||0) + 1;
      });
    });
    const sortedMarcas = Object.entries(marcaCount).sort((a,b)=>b[1]-a[1]);
    if(sortedMarcas.length) topArqMarca = sortedMarcas[0][0];
  }

  /* recent specs */
  const recentSessoes = [...S.sessoes].sort((a,b)=>{
    const da = a.criadoEm ? new Date(a.criadoEm) : new Date(0);
    const db = b.criadoEm ? new Date(b.criadoEm) : new Date(0);
    return db - da;
  }).slice(0, 4);

  const statusChip = {
    vendido:   { cls:'chip-ok',     lbl:'Vendido' },
    aberto:    { cls:'chip-accent', lbl:'Em aberto' },
    rascunho:  { cls:'chip-warn',   lbl:'Rascunho' },
    cancelado: { cls:'chip-danger', lbl:'Cancelado' },
  };

  /* monthly chart — last 6 months */
  if(!['6m','1a','all'].includes(S.chartRange)) S.chartRange = '6m';
  const chartRange = S.chartRange;
  const monthDiff = (a,b) => (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
  const soldDates = vendidas
    .map(s => s.criadoEm ? new Date(s.criadoEm) : null)
    .filter(d => d && !isNaN(d));
  const firstSold = soldDates.length ? new Date(Math.min(...soldDates.map(d=>d.getTime()))) : null;
  const chartMonths = chartRange === 'all'
    ? Math.max(1, firstSold ? monthDiff(firstSold, today) + 1 : 6)
    : chartRange === '1a' ? 12 : 6;
  const chartTitle = {
    '6m': 'Faturamento &middot; ultimos 6 meses',
    '1a': 'Faturamento &middot; ultimos 12 meses',
    all: 'Faturamento &middot; todo periodo'
  }[chartRange];
  const monthTotal = (offset) => {
    const base = new Date(thisYear, thisMonth, 1);
    base.setMonth(base.getMonth() - offset);
    const m = base.getMonth();
    const y = base.getFullYear();
    return vendidas.filter(s => {
      const d = s.criadoEm ? new Date(s.criadoEm) : null;
      return d && d.getMonth()===m && d.getFullYear()===y;
    }).reduce((a,s)=>a+parseVal(s.valorVenda),0);
  };
  const chartData = [];
  const chartLabels = [];
  const labelEvery = chartMonths > 8 ? Math.ceil(chartMonths / 6) : 1;
  for(let i=chartMonths-1; i>=0; i--){
    const base = new Date(thisYear, thisMonth, 1);
    base.setMonth(base.getMonth() - i);
    const m = base.getMonth();
    const y = base.getFullYear();
    chartData.push(monthTotal(i));
    const idx = chartMonths - 1 - i;
    const label = chartRange === '6m'
      ? monthNames[m].charAt(0).toUpperCase()+monthNames[m].slice(1)
      : monthNames[m].charAt(0).toUpperCase()+monthNames[m].slice(1)+'/'+String(y).slice(2);
    chartLabels.push((idx % labelEvery === 0 || i === 0) ? label : '');
  }
  const totalChart = chartData.reduce((a,v)=>a+v,0);
  const prevChart = Array.from({length:chartMonths},(_,i)=>monthTotal(chartMonths+i)).reduce((a,v)=>a+v,0);
  const chartDelta = prevChart > 0 ? Math.round((totalChart-prevChart)/prevChart*100) : 0;
  const chartSub = chartRange === 'all'
    ? 'acumulado total'
    : `${chartDelta>=0?'+':''}${chartDelta}% vs. periodo anterior`;
  const chartRangeButtons = [
    { id:'6m', lbl:'6M' },
    { id:'1a', lbl:'1A' },
    { id:'all', lbl:'Tudo' }
  ];

  /* sparkline SVG */
  function sparkline(data, color, h=120) {
    const src = data.length > 1 ? data : [data[0]||0, data[0]||0];
    const max = Math.max(...src); const min = Math.min(...src);
    const pad = (max-min)*0.1 || 1;
    const lo = min-pad, hi = max+pad;
    const w = 320;
    const step = w / (src.length-1);
    const pts = src.map((v,i) => [i*step, h-((v-lo)/(hi-lo))*h]);
    let d = pts.map((p,i) => {
      if(i===0) return `M ${p[0]},${p[1]}`;
      const prev = pts[i-1];
      return `C ${prev[0]+step/2},${prev[1]} ${p[0]-step/2},${p[1]} ${p[0]},${p[1]}`;
    }).join(' ');
    const fillD = `${d} L ${w},${h} L 0,${h} Z`;
    const last = pts[pts.length-1];
    return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="spkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#spkFill)"/>
      <path d="${d}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="4" fill="${color}" stroke="#fff" stroke-width="2"/>
    </svg>`;
  }

  /* avatar initials */
  function avatarHtml(name, color, size=36) {
    const initials = name.split(' ').slice(0,2).map(s=>s[0]||'').join('').toUpperCase();
    const darker = color.replace('50%','35%');
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${color},${darker});">${initials}</div>`;
  }

  /* ── period tabs state ───────────────────────────────────── */
  if(!S.dashPeriod) S.dashPeriod = 'mes';

  /* ════════════════════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════════════════════ */
  return `
<div class="dash-screen screen-in">

  <!-- ── Header ──────────────────────────────────────────── -->
  <div class="app-header">
    <div>
      <div class="greet-sub">${dateStr}</div>
      <div class="greet">Olá, ${mobName}</div>
    </div>
    <div class="header-actions">
      <div class="icon-pill" onclick="S.searchOpen=true;S.searchQuery='';render()" style="cursor:pointer;">${icoSVG('search',17)}</div>
      <div class="icon-pill" onclick="S.notifOpen=true;render()" style="cursor:pointer;position:relative;">
        ${icoSVG('bell',17)}
        ${totalAlerts > 0 ? '<div class="dot-badge"></div>' : ''}
      </div>
      <div class="icon-pill" onclick="S.profileOpen=!S.profileOpen;render()" style="cursor:pointer;overflow:hidden;padding:0;width:36px;height:36px;border-radius:100px;${S.fbUser?'background:hsl(220 65% 55%);':''}">
        ${S.fbUser&&S.fbUser.photoURL
          ? `<img src="${S.fbUser.photoURL}" style="width:100%;height:100%;object-fit:cover;"/>`
          : S.fbUser&&S.fbUser.displayName
            ? `<span style="font-size:14px;font-weight:700;color:#fff;">${S.fbUser.displayName[0].toUpperCase()}</span>`
            : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`}
      </div>
    </div>
  </div>

  <!-- ── Period segmented ─────────────────────────────────── -->
  <div style="padding:2px 20px 14px;">
    <div class="segmented">
      <button class="${S.dashPeriod==='hoje'?'on':''}" onclick="S.dashPeriod='hoje';render()">Hoje</button>
      <button class="${S.dashPeriod==='sem'?'on':''}" onclick="S.dashPeriod='sem';render()">Semana</button>
      <button class="${S.dashPeriod==='mes'?'on':''}" onclick="S.dashPeriod='mes';render()">Mês</button>
      <button class="${S.dashPeriod==='tri'?'on':''}" onclick="S.dashPeriod='tri';render()">Trimestre</button>
    </div>
  </div>

  <!-- ── Hero card ────────────────────────────────────────── -->
  <div class="section dash-hero-head">
    <div class="section-head">
      <h3>Faturamento</h3>
    </div>
  </div>
  <div class="glass glass-strong hero">
    <div class="hero-head">
      <div class="hero-label">Vendas ${periodLabel}</div>
      <span class="chip">${periodChip}</span>
    </div>
    <div class="hero-value t-num">
      <span class="currency">R$</span>
      <span>${heroInt > 0 ? heroInt.toLocaleString('pt-BR') : '0'}</span>
      <span class="decimal" style="font-size:32px">${heroDecStr}</span>
    </div>
    <div class="hero-delta">
      ${icoSVG(delta >= 0 ? 'arrowup' : 'arrowdown', 12)}
      <span>${deltaStr}</span>
      <span style="opacity:0.7;font-weight:500;margin-left:4px;">vs. mês anterior</span>
    </div>
    <div class="hero-goal">
      <div class="hero-goal-label">Meta <b>${fmtK(goal)}</b></div>
      <div class="hero-goal-val">${goalPct}%</div>
      <div class="hero-goal-track">
        <div class="hero-goal-fill" style="width:${goalPct}%"></div>
      </div>
    </div>
  </div>

  <!-- ── KPI grid ─────────────────────────────────────────── -->
  <div class="section dash-indicators-head">
    <div class="section-head">
      <h3>Indicadores</h3>
      <button class="more" onclick="S.page='specs';render()">Ver detalhes</button>
    </div>
  </div>
  <div class="kpis">
    <div class="glass kpi">
      <div class="kpi-head">
        <div class="kpi-ico info">${icoSVG('doc',14)}</div>
        <div class="kpi-label">Especificações</div>
      </div>
      <div class="kpi-value t-num">${specsMes}</div>
      <div class="kpi-sub">ativas neste mês</div>
      ${hasSpecsPrev
        ? `<div class="kpi-delta ${specsDelta < 0 ? 'down' : ''}">
             ${icoSVG(specsDelta >= 0 ? 'arrowup' : 'arrowdown',10)}<span>${specsDelta >= 0 ? '+' : ''}${specsDelta} vs mês anterior</span>
           </div>`
        : `<div class="kpi-delta neutral"><span>sem dado anterior</span></div>`}
    </div>
    <div class="glass kpi">
      <div class="kpi-head">
        <div class="kpi-ico ok">${icoSVG('currency',14)}</div>
        <div class="kpi-label">Ticket médio</div>
      </div>
      <div class="kpi-value t-num">${ticketMedio > 0 ? fmtK(ticketMedio) : '—'}</div>
      <div class="kpi-sub">por especificação</div>
      ${hasTicketPrev
        ? `<div class="kpi-delta ${ticketDelta < 0 ? 'down' : ''}">
             ${icoSVG(ticketDelta >= 0 ? 'arrowup' : 'arrowdown',10)}<span>${ticketDelta >= 0 ? '+' : '−'}${fmtK(Math.abs(ticketDelta))} vs mês anterior</span>
           </div>`
        : `<div class="kpi-delta neutral"><span>sem dado anterior</span></div>`}
    </div>
    <div class="glass kpi">
      <div class="kpi-head">
        <div class="kpi-ico warn">${icoSVG('target',14)}</div>
        <div class="kpi-label">Taxa de fechamento</div>
      </div>
      <div class="kpi-value t-num">${taxaFechamento}%</div>
      <div class="kpi-sub">vendido / (vendido + cancelado)</div>
      ${hasTaxaPrev
        ? `<div class="kpi-delta ${taxaDelta < 0 ? 'down' : ''}">
             ${icoSVG(taxaDelta >= 0 ? 'arrowup' : 'arrowdown', 10)}<span>${taxaDelta >= 0 ? '+' : '−'}${Math.abs(taxaDelta)}pp vs mês anterior</span>
           </div>`
        : `<div class="kpi-delta neutral"><span>sem dado anterior</span></div>`}
    </div>
    <div class="glass kpi">
      <div class="kpi-head">
        <div class="kpi-ico ok">${icoSVG('clock',14)}</div>
        <div class="kpi-label">Tempo médio</div>
      </div>
      <div class="kpi-value t-num">12d</div>
      <div class="kpi-sub">da spec à venda</div>
      <div class="kpi-delta">
        ${icoSVG('arrowup',10)}<span>−3d</span>
      </div>
    </div>
  </div>

  <!-- ── Pipeline ─────────────────────────────────────────── -->
  <div class="section dash-pipeline-section">
    <div class="section-head">
      <h3>Pipeline de vendas</h3>
      <button class="more" onclick="S.page='specs';render()">Abrir</button>
    </div>
    <div class="glass pipeline">
      <div class="pipeline-head">
        <div class="pipeline-title">Pipeline · ${totalFunnel} specs</div>
        <div class="pipeline-total">em negociação <b>${fmtK(rascunhos.concat(enviadas).reduce((a,s)=>a+parseVal(s.valorVenda),0))}</b></div>
      </div>
      <div class="funnel">
        ${funnel.map(f => `
        <div class="funnel-stage" style="--stage-color:${f.color}" onclick="S.page='specs';render()">
          <div class="funnel-count t-num">${f.count}</div>
          <div class="funnel-label">${f.label}</div>
          <div class="funnel-value t-num">${f.value}</div>
        </div>`).join('')}
      </div>
      <div class="conversion">
        <span>Conversão orçado → vendido</span>
        <div class="conversion-bar"><div style="width:${convRate}%"></div></div>
        <b>${convRate}%</b>
      </div>
    </div>
  </div>

  <!-- ── Insight (novo design) ─────────────────────────────── -->
  <div class="dash-insight" style="margin:20px 20px 12px;">
    <div class="glass" style="border-radius:24px;padding:18px;background:linear-gradient(135deg,hsl(var(--accent-h,215) var(--accent-s,100%) 26%),hsl(calc(var(--accent-h,215) + 25) var(--accent-s,100%) 20%));position:relative;overflow:hidden;">
      <div style="position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:28px;height:28px;border-radius:100px;background:rgba(47,143,247,0.35);border:1.5px solid rgba(47,143,247,0.6);display:flex;align-items:center;justify-content:center;">
          ${icoSVG('sparkle',14)}
        </div>
        <span style="font-size:11px;font-weight:700;letter-spacing:0.8px;color:rgba(255,255,255,0.6);">INSIGHT</span>
      </div>
      <div style="font-size:15px;font-weight:500;color:#fff;line-height:1.5;margin-bottom:14px;">
        ${topArqs.length > 0 && topArqs[0].deals > 0 && topArqTaxa > 0
          ? topArqMarca
            ? `Sua taxa de fechamento com <b>${topArqs[0].nome}</b> está em <b>${topArqTaxa}%</b>. <b>${topArqMarca}</b> é a marca mais vendida nas specs dela — vale priorizar nas próximas.`
            : `Sua taxa de fechamento com <b>${topArqs[0].nome}</b> está em <b>${topArqTaxa}%</b>${topArqs[0].escritorio?` (${topArqs[0].escritorio})`:''}. Mantenha o ritmo nas próximas specs.`
          : taxaFechamento >= 50
          ? `Taxa de conversão geral em <b>${taxaFechamento}%</b> — ótimo desempenho! Foque nos arquitetos mais ativos para acelerar ainda mais.`
          : `Taxa de conversão geral em <b>${taxaFechamento}%</b>. Foque nas specs mais antigas para fechar mais negócios.`
        }
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="S.page='arqs';render()" style="flex:1;padding:9px 14px;border-radius:100px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);">Ver arquitetos</button>
        <button style="flex:1;padding:9px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);">Agora não</button>
      </div>
    </div>
  </div>

  <!-- ── Precisa da sua atenção ─────────────────────────────── -->
  ${(()=>{
    const attnItems = [];
    birthdayAlerts.forEach(({arq,days})=>attnItems.push({
      color:'#EC4899', bg:'rgba(236,72,153,0.15)',
      ico:'<path d="M12 7v14M7 10v11M17 10v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 11h16v10H4zM3 7h18v4H3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 7c-2 0-3-1.1-3-2.2C9 3.8 9.8 3 10.8 3c1.4 0 2.2 1.3 1.2 4zm0 0c2 0 3-1.1 3-2.2C15 3.8 14.2 3 13.2 3 11.8 3 11 4.3 12 7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>',
      title: 'Aniversário de ' + arq.nome + ' em ' + days + ' dia' + (days!==1?'s':''),
      sub: formatBirthday(arq.aniversario||arq.nascimento) + (arq.escritorio?' · '+arq.escritorio:''),
      cta: 'Ver arquiteto ›', nav: 'arqs'
    }));
    if(alertsCotar > 0) attnItems.push({
      color:'#EF4444', bg:'rgba(239,68,68,0.15)',
      ico:'<path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
      title: alertsCotar + ' especificação' + (alertsCotar>1?'s':'') + ' sem cotação',
      sub: 'Produtos COTAR sem preço definido',
      cta: 'Revisar ›', nav: 'specs'
    });
    if(vendidas.length===0 && S.sessoes.length>0) attnItems.push({
      color:'#F59E0B', bg:'rgba(245,158,11,0.15)',
      ico:'<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      title: 'Nenhuma venda registrada',

    </div>`;
  })()}

  <!-- ── Revenue chart ─────────────────────────────────────── -->
  <div class="section dash-chart-section">
    <div class="section-head">
      <h3>Faturamento</h3>
      <button class="more">Exportar</button>

    <div class="glass chart-card" id="dashboardRevenueCard">

  <!-- ── Top architects ────────────────────────────────────── -->
  ${topArqs.length > 0 ? `
  <div class="section dash-architects-section">
    <div class="section-head">
      <h3>Top arquitetos</h3>
      <button class="more" onclick="S.page='arqs';render()">Ver todos</button>
    </div>
    <div class="glass rank-card">
      ${topArqs.map((a,i) => `
        <div class="rank-row${i===0?' top':''}">
