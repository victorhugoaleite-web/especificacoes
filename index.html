  /* ── add product sheet ── */
  const addSheet=S.addRow&&!isConc?`<div class="spec-add-sheet">
    <div class="spec-add-sheet-bg" onclick="S.addRow=false;S.addData={cotar:'NÃO COTAR',separado:'NÃO SEPARADO'};render()"></div>
    <div class="spec-add-sheet-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="spec-add-sheet-title">Adicionar Produto</div>
        <button onclick="S.addRow=false;S.addData={cotar:'NÃO COTAR',separado:'NÃO SEPARADO'};render()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:20px;line-height:1;">\u00d7</button>
      </div>
      <div id="addSpecRow">
        <div class="ac-wrap" style="position:relative;margin-bottom:12px;">
          <input id="arProd" class="spec-add-inp" placeholder="Buscar produto do cat\u00e1logo..." value="${S.addData.produto||''}" autocomplete="off"/>
          <div id="acListContainer"></div>
        </div>
        <div class="spec-add-row2" style="margin-bottom:12px;">
          <input id="arMarca" class="spec-add-inp" placeholder="Marca" value="${S.addData.marca||''}"/>
          <input type="hidden" id="arTipo" value="${S.addData.tipo||''}"><div onclick="S.openDrop=S.openDrop==='specArTipo'?null:'specArTipo';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${S.addData.tipo?'var(--text)':'var(--text-3)'};">${S.addData.tipo||'Tipo'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
        </div>
        <div class="spec-add-row2" style="margin-bottom:12px;">
          <input id="arAmb" list="ambList" class="spec-add-inp" placeholder="Ambiente" value="${S.addData.ambiente||''}" autocomplete="off"/>
          <datalist id="ambList">${AMBS.map(a=>`<option value="${a}"></option>`).join('')}</datalist>
          <div class="spec-add-row2" style="gap:6px;">
            <input id="arQtd" class="spec-add-inp" type="number" min="0" placeholder="Qtd" value="${S.addData.quantidade||''}"/>
            <input type="hidden" id="arUnid" value="${S.addData.unidade||''}"><div onclick="S.openDrop=S.openDrop==='specArUnid'?null:'specArUnid';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${S.addData.unidade?'var(--text)':'var(--text-3)'};">${S.addData.unidade||'Un.'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
          </div>
        </div>
        <div class="spec-add-row2" style="margin-bottom:12px;">
          <input id="arRef" class="spec-add-inp" placeholder="REF" value="${S.addData.referencia||''}"/>
          <input id="arCod" class="spec-add-inp" placeholder="C\u00f3digo" value="${S.addData.codigo||''}"/>
        </div>
        <div class="spec-add-row2" style="margin-bottom:12px;">
          <input type="hidden" id="arCotar" value="${S.addData.cotar||''}"><div onclick="S.openDrop=S.openDrop==='specArCotar'?null:'specArCotar';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${S.addData.cotar?'var(--text)':'var(--text-3)'};">${S.addData.cotar||'Cotar?'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
          <input type="hidden" id="arSep" value="${S.addData.separado||''}"><div onclick="S.openDrop=S.openDrop==='specArSep'?null:'specArSep';render()" style="height:44px;background:var(--glass-tint-2);border:0.5px solid var(--glass-border);border-radius:13px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;cursor:pointer;font-family:var(--font);"><span style="font-size:14px;color:${S.addData.separado?'var(--text)':'var(--text-3)'};">${S.addData.separado||'Separação'}</span><svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M0 0l5 6 5-6" fill="currentColor" opacity=".45"/></svg></div>
        </div>
        <input id="arObs" class="spec-add-inp" placeholder="Obs." value="${S.addData.obs||''}" style="margin-bottom:16px;"/>
        <button class="btn btn-primary" id="btnSaveItem" style="width:100%;padding:12px;border-radius:100px;font-size:15px;font-weight:700;">${checkIco} Adicionar</button>
      </div>
    </div>
    ${S.openDrop==='specArTipo'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">TIPO</div><div onclick="S.addData.tipo='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${TIPOS.map(t=>`<div onclick="S.addData.tipo='${t}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${S.addData.tipo===t?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${t}</div>`).join('')}</div>`:''}${S.openDrop==='specArUnid'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">UNIDADE</div><div onclick="S.addData.unidade='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${UNIDADES.map(u=>`<div onclick="S.addData.unidade='${u}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${S.addData.unidade===u?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${u}</div>`).join('')}</div>`:''}${S.openDrop==='specArCotar'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">COTAR?</div><div onclick="S.addData.cotar='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${COTAR.map(o=>`<div onclick="S.addData.cotar='${o}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${S.addData.cotar===o?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${o}</div>`).join('')}</div>`:''}${S.openDrop==='specArSep'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.35);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto;"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">SEPARAÇÃO</div><div onclick="S.addData.separado='';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:var(--text-3);">—</div>${SEP.map(o=>`<div onclick="S.addData.separado='${o}';S.openDrop=null;render()" style="padding:14px 20px;font-size:15px;cursor:pointer;color:${S.addData.separado===o?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);">${o}</div>`).join('')}</div>`:''}  
  </div>`:'';

  const specFilterOpt=(kind,value)=>`<button type="button" class="spec-filter-option${sameSpecFilterValue(specFilt[kind],value)?' on':''}" data-spec-filter-kind="${kind}" data-spec-filter-value="${esc(value)}">${escHtml(value)}</button>`;
  const specFilterSheet=`<div class="spec-filter-backdrop" data-close-spec-filter></div>
    <div class="spec-filter-sheet" onclick="event.stopPropagation()">
      <div class="spec-filter-head">
        <div class="spec-filter-title">Filtrar</div>
        ${activeFiltCount>0?`<button type="button" class="spec-filter-clear" data-clear-spec-filter>Limpar tudo</button>`:''}
      </div>
      <div class="spec-filter-label">Tipo</div>
      <div class="spec-filter-options">${TIPOS.map(t=>specFilterOpt('tipo',t)).join('')}</div>
      <div class="spec-filter-label">Cotar</div>
      <div class="spec-filter-options">${COTAR.map(o=>specFilterOpt('cotar',o)).join('')}</div>
      <div class="spec-filter-label">Separação</div>
      <div class="spec-filter-options last">${SEP.map(o=>specFilterOpt('separado',o)).join('')}</div>
      <div class="spec-filter-actions">
        <button type="button" class="spec-filter-apply" id="btnApplySpecFilter">Aplicar</button>
      </div>
    </div>`;

  return`<div style="max-width:1400px;padding-top:56px;padding-bottom:120px;" onclick="${S.specMenuOpen?'S.specMenuOpen=false;render()':''}">

    <!-- TOP SCRIM -->
    <div style="position:fixed;top:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.70) 40%,rgba(0,0,0,0.30) 70%,transparent 100%);z-index:19;pointer-events:none;"></div>

    <!-- NAV BAR -->
    <div class="spec-nav">
      <button class="spec-nav-back" onclick="S.page='specs';S.activeSessaoId=null;S.specMenuOpen=false;render()">
        ${backIco} Specs
      </button>
      <div class="spec-nav-title">${escHtml(sessao.projeto||'Especifica\u00e7\u00e3o')}</div>
      <div class="spec-nav-menu" onclick="event.stopPropagation();S.specMenuOpen=!S.specMenuOpen;render()">
        ${dotsIco}
        ${kebab}
      </div>
    </div>

    <!-- HEADER CARD -->
    <div class="spec-hdr-card">
      <div class="spec-hdr-kicker">ESPECIFICA\u00c7\u00c3O\u2002\u00b7\u2002${fmtDate(sessao.criadoEm)}</div>
      <div class="spec-hdr-title">${escHtml(sessao.projeto||'Sem t\u00edtulo')}</div>
      <div class="spec-hdr-sub">${cli?escHtml(cli.nome):'Sem cliente'}</div>
      <div class="spec-hdr-chips">
        <span class="chip ${badgeCls}" style="font-size:10px;font-weight:700;">${badgeLbl}</span>
        ${arq?`<div class="client-arch-chip" style="padding:4px 10px 4px 4px;">
          <div class="avatar-dot neutral" style="width:18px;height:18px;font-size:8px;">${arqInitial}</div>
          <span style="font-size:11px;">${escHtml(arq.nome)}</span>
        </div>`:''}
        ${arq&&arq.escritorio?`<span class="chip" style="font-size:11px;">${escHtml(arq.escritorio)}</span>`:''}
      </div>
      <div class="spec-hdr-stats">
        <div class="spec-hdr-stat">
          <div class="spec-hdr-stat-val">${items.length}</div>
          <div class="spec-hdr-stat-lbl">Produtos</div>
        </div>
        <div class="spec-hdr-stat">
          <div class="spec-hdr-stat-val">${totalUnits}</div>
          <div class="spec-hdr-stat-lbl">Unidades</div>
        </div>
        <div class="spec-hdr-stat">
          <div class="spec-hdr-stat-val" style="${aCotar>0?'color:#f59e0b':''}">${aCotar}${items.filter(i=>i.cotar==='COTAR').length>0?'/'+items.filter(i=>i.cotar==='COTAR').length:''}</div>
          <div class="spec-hdr-stat-lbl">A Cotar</div>
        </div>
      </div>
    </div>

    <!-- META BAR -->
    <div class="spec-meta-bar">
      <div class="spec-meta-txt">${ambSet.length} ambiente${ambSet.length!==1?'s':''} \u00b7 ${displayItems.length}${activeFiltCount>0?' de '+items.length:''} produto${displayItems.length!==1?'s':''}</div>
      <div class="spec-meta-btns">
        <button class="spec-meta-btn" style="${activeFiltCount>0?'background:color-mix(in oklab,var(--accent) 18%,transparent);color:var(--accent);border-color:var(--accent);':''}" onclick="S.openDrop='specFilterV2';render()">${filterIco} Filtrar${activeFiltCount>0?` <span style="background:var(--accent);color:#fff;border-radius:100px;padding:0 5px;font-size:9px;font-weight:700;">${activeFiltCount}</span>`:''}</button>
        <button class="spec-meta-btn" style="${specSortKey!=='ambiente'?'background:color-mix(in oklab,var(--accent) 18%,transparent);color:var(--accent);border-color:var(--accent);':''}" onclick="S.openDrop='specSort';render()">Ordenar ${chevIco}</button>
      </div>
    </div>

    <!-- PRODUTOS POR AMBIENTE -->
    ${ambSet.length===0||displayItems.length===0?`<div style="margin:0 16px 12px;padding:40px 20px;text-align:center;background:var(--glass-tint-2);border:.5px solid var(--glass-border);border-radius:20px;">
      <div style="font-size:32px;margin-bottom:10px;">${activeFiltCount>0?'&#128269;':'&#128230;'}</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);">${activeFiltCount>0?'Nenhum resultado':'Nenhum produto'}</div>
      <div style="font-size:13px;color:var(--text-3);margin-top:4px;">${activeFiltCount>0?'Tente remover os filtros':'Toque em Adicionar produto'}</div>
      ${activeFiltCount>0?`<button onclick="S.specFilter={};render()" style="margin-top:12px;padding:8px 20px;border-radius:100px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);">Limpar filtros</button>`:''}
    </div>`:ambSet.map(amb=>{

      return `<div>
        <div class="spec-amb-hdr" onclick="S.collapsedAmbs=S.collapsedAmbs||[];const idx=S.collapsedAmbs.indexOf('${amb}');idx>=0?S.collapsedAmbs.splice(idx,1):S.collapsedAmbs.push('${amb}');render()">
          <span class="spec-amb-chevron ${collapsed?'closed':'open'}">${chevIco}</span>
          <span class="spec-amb-name">${escHtml(amb)}</span>
          <div class="spec-amb-count">
            <span class="chip">${ambUnits} un</span>
            ${ambCot>0?`<span class="chip chip-ok">${ambCot} &#10003;</span>`:''}
          </div>
        </div>
        ${collapsed?'':ambItems.map(s=>prodCard(s)).join('')}
      </div>`;
    }).join('')}

    <!-- BOTÃO FAB -->
    ${!isConc?`<button class="spec-add-fab" id="btnAddRow">${plusIco} Adicionar produto</button>`
    :`<button class="spec-reopen-btn" id="btnReopenSpec">${editIco} Reabrir como Rascunho</button>`}

    <!-- SHEETS -->
    ${addSheet}
    ${vendaSheet}
    ${S.openDrop==='specFilterV2'?specFilterSheet:''}
    ${S.openDrop==='specFilter'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.4);"></div><div onclick="event.stopPropagation()" style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:0 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);max-height:80vh;overflow-y:auto;"><div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:.5px solid var(--glass-border);"><div style="font-size:16px;font-weight:700;">Filtrar</div>${activeFiltCount>0?`<button onclick="S.specFilter={};render()" style="padding:5px 12px;border-radius:100px;background:color-mix(in oklab,var(--accent) 18%,transparent);color:var(--accent);border:.5px solid var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);">Limpar tudo</button>`:''}</div><div style="padding:16px 20px 8px;font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;">TIPO</div><div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 16px;border-bottom:.5px solid var(--sep);">${TIPOS.map(t=>`<div onclick="S.specFilter=Object.assign({},S.specFilter,{tipo:S.specFilter?.tipo===t?'':t});render()" style="padding:6px 14px;border-radius:100px;font-size:13px;cursor:pointer;font-family:var(--font);background:${specFilt.tipo===t?'var(--accent)':'var(--glass-tint-2)'};color:${specFilt.tipo===t?'#fff':'var(--text-2)'};border:.5px solid ${specFilt.tipo===t?'transparent':'var(--glass-border)'}; ">${t}</div>`).join('')}</div><div style="padding:12px 20px 8px;font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;">COTAR</div><div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 16px;border-bottom:.5px solid var(--sep);">${COTAR.map(o=>`<div onclick="S.specFilter=Object.assign({},S.specFilter,{cotar:S.specFilter?.cotar===o?'':o});render()" style="padding:6px 14px;border-radius:100px;font-size:13px;cursor:pointer;font-family:var(--font);background:${specFilt.cotar===o?'var(--accent)':'var(--glass-tint-2)'};color:${specFilt.cotar===o?'#fff':'var(--text-2)'};border:.5px solid ${specFilt.cotar===o?'transparent':'var(--glass-border)'}; ">${o}</div>`).join('')}</div><div style="padding:12px 20px 8px;font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;">SEPARAÇÃO</div><div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 20px;">${SEP.map(o=>`<div onclick="S.specFilter=Object.assign({},S.specFilter,{separado:S.specFilter?.separado===o?'':o});render()" style="padding:6px 14px;border-radius:100px;font-size:13px;cursor:pointer;font-family:var(--font);background:${specFilt.separado===o?'var(--accent)':'var(--glass-tint-2)'};color:${specFilt.separado===o?'#fff':'var(--text-2)'};border:.5px solid ${specFilt.separado===o?'transparent':'var(--glass-border)'}; ">${o}</div>`).join('')}</div><div style="padding:0 20px;"><button onclick="S.openDrop=null;render()" style="width:100%;padding:12px;border-radius:100px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);">Aplicar</button></div></div>`:''}  
    ${S.openDrop==='specSort'?`<div onclick="S.openDrop=null;render()" style="position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.4);"></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:22px 22px 0 0;padding:8px 0 32px;box-shadow:0 -8px 48px rgba(0,0,0,.7);"><div style="padding:12px 20px;font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;border-bottom:.5px solid var(--glass-border);text-align:center;">ORDENAR POR</div>${[['ambiente','Ambiente (padrão)'],['nome','Nome A → Z'],['tipo','Tipo'],['recente','Mais recentes']].map(([k,lbl])=>`<div onclick="S.specSort='${k}';S.openDrop=null;render()" style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;font-size:15px;cursor:pointer;color:${specSortKey===k?'var(--accent)':'var(--text)'};border-top:.5px solid var(--sep);"><span>${lbl}</span>${specSortKey===k?'<svg width=\'14\' height=\'14\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2.5\' stroke-linecap=\'round\'><polyline points=\'20 6 9 17 4 12\'/></svg>':''}</div>`).join('')}</div>`:''}  
  </div>`;
}

function badgeCotar(id,v,readonly=false){
  const attr=readonly?'':`data-cyc-cotar="${id}"`;
  if(!v)return`<span class="badge badge-gray" ${attr}>—</span>`;
  return v==='COTAR'?`<span class="badge badge-green" ${attr}>COTAR</span>`:`<span class="badge badge-red" ${attr}>NÃO COTAR</span>`;
}
function badgeSep(id,v,readonly=false){
  const attr=readonly?'':`data-cyc-sep="${id}"`;
  if(!v)return`<span class="badge badge-gray" ${attr}>—</span>`;
  if(v==='SEPARADO')return`<span class="badge badge-green" ${attr}>SEPARADO</span>`;
  if(v==='EM SEPARAÇÃO')return`<span class="badge badge-orange" ${attr}>EM SEPARAÇÃO</span>`;
  return`<span class="badge badge-red" ${attr}>NÃO SEPARADO</span>`;
}
function emptyState(ic,title,sub){return`<div class="empty"><div class="empty-ico">${SVG(ic,48)}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;}

    <div class="modal-header">
      <div class="modal-title">Nova Especificação</div>
      <button class="modal-close" id="btnClose">${SVG('x',14)}</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">Selecione o cliente e defina o projeto para começar a adicionar produtos.</p>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-field">
          <label>Cliente *</label>
          <select id="nsCliente" class="${er.cliente?'err':''}">
            <option value="">Selecione o cliente...</option>
            ${S.clis.map(c=>{const a=S.arqs.find(a=>a.id===c.arquitetoId);return`<option value="${c.id}">${c.nome}${a?' — '+a.nome:''}</option>`;}).join('')}
          </select>
          ${er.cliente?`<div class="field-err">${SVG('warn',11)} ${er.cliente}</div>`:''}
        </div>
        <div class="form-field" id="nsArqRow" style="${S._nsCliente?'':'opacity:.4;pointer-events:none;'}">
          <label>Arquiteto</label>
          <input id="nsArqNome" readonly value="${(()=>{if(!S._nsCliente)return'';const c=S.clis.find(c=>c.id===S._nsCliente);const a=c?S.arqs.find(a=>a.id===c.arquitetoId):null;return a?a.nome+' — '+(a.escritorio||''):'Sem arquiteto vinculado';})()}" style="background:var(--surface2);color:var(--text-secondary);cursor:default;"/>
        </div>
        <div class="form-field">
          <label>Projeto / Obra *</label>
          <input id="nsProjeto" placeholder="Ex: Apartamento Pinheiros" value="${S._nsProjeto||''}" class="${er.projeto?'err':''}"/>

}

function buildModal(){

  if(S.modal==='arq')return buildModalArq();
  if(S.modal==='cli')return buildModalCli();
  if(S.modal==='pdf-options')return buildModalPdfOptions();
  if(S.modal==='report')return buildModalReport();
  return'';
}
function ff(label,html,full=false,err=''){return`<div class="form-field${full?' full':''}"><label>${label}</label>${html}${err?`<div class="field-err">${SVG('warn',11)} ${err}</div>`:''}</div>`;}
function mhdr(t){return`<div class="modal-header"><div class="modal-title">${t}</div><button class="modal-close" id="btnClose">${SVG('x',14)}</button></div>`;}
function mwrap(t,b,w=600){return`<div class="modal-bg" id="modalBg"><div class="modal" style="max-width:${w}px;">${mhdr(t)}<div class="modal-body">${b}</div></div></div>`;}
function mFooter(id,lbl){return`<div class="modal-footer"><button class="btn btn-neutral" id="btnClose2">Cancelar</button><button class="btn btn-primary" id="${id}">${lbl}</button></div>`;}
function buildModalProd(){
  /* editItem pode ser o objeto produto ou um ID string */
  const e = typeof S.editItem === 'string'
    ? (S.prods.find(p=>p.id===S.editItem)||{})
    : (S.editItem||{});
  const er=S._err||{};
  const isEdit=!!e.id;
  const mp=S._mp||{imagemPrincipal:e.imagemPrincipal||'',gifProduto:e.gifProduto||'',imagensAplicado:[...(e.imagensAplicado||[])]};

  const fieldStyle='width:100%;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--bg-1);color:var(--text);font-size:15px;font-family:var(--font);padding:0 14px;box-sizing:border-box;outline:none;';
  const labelStyle='display:block;font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:0.4px;margin-bottom:5px;text-transform:uppercase;';
  const fieldWrap=(label,html,err='')=>`<div style="margin-bottom:14px;">
    <label style="${labelStyle}">${label}</label>
    ${html}
    ${err?`<div style="font-size:11px;color:var(--danger);margin-top:3px;">${err}</div>`:''}
  </div>`;

  /* ── Upload box helpers ───────────────────────────────────── */
  const uploadBox=(id,preview,removeKey,accept='image/*',label='Selecionar arquivo')=>
    preview
      ? `<div style="position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--border);aspect-ratio:16/9;background:#000;">
           <img src="${preview}" style="width:100%;height:100%;object-fit:cover;"/>
           <button data-remove="${removeKey}" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:100px;background:rgba(0,0,0,0.55);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">&times;</button>
         </div>`
      : `<label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:80px;border-radius:12px;border:1.5px dashed var(--border);background:var(--bg-1);cursor:pointer;">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
           <span style="font-size:12px;color:var(--text-3);">${label}</span>
           <input id="${id}" type="file" accept="${accept}" style="display:none;"/>
         </label>`;

  /* ── Fotos Aplicado grid ─────────────────────────────────── */
  const fotosAplicado=()=>{
    const slots=mp.imagensAplicado.map((src,i)=>
      `<div style="position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#000;">
         <img src="${src}" style="width:100%;height:100%;object-fit:cover;"/>
         <button data-remove-applied="${i}" style="position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:100px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">&times;</button>
       </div>`
    );
    const canAdd=mp.imagensAplicado.length<5;
    const addSlot=canAdd
      ? `<label style="aspect-ratio:1;border-radius:10px;border:1.5px dashed var(--border);background:var(--bg-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
           <span style="font-size:10px;color:var(--text-3);">Foto</span>
           <input type="file" accept="image/*" class="fImgAplicado" style="display:none;"/>
         </label>`
      : '';
    return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">${slots.join('')}${addSlot}</div>`;
  };

  /* ── Seção mídia ─────────────────────────────────────────── */
  const mediaSec=`
    <div style="padding:14px 0 4px;border-top:1px solid var(--sep);margin-top:4px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:14px;">M\u00eddia</div>

      <!-- linha: Imagem Principal + GIF -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label style="${labelStyle}">Imagem Principal</label>
          ${uploadBox('fImgPrincipal',mp.imagemPrincipal,'imagemPrincipal','image/*','Imagem principal')}
        </div>
        <div>
          <label style="${labelStyle}">GIF Animado</label>
          ${uploadBox('fGif',mp.gifProduto,'gifProduto','image/gif,image/*','GIF animado')}
        </div>
      </div>

      <!-- V\u00eddeo URL -->
      ${fieldWrap('V\u00eddeo (URL YouTube / Vimeo)',`<input id="fVideoUrl" type="url" value="${esc(e.videoUrl||'')}" placeholder="https://youtu.be/..." style="${fieldStyle}" autocomplete="off"/>`)}

      <!-- Fotos Aplicado -->
      <div style="margin-bottom:14px;">
        <label style="${labelStyle}">Fotos Aplicado (at\u00e9 5)</label>
        ${fotosAplicado()}
      </div>
    </div>`;

  const body=`<div>
    <!-- linha 1: Nome (full) -->
    ${fieldWrap('Nome',`<input id="fNome" value="${esc(e.nome||'')}" placeholder="Ex: Disjuntor DIN Tripolar 70A" style="${fieldStyle}${er.nome?'border-color:var(--danger);':''}" class="${er.nome?'err':''}" autocomplete="off"/>`,er.nome||'')}

    <!-- linha 2: Marca + Tipo -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
      <div>
        <label style="${labelStyle}">Marca</label>
        <input id="fMarca" value="${esc(e.marca||'')}" placeholder="Ex: Schneider" style="${fieldStyle}" autocomplete="off"/>
      </div>
      <div>
        <label style="${labelStyle}">Tipo</label>
        <select id="fTipo" style="${fieldStyle}cursor:pointer;">
          <option value="">Selecionar</option>
          ${TIPOS.map(t=>`<option value="${t}" ${e.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>

    <!-- linha 3: C\u00f3digo + Refer\u00eancia -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
      <div>
        <label style="${labelStyle}">C\u00f3digo</label>
        <input id="fCod" value="${esc(e.codigo||'')}" placeholder="Ex: A9N21078" style="${fieldStyle}" autocomplete="off"/>
      </div>
      <div>
        <label style="${labelStyle}">Refer\u00eancia</label>
        <input id="fRef" value="${esc(e.referencia||'')}" placeholder="Ref." style="${fieldStyle}" autocomplete="off"/>
      </div>
    </div>

    <!-- linha 4: Unidade + Site Fornecedor -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
      <div>
        <label style="${labelStyle}">Unidade</label>
        <select id="fUnid" style="${fieldStyle}cursor:pointer;">
          <option value="">\u2014</option>
          ${UNIDADES.map(u=>`<option value="${u}" ${e.unidade===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="${labelStyle}">Site Fornecedor</label>
        <input id="fFornUrl" type="url" value="${esc(e.fornecedorUrl||'')}" placeholder="https://..." style="${fieldStyle}" autocomplete="off"/>
      </div>
    </div>

    <!-- Observa\u00e7\u00f5es -->
    ${fieldWrap('Observa\u00e7\u00f5es',`<textarea id="fObs" rows="3" placeholder="Notas, especifica\u00e7\u00f5es t\u00e9cnicas..." style="width:100%;border-radius:12px;border:1px solid var(--border);background:var(--bg-1);color:var(--text);font-size:15px;font-family:var(--font);padding:10px 14px;box-sizing:border-box;outline:none;resize:none;">${esc(e.obs||'')}</textarea>`)}

    <!-- M\u00eddia -->
    ${mediaSec}

    ${isEdit?`<div style="padding:12px 0 4px;border-top:1px solid var(--sep);">
      <button id="btnDeleteProd" style="width:100%;height:40px;border-radius:12px;border:1px solid rgba(220,60,60,0.35);background:rgba(220,60,60,0.08);color:var(--danger);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);">Excluir produto</button>
    </div>`:''}
  </div>`;

  return mwrap(`${isEdit?'Editar':'Novo'} Produto`, body + mFooter('btnSaveProd', isEdit?'Salvar altera\u00e7\u00f5es':'Criar produto'), 520);

let fbApp=null,fbAuth=null,fbDb=null;

function initFirebase(){
  if(S.fbInitialized)return;
  try{
    fbApp=firebase.initializeApp(FB_CONFIG);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    S.fbInitialized=true;
    fbAuth.onAuthStateChanged(user=>{
      S.fbUser=user;
      if(user){fbLoad();loadCloudBackups();}
      else{S.fbSyncStatus='idle';S.cloudBackups=[];render();}
    });
  }catch(e){console.error('Firebase init:',e);}

function fbLogin(){
  if(!S.fbInitialized)initFirebase();
  const provider=new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(e=>toast('Erro ao entrar: '+e.message));

function fbLogout(){
  if(S.fbUnsubscribe){S.fbUnsubscribe();S.fbUnsubscribe=null;}
  fbAuth.signOut().then(()=>{S.fbUser=null;S.fbSyncStatus='idle';toast('Desconectado da nuvem');render();});
}

function fbLoad(){
  if(S.fbUnsubscribe){S.fbUnsubscribe();S.fbUnsubscribe=null;}
  S.fbSyncStatus='syncing';S.fbFirstLoad=true;render();
  const ref=fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main');
  S.fbUnsubscribe=ref.onSnapshot({includeMetadataChanges:true},async(doc)=>{
    // Ignore local writes in-flight and stale Firestore cache.
    // fromCache=true fires first with old cached data — only act on server-confirmed data.
    if(doc.metadata.hasPendingWrites||doc.metadata.fromCache)return;
    try{
      if(doc.exists){
        const d=doc.data();
        const cloudTime=d.updatedAt?.toMillis?.()||0;
        const localTime=S.lastSaveMs||0;
        if(S.fbFirstLoad&&localTime>cloudTime){
          // First load and local data is genuinely newer: upload to cloud
          S.fbFirstLoad=false;
          await fbSaveAsync();
          toast('\u2714 Dados locais enviados para a nuvem');
        }else{
          // Cloud is newer, equal, or this is a real-time update from another device
          S.arqs=d.arqs||[];S.clis=d.clis||[];S.prods=d.prods||[];
          S.sessoes=d.sessoes||[];S.specs=d.specs||[];
          S.lastSaveMs=cloudTime;
          DB.set('arq',S.arqs);DB.set('cli',S.clis);DB.set('prods',S.prods);
          DB.set('sessoes',S.sessoes);DB.set('specs',S.specs);
          DB.set('lastSaveMs',String(cloudTime));
          if(S.fbFirstLoad){toast('\u2714 Dados carregados da nuvem');}
          else{toast('\ud83d\udd04 Sincronizado com outro dispositivo');}
          S.fbFirstLoad=false;
        }
      }else if(S.fbFirstLoad){
        S.fbFirstLoad=false;
        await fbSaveAsync();
        toast('\u2714 Primeira sincroniza\u00e7\u00e3o com a nuvem conclu\u00edda');
      }
      S.fbSyncStatus='synced';
      autoBackupDaily();
    }catch(e){
      S.fbSyncStatus='error';
      toast('Erro ao sincronizar: '+e.message);
    }
    render();
  },(e)=>{
    S.fbSyncStatus='error';
    toast('Erro de sincroniza\u00e7\u00e3o: '+e.message);
    render();
  });
}

// ── AUTO-BACKUP DIÁRIO NA NUVEM ──────────────────────────────────
async function autoBackupDaily(){
  if(!S.fbUser||!fbDb)return;
  if(!S.sessoes.length&&!S.clis.length&&!S.prods.length)return;
  const today=new Date().toISOString().slice(0,10);
  const lastKey='cloudBackupDate_'+S.fbUser.uid;
  if(localStorage.getItem(lastKey)===today)return; // já fez hoje
  try{
    const backupData={
      arqs:S.arqs,clis:S.clis,prods:S.prods,
      sessoes:S.sessoes,specs:S.specs,
      savedAt:firebase.firestore.FieldValue.serverTimestamp(),
      label:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}),
      nSessoes:S.sessoes.length,nSpecs:S.specs.length,nClis:S.clis.length
    };
    await fbDb.collection('users').doc(S.fbUser.uid).collection('backups').doc(today).set(backupData);
    localStorage.setItem(lastKey,today);
    // Manter só últimos 30 backups
    const snap=await fbDb.collection('users').doc(S.fbUser.uid).collection('backups').orderBy('savedAt','desc').get();
    const docs=snap.docs;
    if(docs.length>30){
      const old=docs.slice(30);
      for(const d of old)await d.ref.delete();
    }
    console.log('[AutoBackup] Backup na nuvem salvo:',today);
  }catch(e){console.warn('[AutoBackup] Erro:',e);}
}

async function loadCloudBackups(){
  if(!S.fbUser||!fbDb)return;
  try{
    const snap=await fbDb.collection('users').doc(S.fbUser.uid).collection('backups').orderBy('savedAt','desc').limit(10).get();
    S.cloudBackups=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }catch(e){S.cloudBackups=[];}
}

async function restoreCloudBackup(id){
  if(!S.fbUser||!fbDb)return;
  const bk=S.cloudBackups?.find(b=>b.id===id);
  if(!bk)return;
  showConfirm('Restaurar backup','Todos os dados atuais serão substituídos.',`Backup de ${bk.label}`,'Esta ação não pode ser desfeita.',async()=>{
    S.arqs=bk.arqs||[];S.clis=bk.clis||[];S.prods=bk.prods||[];
    S.sessoes=bk.sessoes||[];S.specs=bk.specs||[];
    save();toast('\u2714 Backup de '+bk.label+' restaurado!');render();
  });
}

async function fbSaveAsync(){
  if(!S.fbUser||!fbDb)return;
  S.fbSyncStatus='syncing';
  try{
    await fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main').set(
      {arqs:S.arqs,clis:S.clis,sessoes:S.sessoes,specs:S.specs,prods:S.prods,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}
    );
    S.fbSyncStatus='synced';
  }catch(e){
    try{
      const p2=S.prods.map(p=>({...p,imagemPrincipal:'',imagensAplicado:[],gifProduto:''}));
      await fbDb.collection('users').doc(S.fbUser.uid).collection('data').doc('main').set(
        {arqs:S.arqs,clis:S.clis,sessoes:S.sessoes,specs:S.specs,prods:p2,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}
      );
      S.fbSyncStatus='synced';
    }catch(e2){S.fbSyncStatus='error';}
  }
}

function exportCSVForSessao(sessaoId){
  const s=S.sessoes.find(s=>s.id===sessaoId);if(!s)return;
  const cli=S.clis.find(c=>c.id===s.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessaoId);
  const header=['Projeto','Cliente','Arquiteto','Produto','Marca','Tipo','Ambiente','Quantidade','Referência','Código','Cotar','Separado','Obs.'];
  const rows=items.map(i=>[s.projeto,cli?.nome||'',arq?.nome||'',i.produto,i.marca,i.tipo,i.ambiente,i.quantidade,i.referencia,i.codigo,i.cotar,i.separado,i.obs].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=[header.map(h=>'"'+h+'"'),...rows].map(r=>r.join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${(s.projeto||'especificacao').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('CSV exportado');
}

}

function moneyParseR(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;const n=parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));return isNaN(n)?0:n;}
function moneyFmtR(n){return 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function dateInRange(iso,start,end){
  if(!iso)return !start && !end;
  const t=new Date(iso).getTime();
  if(start && t<new Date(start+'T00:00:00').getTime())return false;
  if(end && t>new Date(end+'T23:59:59').getTime())return false;
  return true;
}

function buildReportRows(){
  const d=collectReportConfig(); if(!d)return null;
  const dir = d.sortDir==='asc'?1:-1;
  const collator = new Intl.Collator('pt-BR',{sensitivity:'base'});
  let rows=[]; let columns=[];

  if(d.scope==='specs'){
    columns=[
      {k:'data',l:'Data',w:'9%'},
      {k:'projeto',l:'Projeto',w:'22%'},
      {k:'cliente',l:'Cliente',w:'17%'},
      {k:'arquiteto',l:'Arquiteto',w:'15%'},
      {k:'nItens',l:'Itens',w:'7%',align:'center'},
      {k:'valor',l:'Valor',w:'12%',align:'right'},
      {k:'status',l:'Status',w:'18%',align:'center'},
    ];
    rows = S.sessoes.map(s=>{
      const cli=S.clis.find(c=>c.id===s.clienteId);
      const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
      const its=sessaoItems(s.id);
      const valor=its.reduce((acc,i)=>acc+moneyParseR(i.preco)*Math.max(1,parseFloat(String(i.quantidade||'1').replace(',','.'))||1),0);
      return {
        _data:s.criadoEm||'',
        data:fmtDate(s.criadoEm),
        projeto:s.projeto||'—',
        cliente:cli?cli.nome:'—',
        arquiteto:arq?arq.nome:'—',
        nItens:its.length,
        _valor:valor,
        valor:moneyFmtR(valor),
        status:s.vendaStatus==='vendido'?'Vendida':s.vendaStatus==='cancelado'?'Cancelada':s.status==='concluida'?'Concluída':'Rascunho',
        _cliId:s.clienteId,_arqId:arq?arq.id:'',
      };
    });
    if(d.dateStart||d.dateEnd) rows = rows.filter(r=>dateInRange(r._data,d.dateStart,d.dateEnd));
    if(d.filter.clienteId) rows = rows.filter(r=>r._cliId===d.filter.clienteId);
    if(d.filter.arquitetoId) rows = rows.filter(r=>r._arqId===d.filter.arquitetoId);
    if(d.filter.status){
      const fs=d.filter.status;
      rows = rows.filter(r=>{
        if(fs==='vendido')return r.status==='Vendida';
        if(fs==='cancelado')return r.status==='Cancelada';
        if(fs==='concluida')return r.status==='Concluída';
        if(fs==='rascunho')return r.status==='Rascunho';
        return true;
      });
    }
    rows.sort((a,b)=>{
      const k=d.sortBy;
      if(k==='data') return dir*((new Date(a._data).getTime()||0)-(new Date(b._data).getTime()||0));
      if(k==='valor') return dir*((a._valor||0)-(b._valor||0));
      if(k==='nItens') return dir*((a.nItens||0)-(b.nItens||0));
      return dir*collator.compare(String(a[k]||''),String(b[k]||''));
    });
  }

  else if(d.scope==='clis'){
    columns=[
      {k:'nome',l:'Cliente',w:'22%'},
      {k:'obra',l:'Obra',w:'18%'},
      {k:'arquiteto',l:'Arquiteto',w:'17%'},
      {k:'nSpecs',l:'Specs',w:'8%',align:'center'},
      {k:'valorTotal',l:'Valor comprado',w:'15%',align:'right'},
      {k:'ultima',l:'Última atividade',w:'12%',align:'center'},
      {k:'contato',l:'Contato',w:'8%'},
    ];
    rows = S.clis.map(c=>{
      const arq=S.arqs.find(a=>a.id===c.arquitetoId);
      const sess=S.sessoes.filter(s=>s.clienteId===c.id);
      const valorTotal=sess.filter(s=>s.vendaStatus==='vendido').reduce((acc,s)=>{
        const its=sessaoItems(s.id);
        return acc + its.reduce((a,i)=>a+moneyParseR(i.preco)*Math.max(1,parseFloat(String(i.quantidade||'1').replace(',','.'))||1),0);
      },0);
      const ultimaTs=sess.reduce((mx,s)=>{const t=new Date(s.criadoEm||0).getTime();return t>mx?t:mx;},0);
      return {
        nome:c.nome||'—',
        obra:c.obra||'—',
        arquiteto:arq?arq.nome:'—',
        nSpecs:sess.length,
        _valorTotal:valorTotal,
        valorTotal:moneyFmtR(valorTotal),
        _ultima:ultimaTs,
        ultima:ultimaTs?fmtDate(new Date(ultimaTs).toISOString()):'—',
        contato:c.telefone||c.email||'—',
        _arqId:arq?arq.id:'',
      };
    });
    if(d.dateStart||d.dateEnd) rows = rows.filter(r=>r._ultima && dateInRange(new Date(r._ultima).toISOString(),d.dateStart,d.dateEnd));
    if(d.filter.arquitetoId) rows = rows.filter(r=>r._arqId===d.filter.arquitetoId);
    if(d.filter.minSpecs) rows = rows.filter(r=>r.nSpecs>=d.filter.minSpecs);
    rows.sort((a,b)=>{
      const k=d.sortBy;
      if(k==='nSpecs') return dir*((a.nSpecs||0)-(b.nSpecs||0));
      if(k==='valorTotal') return dir*((a._valorTotal||0)-(b._valorTotal||0));
      if(k==='ultima') return dir*((a._ultima||0)-(b._ultima||0));
      return dir*collator.compare(String(a[k]||''),String(b[k]||''));
    });
  }

  else if(d.scope==='arqs'){
    columns=[
      {k:'nome',l:'Arquiteto',w:'22%'},
      {k:'escritorio',l:'Escritório',w:'20%'},
      {k:'nClientes',l:'Clientes',w:'10%',align:'center'},
      {k:'nSpecs',l:'Specs',w:'9%',align:'center'},
      {k:'vendas',l:'Total vendido',w:'15%',align:'right'},
      {k:'conversao',l:'Conversão',w:'12%',align:'center'},
      {k:'contato',l:'Contato',w:'12%'},
    ];
    rows = S.arqs.map(a=>{
      const clis=S.clis.filter(c=>c.arquitetoId===a.id);
      const sess=S.sessoes.filter(s=>clis.some(c=>c.id===s.clienteId));
      const vendidas=sess.filter(s=>s.vendaStatus==='vendido');
      const vendas=vendidas.reduce((acc,s)=>{
        const its=sessaoItems(s.id);
        return acc + its.reduce((aa,i)=>aa+moneyParseR(i.preco)*Math.max(1,parseFloat(String(i.quantidade||'1').replace(',','.'))||1),0);
      },0);
      const conv=sess.length?Math.round(vendidas.length/sess.length*100):0;
      const ultimaTs=sess.reduce((mx,s)=>{const t=new Date(s.criadoEm||0).getTime();return t>mx?t:mx;},0);
      return {
        nome:a.nome||'—',
        escritorio:a.escritorio||'—',
        nClientes:clis.length,
        nSpecs:sess.length,
        _vendas:vendas,
        vendas:moneyFmtR(vendas),
        _conv:conv,
        conversao:conv+'%',
        contato:a.telefone||a.email||'—',
        _ultima:ultimaTs,
      };
    });
    if(d.dateStart||d.dateEnd) rows = rows.filter(r=>r._ultima && dateInRange(new Date(r._ultima).toISOString(),d.dateStart,d.dateEnd));
    if(d.filter.minClis) rows = rows.filter(r=>r.nClientes>=d.filter.minClis);
    if(d.filter.minSpecs) rows = rows.filter(r=>r.nSpecs>=d.filter.minSpecs);
    rows.sort((a,b)=>{
      const k=d.sortBy;
      if(k==='nClientes') return dir*((a.nClientes||0)-(b.nClientes||0));
      if(k==='nSpecs') return dir*((a.nSpecs||0)-(b.nSpecs||0));
      if(k==='vendas') return dir*((a._vendas||0)-(b._vendas||0));
      if(k==='conversao') return dir*((a._conv||0)-(b._conv||0));
      return dir*collator.compare(String(a[k]||''),String(b[k]||''));
    });
  }

  else if(d.scope==='catalog'){
    columns=[
      {k:'nome',l:'Produto',w:'24%'},
      {k:'marca',l:'Marca',w:'14%'},
      {k:'tipo',l:'Tipo',w:'12%'},
      {k:'codigo',l:'Código',w:'10%'},
      {k:'nSpecs',l:'Specs',w:'7%',align:'center'},
      {k:'valorVendas',l:'Valor vendido',w:'14%',align:'right'},
      {k:'tempoSemEspec',l:'Sem spec há',w:'12%',align:'center'},
      {k:'preco',l:'Preço atual',w:'13%',align:'right'},
    ];
    const productKey=v=>String(v||'').trim().toLowerCase();
    const now=Date.now();
    rows = S.prods.map(p=>{
      const matches=S.specs.filter(sp=>{
        return (sp.produtoId&&String(sp.produtoId)===String(p.id))||
               (sp.produto&&productKey(sp.produto)===productKey(p.nome))||
               (sp.referencia&&p.referencia&&productKey(sp.referencia)===productKey(p.referencia))||
               (sp.codigo&&p.codigo&&productKey(sp.codigo)===productKey(p.codigo));
      });
      let valorVendas=0; let ultimaTs=0;
      matches.forEach(sp=>{
        const sess=S.sessoes.find(s=>s.id===sp.sessaoId);
        if(!sess)return;
        const t=new Date(sess.criadoEm||0).getTime();
        if(t>ultimaTs)ultimaTs=t;
        if(sess.vendaStatus==='vendido'){
          const qty=Math.max(1,parseFloat(String(sp.quantidade||'1').replace(',','.'))||1);
          valorVendas+=moneyParseR(sp.preco)*qty;
        }
      });
      const dias = ultimaTs?Math.floor((now-ultimaTs)/86400000):null;
      return {
        nome:p.nome||'—',
        marca:p.marca||'—',
        tipo:p.tipo||'—',
        codigo:p.codigo||p.referencia||'—',
        nSpecs:matches.length,
        _valorVendas:valorVendas,
        valorVendas:moneyFmtR(valorVendas),
        _dias:dias,
        tempoSemEspec: dias==null?'Nunca':(dias===0?'Hoje':dias+'d'),
        preco:moneyFmtR(moneyParseR(p.preco)),
        _ultima:ultimaTs,
      };
    });
    if(d.dateStart||d.dateEnd) rows = rows.filter(r=>r._ultima && dateInRange(new Date(r._ultima).toISOString(),d.dateStart,d.dateEnd));
    if(d.filter.tipo) rows = rows.filter(r=>r.tipo===d.filter.tipo);
    if(d.filter.marca) rows = rows.filter(r=>r.marca===d.filter.marca);
    if(d.filter.diasSem) rows = rows.filter(r=>r._dias!=null && r._dias>=d.filter.diasSem);
    rows.sort((a,b)=>{
      const k=d.sortBy;
      if(k==='nSpecs') return dir*((a.nSpecs||0)-(b.nSpecs||0));
      if(k==='valorVendas') return dir*((a._valorVendas||0)-(b._valorVendas||0));
      if(k==='tempoSemEspec') return dir*((a._dias||0)-(b._dias||0));
      return dir*collator.compare(String(a[k]||''),String(b[k]||''));
    });
  }

  return {rows,columns,scope:d.scope,sortBy:d.sortBy,sortDir:d.sortDir,dateStart:d.dateStart,dateEnd:d.dateEnd,filter:d.filter};
}

function getRealizeLogoSrc(){
  const img=document.querySelector('.sb-logo-img');
  return img && img.src ? img.src : '';
}

  if(data.filter.arquitetoId){const a=S.arqs.find(x=>x.id===data.filter.arquitetoId);if(a)filterChips.push('Arquiteto: '+a.nome);}

        const v = r[c.k];
        const al = c.align?` style="text-align:${c.align};"`:'';

  const html = `<!DOCTYPE html>

function buildModalPdfOptions(){

  return`<div class="modal-bg" id="modalBg"><div class="modal" style="max-width:480px;">

      <div class="modal-title">Exportar PDF</div>

          <div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--bg);border-right:1px solid var(--border);">${SVG('pdf',20)}</div>
          <div style="padding:12px 14px;">
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;">PDF Comum</div>
            <div style="font-size:11.5px;color:var(--text-secondary);line-height:1.45;white-space:normal;">Tabela com todos os campos da especifica\u00e7\u00e3o. Ideal para uso interno e controle.</div>

function exportPDFForSessao(sessaoId){
  const s=S.sessoes.find(s=>s.id===sessaoId);if(!s)return;
  const cli=S.clis.find(c=>c.id===s.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessaoId);
  const isConc=s.status==='concluida';
  const pdfStatus=s.vendaStatus==='vendido'?{cls:'status-vendida',lbl:'Vendida'}:s.vendaStatus==='cancelado'?{cls:'status-cancelada',lbl:'Cancelada'}:isConc?{cls:'status-aberto',lbl:'Concluída'}:{cls:'status-rascunho',lbl:'Rascunho'};
  const dataGer=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const dataCriacao=new Date(s.criadoEm).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const dataConclusao=s.concluidoEm?new Date(s.concluidoEm).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';

  const rowsHTML=items.map((i,idx)=>`
    <tr class="${idx%2===0?'even':'odd'}">
      <td class="td-name">${escHtml(i.produto||'—')}</td>
      <td>${escHtml(i.marca||'—')}</td>
      <td>${i.tipo?`<span class="tag">${escHtml(i.tipo)}</span>`:'—'}</td>
      <td>${escHtml(i.ambiente||'—')}</td>
      <td class="center">${i.quantidade||'—'}</td>
      <td class="mono">${escHtml(i.referencia||'—')}</td>
      <td class="mono">${escHtml(i.codigo||'—')}</td>
      <td class="center">${i.cotar?`<span class="badge badge-${i.cotar==='COTAR'?'green':'red'}">${escHtml(i.cotar)}</span>`:'—'}</td>
      <td class="center">${i.separado?`<span class="badge badge-${i.separado==='SEPARADO'?'green':i.separado==='EM SEPARAÇÃO'?'orange':'red'}">${escHtml(i.separado)}</span>`:'—'}</td>
      <td class="obs">${escHtml(i.obs||'—')}</td>
    </tr>`).join('');

  const html=`<!DOCTYPE html>

// ===== PDF COM IMAGENS =====
function exportPDFComImagens(sessaoId){
  const s=S.sessoes.find(x=>x.id===sessaoId);if(!s)return;
  const cli=S.clis.find(c=>c.id===s.clienteId);
  const arq=cli?S.arqs.find(a=>a.id===cli.arquitetoId):null;
  const items=sessaoItems(sessaoId);
  const dataGer=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

  const cardsHTML=items.map((item,idx)=>{
    const prod=S.prods.find(p=>p.id===item.produtoId)||{};
    const mainImg=prod.imagemPrincipal||'';
    const applied=(prod.imagensAplicado||[]).filter(Boolean);
    const priceBlock=item.preco?`<div class="price-tag">R$\u00a0${escHtml(item.preco)}</div>`:'';
    const infoItems=[
      item.marca?`<span><b>Marca:</b> ${escHtml(item.marca)}</span>`:'',
      item.referencia?`<span><b>Ref.:</b> ${escHtml(item.referencia)}</span>`:'',
      item.codigo?`<span><b>C\u00f3digo:</b> ${escHtml(item.codigo)}</span>`:'',
      item.tipo?`<span><b>Tipo:</b> ${escHtml(item.tipo)}</span>`:'',
      item.ambiente?`<span><b>Ambiente:</b> ${escHtml(item.ambiente)}</span>`:'',
      item.quantidade?`<span><b>Qtd.:</b> ${escHtml(item.quantidade)} ${escHtml(item.unidade||'')}</span>`:'',
      item.prazo?`<span><b>Prazo:</b> ${escHtml(item.prazo)}</span>`:'',
      item.obs?`<span><b>Obs.:</b> ${escHtml(item.obs)}</span>`:'',
    ].filter(Boolean).join('');
    const statusBadges=[
      item.cotar?`<span class="badge badge-${item.cotar==='COTAR'?'green':'gray'}">${escHtml(item.cotar)}</span>`:'',
      item.separado?`<span class="badge badge-${item.separado==='SEPARADO'?'green':item.separado==='EM SEPARAÇÃO'?'orange':'red'}">${escHtml(item.separado)}</span>`:'',
    ].filter(Boolean).join('');

    return `<div class="prod-card">
      <div class="prod-index">${idx+1}</div>
      <div class="prod-layout">
        <div class="prod-img-col">
          ${mainImg?`<div class="main-img-wrap"><img src="${mainImg}" class="main-img" alt=""/></div>`:`<div class="main-img-wrap no-img"><span>Sem imagem</span></div>`}
          ${applied.length?`<div class="applied-grid">${applied.slice(0,4).map(u=>`<div class="applied-item"><img src="${u}" alt=""/></div>`).join('')}</div>`:''}
        </div>
        <div class="prod-info-col">
          <div class="prod-name">${escHtml(item.produto||'—')}</div>
          <div class="prod-attrs">${infoItems}</div>
          <div class="prod-bottom">
            <div class="prod-badges">${statusBadges}</div>
            ${priceBlock}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Especifica\u00e7\u00e3o com Imagens \u2014 ${escHtml(s.projeto||'Sem t\u00edtulo')}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

.print-bar strong{font-size:13px;font-weight:600;}
.print-bar button{border:none;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;}
.print-bar button:first-child{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);}
.print-bar button:last-child{background:#fff;color:#0071e3;}

.doc-client{font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1;color:#1d1d1f;margin-bottom:3px;}
.doc-project{font-size:13px;color:#6e6e73;font-weight:500;margin-bottom:10px;}
.doc-meta-pills{display:flex;gap:8px;flex-wrap:wrap;}
.meta-pill{background:#f5f5f7;border-radius:20px;padding:4px 12px;font-size:10.5px;color:#1d1d1f;font-weight:500;}
.meta-pill b{color:#6e6e73;font-weight:600;}
.doc-right{text-align:right;}
.doc-brand{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#0071e3;}
.doc-brand-sub{font-size:9px;color:#aeaeb2;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.doc-date{font-size:9.5px;color:#aeaeb2;margin-top:8px;}
.prod-card{position:relative;border:1px solid #e5e5e7;border-radius:12px;overflow:hidden;margin-bottom:16px;background:#fff;page-break-inside:avoid;}
.prod-index{position:absolute;top:10px;left:10px;width:22px;height:22px;background:#1d1d1f;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2;}
.prod-layout{display:grid;grid-template-columns:210px 1fr;}
.prod-img-col{background:#f5f5f7;display:flex;flex-direction:column;gap:6px;padding:12px;}
.main-img-wrap{flex:1;min-height:150px;max-height:190px;border-radius:8px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;}
.main-img-wrap.no-img{border:2px dashed #d1d1d6;color:#aeaeb2;font-size:10px;}
.main-img{width:100%;height:100%;object-fit:contain;display:block;}
.applied-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.applied-item{border-radius:5px;overflow:hidden;background:#fff;aspect-ratio:4/3;}
.applied-item img{width:100%;height:100%;object-fit:cover;display:block;}
.prod-info-col{padding:16px 18px;display:flex;flex-direction:column;gap:10px;}
.prod-name{font-size:15px;font-weight:700;letter-spacing:-.2px;color:#1d1d1f;line-height:1.35;}
.prod-attrs{display:flex;flex-direction:column;gap:5px;}
.prod-attrs span{font-size:10.5px;color:#6e6e73;line-height:1.4;}
.prod-attrs span b{color:#1d1d1f;font-weight:600;}
.prod-bottom{margin-top:auto;padding-top:10px;border-top:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.prod-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;}
.badge-green{background:#e8faf0;color:#1a7a3a;}
.badge-gray{background:#f0f0f0;color:#6e6e73;}
.badge-orange{background:#fff8e7;color:#9a6200;}
.badge-red{background:#fff1f0;color:#c0392b;}
.price-tag{font-size:17px;font-weight:800;color:#0071e3;letter-spacing:-.3px;}
.doc-footer{margin-top:20px;padding-top:10px;border-top:1px solid #e5e5e7;display:flex;justify-content:space-between;}
.doc-footer span{font-size:9px;color:#aeaeb2;}
</style>
</head>

<div class="print-bar">
  <button onclick="try{window.close();}catch(e){history.back()}">&#8592; Fechar</button>

<div class="doc-wrap">
  <div class="doc-header">
    <div>

        ${s.vendaStatus==='vendido'&&s.valorVenda?`<span class="meta-pill" style="background:#e8faf0;color:#1a7a3a;"><b>Venda</b> R$\u00a0${escHtml(s.valorVenda)}</span>`:''}
      </div>
    </div>
    <div class="doc-right">
